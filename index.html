          <div style={{width:40,height:40,borderRadius:10,background:C.amberL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>📦</div>
          <div style={{flex:1}}>
            <p style={{margin:0,fontSize:14,fontWeight:800}}>{sel.prodNombre}</p>
            <p style={{margin:0,fontSize:11,color:C.muted}}>{sel.clienteNombre} · {sel.tipo} · {sel.cantidad} uds · S{sel.semana}</p>
          </div>
          <button onClick={()=>setSel(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:C.muted}}>✕</button>
        </div>
        <p style={{margin:"0 0 10px",fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>¿Cuál es el feedback del cliente?</p>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {Object.entries(FEEDBACK_MUESTRA).filter(([k])=>k!=="pendiente").map(([k,v])=>(
            <button key={k} onClick={()=>setFormFb(f=>({...f,resultado:k}))}
              style={{padding:"14px 16px",borderRadius:12,border:`2px solid ${formFb.resultado===k?v.color:C.border}`,background:formFb.resultado===k?v.bg:"#FFF",display:"flex",gap:12,alignItems:"center",cursor:"pointer"}}>
              <span style={{fontSize:24}}>{v.icon}</span>
              <p style={{margin:0,fontSize:15,fontWeight:formFb.resultado===k?700:400,color:formFb.resultado===k?v.color:C.text}}>{v.label}</p>
              {formFb.resultado===k&&<span style={{marginLeft:"auto",color:v.color}}>✓</span>}
            </button>
          ))}
        </div>
        <div style={{marginBottom:20}}>
          <p style={{margin:"0 0 7px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Nota <span style={{fontWeight:400}}>(opcional)</span></p>
          <textarea value={formFb.nota} onChange={e=>setFormFb(f=>({...f,nota:e.target.value}))} rows={3}
            placeholder="¿Qué dijo? ¿Calibre, sabor, textura…"
            style={{...iSt,borderRadius:12,padding:"12px 14px",resize:"none",fontSize:14}}/>
        </div>
        <button onClick={()=>{onFeedback(sel.id,formFb.resultado,formFb.nota);setSel(null);setFormFb({resultado:"positivo",nota:""}); }}
          style={{width:"100%",padding:"16px",borderRadius:12,border:"none",background:C.navy,color:"#fff",fontWeight:800,fontSize:16,cursor:"pointer"}}>
          Guardar feedback
        </button>
      </div>
    );
  }

  return(
    <div>
      {/* KPIs */}
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        {[{l:"⏳ Pendiente",v:pendCount,c:C.amber,f:"pendiente"},{l:"✅ Positivo",v:posCount,c:C.green,f:"positivo"},{l:"❌ KO",v:koCount,c:C.red,f:"ko"}].map(k=>(
          <div key={k.l} onClick={()=>setFiltro(f=>f===k.f?"todas":k.f)}
            style={{flex:1,background:filtro===k.f?k.c+"15":"#FFF",border:`2px solid ${filtro===k.f?k.c:C.border}`,borderRadius:12,padding:"12px 10px",cursor:"pointer",textAlign:"center"}}>
            <p style={{margin:0,fontSize:22,fontWeight:800,color:k.c}}>{k.v}</p>
            <p style={{margin:"2px 0 0",fontSize:10,fontWeight:700,color:C.muted}}>{k.l}</p>
          </div>
        ))}
      </div>
      {/* Filtros */}
      <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>
        {[["todas","Todas"],["pendiente","Pendiente"],["positivo","Positivo"],["pedido","Ha pedido"],["ko","KO"]].map(([k,l])=>(
          <button key={k} onClick={()=>setFiltro(k)}
            style={{padding:"6px 12px",borderRadius:8,border:`1.5px solid ${filtro===k?C.blue:C.border}`,background:filtro===k?C.blueL:"#FFF",color:filtro===k?C.blue:C.muted,fontSize:11,fontWeight:filtro===k?700:400,cursor:"pointer"}}>
            {l}
          </button>
        ))}
      </div>
      {filtradas.length===0?(
        <div style={{textAlign:"center",padding:"28px",background:"#FFF",borderRadius:13,border:`1px solid ${C.border}`,color:C.muted}}>
          <span style={{fontSize:32,display:"block",marginBottom:8}}>📦</span>
          <p style={{margin:0,fontSize:14,fontWeight:600}}>Sin muestras en este estado</p>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {filtradas.map(m=>{
            const fb=FEEDBACK_MUESTRA[m.estado]||FEEDBACK_MUESTRA.pendiente;
            const isPend=m.estado==="pendiente";
            return(
              <div key={m.id} onClick={()=>isPend?setSel(m):null}
                style={{display:"flex",gap:12,alignItems:"center",padding:"14px 16px",borderRadius:13,border:`2px solid ${fb.color}44`,background:fb.bg,cursor:isPend?"pointer":"default",transition:"transform .1s"}}
                onMouseEnter={e=>{if(isPend)e.currentTarget.style.transform="translateX(3px)";}}
                onMouseLeave={e=>e.currentTarget.style.transform="none"}>
                <div style={{width:44,height:44,borderRadius:12,background:fb.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{fb.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  {m.prodCodigo&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:C.blue,fontWeight:700}}>{m.prodCodigo}</p>}
                  <p style={{margin:0,fontSize:14,fontWeight:700}}>{m.prodNombre}</p>
                  <p style={{margin:"2px 0 0",fontSize:11,color:C.muted}}>{m.clienteNombre} · {m.tipo} · {m.cantidad} uds · S{m.semana}</p>
                  {!isPend&&m.nota&&<p style={{margin:"4px 0 0",fontSize:12,color:fb.color,fontStyle:"italic"}}>"{m.nota.slice(0,50)}"</p>}
                </div>
                {isPend?<span style={{fontSize:11,color:C.amber,fontWeight:700,flexShrink:0}}>Registrar →</span>
                :<Tag label={fb.label.split("—")[0].trim()} color={fb.color}/>}
              </div>
            );
          })}
        </div>
      )}
      {pendCount>0&&(
        <div style={{marginTop:16,background:C.amberL,border:`1px solid ${C.amber}55`,borderRadius:10,padding:"10px 14px",fontSize:12,color:C.amber,fontWeight:600}}>
          ⚠ {pendCount} muestra{pendCount>1?"s":""} sin feedback — toca para registrar el resultado.
        </div>
      )}
    </div>
  );
}

function Reporting({usuario,reportes,onSaveReporte,objetivos,recuperacionesAsignadas,muestrasPendientes,updRec,addRec,onOpenFicha,clientesDB=[]}){
  const {rol,equipo,id:uid,color}=usuario;
  const semana=SEMANA_ACTUAL;

  // ── ALL HOOKS MUST BE FIRST — before any conditional return ─────────
  const repInicial=useMemo(()=>reportes.find(r=>r.agente===uid&&r.semana===semana),[reportes,uid,semana]);
  const misClientes=useMemo(()=>{
    // Usar clientesDB si está cargado, sino fallback a CLIENTES hardcoded
    const src=clientesDB.length>3?clientesDB:CLIENTES;
    return src.filter(c=>c.agente===uid);
  },[uid,clientesDB]);
  const recAsig=useMemo(()=>(recuperacionesAsignadas||[]).filter(r=>r.agente===uid&&r.estado==="en_curso"),[recuperacionesAsignadas,uid]);
  const objetivo=useMemo(()=>objetivos?.[uid]?.find(o=>o.semana===semana),[objetivos,uid,semana]);

  const [step,setStep]=useState(0);
  const [ventas,setVentas]=useState({ventas_real:"",mb_real:"",promo_real:"",liq_real:""});
  const [visitas,setVisitas]=useState([]);
  const [muestras,setMuestras]=useState([]);
  const [feedbackMuestras,setFeedbackMuestras]=useState([]);
  const [repRecuperaciones,setRepRecuperaciones]=useState([]);
  const [enviado,setEnviado]=useState(false);
  const [nuevosClientes,setNuevosClientes]=useState([]); // clientes nuevos creados en esta sesión
  const [editandoNuevo,setEditandoNuevo]=useState(null); // cliente nuevo en edición

  // ── JEFE / DIRECTOR / CEO ────────────────────────────────────────
  if(rol!=="agente"){
    const agentesEquipo = VENDEDORES.filter(v=>v.rol==="agente"&&(rol==="jefe"?v.equipo===equipo:true));

    // Pendientes de aprobación
    const pendAprobacion = (recuperacionesAsignadas||[]).filter(r=>r.estado==="pend_aprobacion"&&(rol==="jefe"?r.equipo===equipo:true));
    // Muestras pendientes de feedback del equipo
    const muestrasPendEquipo = []; // local — en Firebase vendría de Firestore

    // Tabs del jefe
    const [tabJefe,setTabJefe] = useState("semana");
    const [selAgente,setSelAgente] = useState(null);

    // Vista detalle de agente
    if(selAgente){
      const rep = reportes.find(r=>r.agente===selAgente.id&&r.semana===semana);
      const clientesAg = (clientesDB.length>3?clientesDB:CLIENTES).filter(c=>c.agente===selAgente.id);
      const recsAg = (recuperacionesAsignadas||[]).filter(r=>r.agente===selAgente.id);
      const muestrasAg = rep?.muestras||[];
      const visitasAg  = rep?.visitas||[];

      return(
        <div>
          {/* Header agente */}
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:20}}>
            <button onClick={()=>setSelAgente(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:22,color:C.muted}}>←</button>
            <div style={{width:40,height:40,borderRadius:"50%",background:selAgente.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:"#fff",flexShrink:0}}>
              {selAgente.nombre.split(" ").slice(0,2).map(n=>n[0]).join("")}
            </div>
            <div>
              <p style={{margin:0,fontSize:16,fontWeight:800}}>{selAgente.nombre}</p>
              <p style={{margin:"2px 0 0",fontSize:11,color:C.muted}}>Semana {semana} · {clientesAg.length} clientes</p>
            </div>
          </div>

          {/* KPIs del agente */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
            {[
              {label:"Ventas",    v:rep?.ventas?.ventas_real?`${fmt(parseFloat(rep.ventas.ventas_real))}€`:"—", c:C.green,  ok:!!rep?.ventas?.ventas_real},
              {label:"MB%",       v:rep?.ventas?.mb_real?`${rep.ventas.mb_real}%`:"—",                           c:C.blue,   ok:!!rep?.ventas?.mb_real},
              {label:"Visitas",   v:`${visitasAg.length} / ${clientesAg.length}`,                                 c:C.purple, ok:visitasAg.length>0},
              {label:"Muestras",  v:`${muestrasAg.reduce((s,m)=>s+(parseInt(m.cantidad)||0),0)} uds`,             c:C.amber,  ok:muestrasAg.length>0},
            ].map(k=>(
              <div key={k.label} style={{background:"#FFF",borderRadius:12,padding:"13px 14px",border:`1.5px solid ${k.ok?k.c+"44":C.border}`,borderTop:`3px solid ${k.ok?k.c:C.border}`}}>
                <p style={{margin:"0 0 3px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>{k.label}</p>
                <p style={{margin:0,fontSize:20,fontWeight:800,color:k.ok?k.c:C.text}}>{k.v}</p>
              </div>
            ))}
          </div>

          {/* Estado informe */}
          <div style={{background:rep?.enviado?C.greenL:C.amberL,borderRadius:12,padding:"11px 14px",marginBottom:16,border:`1px solid ${rep?.enviado?C.green+"44":C.amber+"44"}`,display:"flex",gap:10,alignItems:"center"}}>
            <span style={{fontSize:20}}>{rep?.enviado?"✅":"⏳"}</span>
            <p style={{margin:0,fontSize:13,fontWeight:700,color:rep?.enviado?C.green:C.amber}}>
              {rep?.enviado?`Informe S${semana} enviado el ${rep.ts}`:`Informe S${semana} pendiente`}
            </p>
          </div>

          {/* Visitas */}
          {visitasAg.length>0&&(
            <div style={{marginBottom:16}}>
              <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Visitas registradas</p>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {visitasAg.map((v,i)=>{
                  const rv=RESULT_VISITA.find(r=>r.k===v.resultado);
                  return(
                    <div key={i} style={{background:"#FFF",borderRadius:10,padding:"10px 14px",border:`1px solid ${rv?.color+"33"||C.border}`,display:"flex",gap:10,alignItems:"center"}}>
                      <span style={{fontSize:16}}>{rv?.icon||"📍"}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <p style={{margin:0,fontSize:12,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v.clienteNombre}</p>
                        <p style={{margin:0,fontSize:11,color:rv?.color||C.muted,fontWeight:600}}>{rv?.label||v.resultado}</p>
                      </div>
                      {v.notas&&<p style={{margin:0,fontSize:10,color:C.muted,fontStyle:"italic",maxWidth:100,textAlign:"right"}}>{v.notas.slice(0,30)}</p>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Muestras */}
          {muestrasAg.length>0&&(
            <div style={{marginBottom:16}}>
              <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Muestras entregadas</p>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {muestrasAg.map((m,i)=>(
                  <div key={i} style={{background:"#FFF",borderRadius:10,padding:"10px 14px",border:`1px solid ${C.border}`,display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{fontSize:16}}>📦</span>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{margin:0,fontSize:12,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.prodNombre||m.nombre}</p>
                      <p style={{margin:0,fontSize:11,color:C.muted}}>{m.tipo} · {m.cantidad} uds{m.clienteNombre?` · ${m.clienteNombre}`:""}</p>
                    </div>
                    <span style={{fontSize:11,fontWeight:700,color:FEEDBACK_MUESTRA[m.estado]?.color||C.muted}}>{FEEDBACK_MUESTRA[m.estado]?.icon}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Estrategias del agente */}
          {recsAg.length>0&&(
            <div>
              <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Estrategias</p>
              {recsAg.map(r=>{
                const est=ESTADOS_REC[r.estado]||ESTADOS_REC.en_curso;
                return(
                  <div key={r.id} style={{background:"#FFF",borderRadius:10,padding:"11px 14px",marginBottom:6,border:`1.5px solid ${est.color}33`,borderLeft:`4px solid ${est.color}`}}>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span>{est.dot}</span>
                      <p style={{margin:0,fontSize:13,fontWeight:700,flex:1}}>{r.clienteNombre}</p>
                      <span style={{fontSize:11,fontWeight:700,color:est.color}}>{est.label}</span>
                    </div>
                    {r.objetivo&&<p style={{margin:"4px 0 0",fontSize:11,color:C.muted}}>{r.objetivo.slice(0,60)}</p>}
                  </div>
                );
              })}
            </div>
          )}

          {visitasAg.length===0&&muestrasAg.length===0&&recsAg.length===0&&!rep&&(
            <div style={{textAlign:"center",padding:"32px",color:C.muted}}>
              <span style={{fontSize:32,display:"block",marginBottom:8}}>📭</span>
              <p style={{margin:0,fontSize:14,fontWeight:600}}>Sin actividad registrada esta semana</p>
            </div>
          )}
        </div>
      );
    }

    // ── Vista principal jefe: equipo ────────────────────────────────
    return(
      <div>
        {/* Tabs */}
        <div style={{display:"flex",gap:6,marginBottom:20}}>
          {[
            {id:"semana",       label:"📋 Semana",      badge:0},
            {id:"pendientes",   label:"⏳ Pendientes",   badge:pendAprobacion.length},
            {id:"estrategias",  label:"🔄 Estrategias",  badge:0},
          ].map(t=>(
            <button key={t.id} onClick={()=>setTabJefe(t.id)}
              style={{flex:1,padding:"10px 4px",borderRadius:11,border:"none",background:tabJefe===t.id?C.navy:"#FFF",color:tabJefe===t.id?"#fff":C.muted,fontWeight:700,fontSize:11,cursor:"pointer",boxShadow:"0 1px 4px #0001",position:"relative"}}>
              {t.label}
              {t.badge>0&&<span style={{position:"absolute",top:5,right:5,background:C.red,color:"#fff",borderRadius:99,fontSize:9,fontWeight:800,padding:"1px 5px"}}>{t.badge}</span>}
            </button>
          ))}
        </div>

        {/* Tab: Semana — estado del equipo */}
        {tabJefe==="semana"&&(
          <div>
            <p style={{margin:"0 0 12px",fontSize:13,fontWeight:700,color:C.text}}>Equipo {equipo} · Semana {semana}</p>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {agentesEquipo.map(v=>{
                const rep=reportes.find(r=>r.agente===v.id&&r.semana===semana);
                const clientesAg=(clientesDB.length>3?clientesDB:CLIENTES).filter(c=>c.agente===v.id);
                const pctV=clientesAg.length&&rep?Math.round((rep.visitas?.length||0)/clientesAg.length*100):0;
                const ventas=rep?.ventas?.ventas_real?parseFloat(rep.ventas.ventas_real):null;
                const pendEstr=(recuperacionesAsignadas||[]).filter(r=>r.agente===v.id&&r.estado==="pend_aprobacion").length;

                return(
                  <button key={v.id} onClick={()=>setSelAgente(v)}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"14px 16px",background:"#FFF",borderRadius:13,border:`1.5px solid ${rep?.enviado?v.color+"44":C.border}`,borderLeft:`4px solid ${v.color}`,cursor:"pointer",textAlign:"left",width:"100%"}}>
                    <div style={{width:40,height:40,borderRadius:"50%",background:v.color+"18",border:`2px solid ${v.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:v.color,flexShrink:0}}>
                      {v.nombre.split(" ").slice(0,2).map(n=>n[0]).join("")}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:4}}>
                        <p style={{margin:0,fontSize:14,fontWeight:800}}>{v.nombre}</p>
                        {pendEstr>0&&<span style={{background:C.red,color:"#fff",borderRadius:99,fontSize:10,fontWeight:800,padding:"1px 7px"}}>🔔 {pendEstr}</span>}
                        {rep?.enviado?<span style={{background:C.greenL,color:C.green,borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 7px"}}>✓ Enviado</span>:<span style={{background:C.amberL,color:C.amber,borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 7px"}}>⏳ Pendiente</span>}
                      </div>
                      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                        {ventas&&<span style={{fontSize:11,color:C.green,fontWeight:700}}>💰 {fmt(ventas)}€</span>}
                        {rep?.ventas?.mb_real&&<span style={{fontSize:11,color:C.blue,fontWeight:700}}>📊 {rep.ventas.mb_real}%</span>}
                        {rep?.visitas?.length>0&&<span style={{fontSize:11,color:C.purple,fontWeight:700}}>👥 {rep.visitas.length} visitas</span>}
                        {rep?.muestras?.length>0&&<span style={{fontSize:11,color:C.amber,fontWeight:700}}>📦 {rep.muestras.reduce((s,m)=>s+(parseInt(m.cantidad)||0),0)} muest</span>}
                        {!rep&&<span style={{fontSize:11,color:C.muted}}>Sin actividad</span>}
                      </div>
                    </div>
                    <span style={{color:C.light,fontSize:18,flexShrink:0}}>›</span>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Tab: Pendientes de aprobación */}
        {tabJefe==="pendientes"&&(
          <div>
            <p style={{margin:"0 0 12px",fontSize:13,fontWeight:700}}>Estrategias pendientes de aprobación</p>
            {pendAprobacion.length===0?(
              <div style={{textAlign:"center",padding:"32px",background:"#FFF",borderRadius:13,border:`1px solid ${C.border}`,color:C.muted}}>
                <span style={{fontSize:32,display:"block",marginBottom:8}}>✅</span>
                <p style={{margin:0,fontSize:14,fontWeight:600}}>Todo al día</p>
                <p style={{margin:"6px 0 0",fontSize:12}}>No hay estrategias pendientes</p>
              </div>
            ):pendAprobacion.map(r=>{
              const v=VENDEDORES.find(x=>x.id===r.agente);
              return(
                <div key={r.id} style={{background:"#FFF",borderRadius:13,padding:"14px 16px",marginBottom:10,border:`2px solid ${C.amber}44`,borderLeft:`4px solid ${C.amber}`}}>
                  <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
                    <div style={{flex:1}}>
                      <p style={{margin:"0 0 3px",fontSize:14,fontWeight:800}}>{r.clienteNombre}</p>
                      <p style={{margin:0,fontSize:11,color:C.muted}}>{v?.nombre} · S{r.semanaInicio||r.semana}</p>
                      {r.objetivo&&<p style={{margin:"5px 0 0",fontSize:12,color:C.text,fontStyle:"italic"}}>"{r.objetivo.slice(0,80)}"</p>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>updRec&&updRec({...r,estado:"en_curso",aprobadoPor:uid})}
                      style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:C.green,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                      ✓ Aprobar
                    </button>
                    <button onClick={()=>{const m=prompt("Motivo del rechazo:");if(m)updRec&&updRec({...r,estado:"rechazada",motivoRechazo:m});}}
                      style={{flex:1,padding:"11px",borderRadius:10,border:`1.5px solid ${C.red}`,background:"#FFF",color:C.red,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                      ✗ Rechazar
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Tab: Estrategias del equipo */}
        {tabJefe==="estrategias"&&(
          <div>
            <p style={{margin:"0 0 12px",fontSize:13,fontWeight:700}}>Todas las estrategias del equipo</p>
            {(recuperacionesAsignadas||[]).filter(r=>rol==="jefe"?r.equipo===equipo:true).length===0?(
              <div style={{textAlign:"center",padding:"32px",background:"#FFF",borderRadius:13,border:`1px solid ${C.border}`,color:C.muted}}>
                <span style={{fontSize:32,display:"block",marginBottom:8}}>🔄</span>
                <p style={{margin:0,fontSize:14,fontWeight:600}}>Sin estrategias activas</p>
              </div>
            ):(recuperacionesAsignadas||[]).filter(r=>rol==="jefe"?r.equipo===equipo:true).map(r=>{
              const est=ESTADOS_REC[r.estado]||ESTADOS_REC.en_curso;
              const v=VENDEDORES.find(x=>x.id===r.agente);
              const ultSeg=(r.seguimientos||[]).slice(-1)[0];
              return(
                <div key={r.id} style={{background:"#FFF",borderRadius:12,padding:"13px 16px",marginBottom:8,border:`1.5px solid ${est.color}33`,borderLeft:`4px solid ${est.color}`}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:ultSeg?6:0}}>
                    <span style={{fontSize:16}}>{est.dot}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700}}>{r.clienteNombre}</p>
                      <p style={{margin:0,fontSize:11,color:C.muted}}>{v?.nombre} · <span style={{color:est.color,fontWeight:600}}>{est.label}</span></p>
                    </div>
                  </div>
                  {ultSeg&&<div style={{background:C.bg,borderRadius:8,padding:"7px 10px",fontSize:11,color:C.muted,fontStyle:"italic"}}>"{ultSeg.nota.slice(0,70)}"</div>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  // ── AGENTE: wizard ───────────────────────────────────────────────
  const PASOS=[
    {id:"ventas",   label:"Ventas",       icon:"💰"},
    {id:"visitas",  label:"Visitas",      icon:"👥"},
    {id:"muestras", label:"Muestras",     icon:"📦"},
    {id:"recup",    label:"Recuperación", icon:"🔄"},
    {id:"resumen",  label:"Resumen",      icon:"📤"},
  ];

  const handleVisita=(v)=>{
    setVisitas(p=>{
      const idx=p.findIndex(x=>x.clienteId===v.clienteId);
      return idx>=0?p.map((x,i)=>i===idx?v:x):[...p,v];
    });
    // Si es cliente de oportunidad → actualizar historial en oportunidades
    const cliOpo=misClientes.find(c=>c.id===v.clienteId&&c.esOportunidad);
    if(cliOpo&&cliOpo.oportunidadId&&window.db){
      const opoRef=window.db.collection('oportunidades').doc(cliOpo.oportunidadId);
      opoRef.get().then(doc=>{
        if(doc.exists){
          const data=doc.data();
          const entry={accion:'Visita registrada',por:usuario.nombre||uid,fecha:new Date().toLocaleDateString('es-ES'),nota:`[${v.resultado||'visita'}] ${v.notas||''}`};
          opoRef.update({historial:[...(data.historial||[]),entry],estado:'seguimiento'});
        }
      }).catch(()=>{});
    }
  };
  const handleEnviar=()=>{
    // Save agent-created strategies to global recuperaciones pool
    repRecuperaciones.forEach(r=>{
      if(!r.agente) {
        addRec({...r, agente:uid, equipo:usuario.equipo||"WIKUK"});
      }
    });
    const rep={agente:uid,semana,ventas,visitas,muestras,feedbackMuestras,recuperaciones:repRecuperaciones,clientes:misClientes,enviado:true,ts:new Date().toLocaleDateString("es-ES")};
    onSaveReporte(rep);
    setEnviado(true);
  };

  const repCompleto={ventas,visitas,muestras,feedbackMuestras,recuperaciones:repRecuperaciones,clientes:misClientes,muestrasPendientes:muestrasPendientes||[]};

  const [vistaRep,setVistaRep]=useState("informe");
  const [subPantalla,setSubPantalla]=useState(false); // true cuando PasoVisitas está en sub-pantalla
  const pendFeedback=(muestrasPendientes||[]).filter(m=>m.estado==="pendiente"&&m.agente===uid).length;
  // Include strategies assigned to this agent OR created by this agent (solicitadoPor)
  const misMisRecuperaciones=useMemo(()=>(recuperacionesAsignadas||[]).filter(r=>
    r.agente===uid || r.solicitadoPor===uid
  ).concat(
    // Also include local repRecuperaciones not yet in global (created this session)
    repRecuperaciones.filter(r=>!(recuperacionesAsignadas||[]).find(x=>x.id===r.id))
  ),[recuperacionesAsignadas,uid,repRecuperaciones]);

  const estrategiasEnCurso=misMisRecuperaciones.filter(r=>r.estado==="pend_aprobacion"||r.estado==="en_curso").length;

  const handleFeedback=(fb)=>{
    setFeedbackMuestras(p=>[...p.filter(x=>x.id!==fb.id),fb]);
  };

  return(
    <div style={{maxWidth:540,margin:"0 auto"}}>

      {/* Selector vista — 3 tabs */}
      <div style={{display:"flex",gap:5,marginBottom:20}}>
        {[
          {id:"informe",   label:"📋 Informe",     badge:0,         activeColor:color},
          {id:"muestras",  label:"📦 Muestras",    badge:pendFeedback,      activeColor:C.blue},
          {id:"estrategias",label:"🎯 Estrategias",badge:estrategiasEnCurso,activeColor:C.purple},
        ].map(t=>{
          const active=vistaRep===t.id;
          return(
            <button key={t.id} onClick={()=>setVistaRep(t.id)}
              style={{flex:1,padding:"10px 4px",borderRadius:11,border:"none",background:active?t.activeColor:"#FFF",color:active?"#fff":C.muted,fontWeight:700,fontSize:12,cursor:"pointer",boxShadow:"0 1px 4px #0001",position:"relative",transition:"all .15s"}}>
              {t.label}
              {t.badge>0&&<span style={{position:"absolute",top:5,right:5,background:active?"#ffffff44":C.amber,color:active?"#fff":"#fff",borderRadius:99,fontSize:9,fontWeight:800,padding:"1px 5px",minWidth:14,textAlign:"center"}}>{t.badge}</span>}
            </button>
          );
        })}
      </div>

      {/* ── VISTA MIS MUESTRAS ── */}
      {vistaRep==="muestras"&&(
        <VistaHistorialMuestras
          muestras={(muestrasPendientes||[]).filter(m=>m.agente===uid)}
          onFeedback={(id,resultado,nota)=>{
            const m=(muestrasPendientes||[]).find(x=>x.id===id);
            if(m) setFeedbackMuestras(p=>[...p.filter(x=>x.id!==id),{...m,resultado,nota,semanaFeedback:semana}]);
          }}
          feedbackLocal={feedbackMuestras}
        />
      )}

      {/* ── VISTA MIS ESTRATEGIAS ── */}
      {vistaRep==="estrategias"&&(
        <VistaEstrategias
          recuperaciones={misMisRecuperaciones}
          onUpdate={updRec||(()=>{})}
        />
      )}

      {/* ── VISTA INFORME SEMANAL ── */}
      {vistaRep==="informe"&&(<>
        {/* Stepper */}
        <div style={{display:"flex",gap:0,marginBottom:24,background:C.white,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden"}}>
          {PASOS.map((p,i)=>{
            const done=i<step;
            const active=i===step;
            return(
              <button key={p.id} onClick={()=>setStep(i)}
                style={{flex:1,padding:"10px 0",border:"none",borderRight:i<PASOS.length-1?`1px solid ${C.border}`:"none",background:active?color:done?"#F0FDF4":"#FFF",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <span style={{fontSize:18}}>{done?"✅":p.icon}</span>
                <span style={{fontSize:9,fontWeight:active||done?700:400,color:active?"#fff":done?C.green:C.muted}}>{p.label}</span>
              </button>
            );
          })}
        </div>

        {/* Título paso */}
        <div style={{marginBottom:20}}>
          <p style={{margin:0,fontSize:18,fontWeight:800,color:C.text}}>{PASOS[step].icon} {PASOS[step].label}</p>
          <p style={{margin:"2px 0 0",fontSize:12,color:C.muted}}>Semana {semana} {objetivo?`· Obj. ${fmt(objetivo.ventas)}€`:""}</p>
        </div>

        {/* Contenido paso */}
        {step===0&&<PasoVentas data={ventas} onChange={(k,v)=>setVentas(p=>({...p,[k]:v}))} objetivo={objetivo}/>}
        {step===1&&<PasoVisitas clientes={misClientes} visitas={visitas} onVisita={handleVisita} nuevosClientes={nuevosClientes} onGuardarNuevo={(c)=>{
          // Save to Firebase and global clientesDB
          const cFirebase={...c,agente:uid,equipo:usuario.equipo||"WIKUK",fechaAlta:new Date().toLocaleDateString("es-ES")};
          if(window.fbGuardar) window.fbGuardar('clientes',c.id,cFirebase);
          setNuevosClientes(p=>[...p.filter(x=>x.id!==c.id),c]);
        }} onEditarNuevo={setEditandoNuevo} onSubPantalla={setSubPantalla} onOpenFicha={onOpenFicha}/>}
        {step===2&&<PasoMuestras muestras={muestras} onAdd={m=>setMuestras(p=>[...p,m])} onDel={id=>setMuestras(p=>p.filter(m=>m.id!==id))} muestrasPendientes={[]} onFeedback={()=>{}} uid={uid} onSubPantalla={setSubPantalla}/>}
        {step===3&&<PasoRecuperacion items={repRecuperaciones} onAdd={r=>setRepRecuperaciones(p=>[...p,r])} onDel={id=>setRepRecuperaciones(p=>p.filter(r=>r.id!==id))} onEdit={r=>setRepRecuperaciones(p=>p.map(x=>x.id===r.id?r:x))} recuperacionesAsignadas={recAsig} addRec={addRec} uid={uid} usuario={usuario}/>}
        {step===4&&<PasoResumen rep={repCompleto} objetivo={objetivo} color={color} onEnviar={handleEnviar} enviado={enviado}/>}

        {/* Navegación — oculta cuando hay sub-pantalla activa */}
        {!subPantalla&&<div style={{display:"flex",gap:12,marginTop:24}}>
          {step>0&&(
            <button onClick={()=>setStep(s=>s-1)}
              style={{flex:1,padding:"14px",borderRadius:12,border:`2px solid ${C.border}`,background:"#FFF",color:C.text,fontWeight:600,fontSize:15,cursor:"pointer"}}>
              ← Anterior
            </button>
          )}
          {step<PASOS.length-1&&(
            <button onClick={()=>setStep(s=>s+1)}
              style={{flex:2,padding:"14px",borderRadius:12,border:"none",background:color,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>
              Siguiente →
            </button>
          )}
        </div>}
      </>)}
    </div>
  );
}

// MODULE 3 · ESTADÍSTICAS
// ══════════════════════════════════════════════════════════════════
function Estadisticas({usuario}){
  const {rol,equipo,color,id}=usuario;
  const vend=VENDEDORES.find(v=>v.id===id);

  if(rol==="agente"&&vend){
    const d=vend;
    const ven=(x)=>Number(x)||0;
    const totalV=sum(vend.ventas||[]),pct=vend.ppto?Math.round((totalV/(ven(d.ppto||0)*12))*100):0;
    const wData=SEMANAS.map((s,i)=>({s:`S${s}`,v:(vend.ventas||[])[i]||0,p:vend.ppto,mb:(vend.mb||[])[i]||0}));
    return(
      <div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>
          <KPI label="Ventas acumuladas" value={`${fmt(totalV)}€`} sub={`Obj. ${fmt(ven(d.ppto||0)*12)}€`} color={color} trend={pct-100}/>
          <KPI label="Cumplimiento" value={`${pct}%`} color={pct>=100?C.green:C.amber}/>
          <KPI label="MB medio" value={`${avg(vend.mb||[]).toFixed(1)}%`} color={C.blue}/>
        </div>
        <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:14}}>
          <Card style={{flex:2,minWidth:260}}>
            <SHead>Ventas semanales</SHead>
            <SvgBarChart data={wData} height={180} color="#1A5FD4"/>
          </Card>
          <Card style={{flex:1,minWidth:200}}>
            <SHead>MB% evolución</SHead>
            <SvgLineChart data={wData} height={180} color="#059669"/>
          </Card>
        </div>
        <div style={{display:"flex",gap:14}}>
          <Card style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
            <SHead>Objetivo anual</SHead>
            <Ring pct={pct} color={pct>=100?C.green:color} size={110} stroke={12} label={`${fmt(totalV)}€`} sub={`de ${fmt(ven(d.ppto||0)*12)}€`}/>
          </Card>
        </div>
      </div>
    );
  }

  const d=equipo==="WIKUK"?DW:equipo==="INTERKEY"?DI:null;
  if((rol==="jefe")&&d){
    const vends=VENDEDORES.filter(v=>v.equipo===equipo&&v.rol==="agente");
    const sorted=[...vends].sort((a,b)=>sum(b.ventas)-sum(a.ventas));
    const wData=SEMANAS.map((s,i)=>({s:`S${s}`,v:(d.ventas||[])[i]||0,p:d.ppto,mb:(d.mb||[])[i]||0,desh:(d.desh||[])[i]||0,prep:(d.prep||[])[i]||0}));
    const pct=Math.round((sum(d.ventas||[])/((d.ppto||0)*12))*100);
    return(
      <div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>
          <KPI label="Ventas equipo" value={`${fmt(sum(d.ventas||[]))}€`} color={color} trend={pct-100}/>
          <KPI label="Cumplimiento" value={`${pct}%`} color={pct>=100?C.green:C.amber}/>
          <KPI label="MB medio" value={`${avg(d.mb||[]).toFixed(1)}%`} color={C.blue}/>
          <KPI label="Total muestras" value={sum(d.muestras)} color={color}/>
        </div>
        <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:14}}>
          <Card style={{flex:2,minWidth:260}}>
            <SHead>Ventas semanales vs objetivo</SHead>
            <SvgAreaChart data={wData} height={180} color="#1A5FD4"/>
          </Card>
          <Card style={{flex:1,minWidth:200}}>
            <SHead>Muestras — desglose</SHead>
            <SvgBarChart data={wData} height={180} bars={[{key:"desh",color:"#1A5FD4"},{key:"prep",color:"#1A5FD4"}]}/>
          </Card>
        </div>
        <Card>
          <SHead>Ranking vendedores</SHead>
          {sorted.map((v,i)=>{const vt=sum(v.ventas),mx=sum(sorted[0].ventas);return(
            <div key={v.id} style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13}}>{["🥇","🥈","🥉"][i]||`${i+1}.`} <b>{v.nombre}</b></span><span style={{fontSize:13,fontWeight:800,color}}>{fmt(vt)}€</span></div>
              <div style={{height:6,background:C.border,borderRadius:99}}><div style={{width:`${(vt/mx)*100}%`,height:"100%",background:color,borderRadius:99}}/></div>
            </div>
          );})}
        </Card>
      </div>
    );
  }

  // Director + CEO
  const wData=SEMANAS.map((s,i)=>({s:`S${s}`,WIKUK:DW.ventas[i],INTERKEY:DI.ventas[i],mbW:DW.mb[i],mbI:DI.mb[i]}));
  const tw=sum(DW.ventas),ti=sum(DI.ventas),tot=tw+ti;
  const pieD=[{name:"WIKUK",value:tw,color:C.green},{name:"INTERKEY",value:ti,color:C.amber}];
  const ranking=[...VENDEDORES.filter(v=>v.rol==="agente")].sort((a,b)=>sum(b.ventas)-sum(a.ventas));
  return(
    <div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>
        <KPI label="Ventas consolidadas" value={`${fmt(tot)}€`} color={rol==="ceo"?C.purple:C.blue}/>
        <KPI label="WIKUK" value={`${fmt(tw)}€`} sub={`${Math.round((tw/(DW.ppto*12))*100)}% obj.`} color={C.green}/>
        <KPI label="INTERKEY" value={`${fmt(ti)}€`} sub={`${Math.round((ti/(DI.ppto*12))*100)}% obj.`} color={C.amber}/>
        <KPI label="MB WIKUK" value={`${avg(DW.mb).toFixed(1)}%`} color={C.green}/>
        <KPI label="MB INTERKEY" value={`${avg(DI.mb).toFixed(1)}%`} color={C.amber}/>
      </div>
      <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:14}}>
        <Card style={{flex:3,minWidth:280}}>
          <SHead>Ventas por equipo — semanal</SHead>
          <SvgBarChart data={wData} height={190} bars={[{key:"WIKUK",color:"#1A5FD4"},{key:"INTERKEY",color:"#1A5FD4"}]}/>
        </Card>
        <Card style={{flex:1,minWidth:180,display:"flex",flexDirection:"column",gap:14,alignItems:"center",justifyContent:"center"}}>
          <SHead>Distribución</SHead>
          <SvgPieChart data={pieD} height={130}/>
          {pieD.map(d=><div key={d.name} style={{display:"flex",gap:6,alignItems:"center"}}><div style={{width:8,height:8,borderRadius:99,background:d.color}}/><span style={{fontSize:11,color:C.muted}}>{d.name}</span><span style={{fontSize:11,fontWeight:700,marginLeft:"auto"}}>{Math.round((d.value/tot)*100)}%</span></div>)}
        </Card>
      </div>
      <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:14}}>
        <Card style={{flex:2,minWidth:260}}>
          <SHead>MB% por equipo</SHead>
          <SvgLineChart data={wData} height={170} lines={[{key:"mbW",color:"#1A5FD4"},{key:"mbI",color:"#1A5FD4"}]}/>
        </Card>
        <Card style={{flex:1,minWidth:200}}>
          <SHead>Ranking global</SHead>
          {ranking.map((v,i)=>{const vt=sum(v.ventas),mx=sum(ranking[0].ventas);return(
            <div key={v.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:11}}>{["🥇","🥈","🥉"][i]||`${i+1}.`} <b>{v.nombre.split(" ")[0]}</b></span><span style={{fontSize:11,fontWeight:800,color:v.color}}>{fmt(vt)}€</span></div>
              <div style={{height:4,background:C.border,borderRadius:99}}><div style={{width:`${(vt/mx)*100}%`,height:"100%",background:v.color,borderRadius:99}}/></div>
            </div>
          );})}
        </Card>
      </div>
    </div>
  );
}

// MODULE 4 · INCIDENCIAS
// ══════════════════════════════════════════════════════════════════
function IncModal({inc,persona,onClose,onUpdate,respConfig={}}){
  const [sol,setSol]=useState(inc.solucion||"");
  const [accion,setAccion]=useState(inc.accionPendiente||"");
  const [estado,setEstado]=useState(inc.estado);
  const [selDpto,setSelDpto]=useState("");
  const tipo=TIPOS_INC.find(t=>t.k===inc.tipo);
  const prio=PRIOS.find(p=>p.k===inc.prioridad);
  const autor=VENDEDORES.find(a=>a.id===inc.agenteId);

  const dpto = inc.departamentoEscalado ? DEPARTAMENTOS.find(d=>d.k===inc.departamentoEscalado) : null;
  const escalada = !!inc.departamentoEscalado;

  // Permisos
  const esAgente   = persona.rol==="agente" && inc.agenteId===persona.id;
  const esJefe     = persona.rol==="jefe" && persona.equipo===inc.equipo;
  const esDirector = persona.rol==="director";
  const esCEO      = persona.rol==="ceo";
  const esResp     = persona.rol==="responsable" && inc.responsableId===persona.id;

  // Jefe SIEMPRE puede editar/cerrar su incidencia (con o sin escalar)
  const puedeEditar = esJefe || esResp || esDirector;
  // Solo jefe puede escalar (si no está ya resuelta)
  const puedeEscalar = esJefe && !escalada && inc.estado!=="resuelta" && inc.estado!=="sin_solucion";
  // CEO solo lee, agente solo lee la suya
  const soloLectura = esAgente || esCEO;
  // Responsable puede marcar para CEO
  const [notifCEO,setNotifCEO] = useState(!!inc.notificarCEO);

  const agenteName=(id)=>VENDEDORES.find(v=>v.id===id)?.nombre||id||"";
  const respName=(uid)=>VENDEDORES.find(v=>v.id===uid)?.nombre||uid||"Sin asignar";

  return(
    <div style={{position:"fixed",inset:0,background:"#00000077",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:8}}>
      <div style={{background:C.white,borderRadius:16,width:"min(620px,96vw)",maxHeight:"90vh",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 24px 64px #0004"}}>

        {/* Header */}
        <div style={{padding:"16px 22px",borderBottom:`1px solid ${C.border}`,background:escalada?(dpto?.color||C.muted)+"12":prio?.color+"0C"}}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8,alignItems:"center"}}>
            <span style={{fontSize:13}}>{prio?.dot}</span>
            <Tag label={tipo?.label} color={tipo?.color||C.muted}/>
            <Tag label={inc.equipo} color={inc.equipo==="WIKUK"?C.green:C.amber}/>
            <Tag label={`S${inc.semana}`} color={C.muted} bg={C.bg}/>
            {escalada&&<span style={{padding:"3px 10px",borderRadius:6,background:(dpto?.color||C.muted)+"20",color:dpto?.color||C.muted,fontSize:11,fontWeight:700}}>{dpto?.icon} Escalada a {dpto?.label}</span>}
            {esCEO&&<span style={{padding:"3px 8px",borderRadius:5,background:C.purpleL,color:C.purple,fontSize:10,fontWeight:700}}>👁 Solo lectura</span>}
          </div>
          <p style={{margin:"0 0 6px",fontSize:15,fontWeight:800,color:C.text}}>{inc.titulo}</p>
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            <Avt nombre={autor?.nombre||"?"} color={autor?.color||C.muted} size={20}/>
            <span style={{fontSize:11,color:C.muted}}>Reportado por <b style={{color:C.text}}>{autor?.nombre}</b></span>
            {escalada&&inc.responsableId&&(
              <span style={{fontSize:11,color:C.muted,marginLeft:8}}>→ Resp: <b style={{color:dpto?.color}}>{respName(inc.responsableId)}</b></span>
            )}
          </div>
        </div>

        <div style={{overflowY:"auto",flex:1,padding:"18px 22px"}}>

          {/* Descripción */}
          <p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Descripción</p>
          <p style={{margin:"0 0 16px",fontSize:13,color:C.text,lineHeight:1.6,background:C.bg,borderRadius:8,padding:"10px 12px"}}>{inc.desc}</p>

          {/* Estado */}
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:16}}>
            <p style={{margin:0,fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Estado:</p>
            <Tag label={(ESTADOS_INC[estado]||ESTADOS_INC.abierta).label} color={(ESTADOS_INC[estado]||ESTADOS_INC.abierta).color} bg={(ESTADOS_INC[estado]||ESTADOS_INC.abierta).bg}/>
          </div>

          {/* Historial escalado */}
          {(inc.historialEscalado||[]).length>0&&(
            <div style={{marginBottom:16}}>
              <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Historial</p>
              {inc.historialEscalado.map((h,i)=>(
                <div key={i} style={{display:"flex",gap:8,padding:"6px 10px",background:C.bg,borderRadius:7,marginBottom:5,borderLeft:`3px solid ${DEPARTAMENTOS.find(d=>d.k===h.dpto)?.color||C.muted}`}}>
                  <span>{DEPARTAMENTOS.find(d=>d.k===h.dpto)?.icon||"→"}</span>
                  <div>
                    <p style={{margin:0,fontSize:11,fontWeight:700,color:C.text}}>{h.accion}</p>
                    <p style={{margin:0,fontSize:10,color:C.muted}}>{h.por} · {h.fecha}</p>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Panel responsable / jefe: editar */}
          {puedeEditar&&(
            <>
              <p style={{margin:"0 0 6px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Actualizar estado</p>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14}}>
                {Object.entries(ESTADOS_INC).map(([k,v])=>(
                  <button key={k} onClick={()=>setEstado(k)} style={{padding:"6px 12px",borderRadius:7,border:`2px solid ${estado===k?v.color:C.border}`,background:estado===k?v.bg:"transparent",color:estado===k?v.color:C.muted,fontWeight:estado===k?700:400,fontSize:12,cursor:"pointer"}}>{v.label}</button>
                ))}
              </div>
              <p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Solución / Respuesta</p>
              <textarea value={sol} onChange={e=>setSol(e.target.value)} rows={3} placeholder="Describe la acción tomada…" style={{...iSt,resize:"vertical",lineHeight:1.5,marginBottom:12}}/>
              <p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Acción pendiente</p>
              <textarea value={accion} onChange={e=>setAccion(e.target.value)} rows={2} placeholder="¿Qué queda por hacer?" style={{...iSt,resize:"vertical",lineHeight:1.5,marginBottom:14}}/>
            </>
          )}

          {/* Panel escalar (solo jefe, solo si no escalada) */}
          {puedeEscalar&&(
            <div style={{background:"#FFF7F0",borderRadius:12,padding:"14px 16px",border:`1px solid #C2622D44`}}>
              <p style={{margin:"0 0 10px",fontSize:12,fontWeight:800,color:"#C2622D"}}>📤 Escalar a departamento</p>
              <p style={{margin:"0 0 10px",fontSize:12,color:C.muted}}>Selecciona el departamento responsable de resolver esta incidencia:</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                {DEPARTAMENTOS.map(d=>{
                  const respUid=respConfig[d.k];
                  const respNombre=respUid?respName(respUid):"Sin responsable";
                  return(
                    <button key={d.k} onClick={()=>setSelDpto(selDpto===d.k?"":d.k)}
                      style={{padding:"8px 14px",borderRadius:9,border:`2px solid ${selDpto===d.k?d.color:C.border}`,background:selDpto===d.k?d.color+"18":"#fff",color:selDpto===d.k?d.color:C.muted,fontWeight:selDpto===d.k?700:400,fontSize:12,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:80}}>
                      <span style={{fontSize:18}}>{d.icon}</span>
                      <span>{d.label}</span>
                      <span style={{fontSize:9,color:selDpto===d.k?d.color:C.light}}>{respNombre}</span>
                    </button>
                  );
                })}
              </div>
              {selDpto&&(
                <button onClick={()=>{
                  const d=DEPARTAMENTOS.find(x=>x.k===selDpto);
                  const respUid=respConfig[selDpto]||null;
                  const histEntry={dpto:selDpto,accion:`Escalada a ${d?.label} (${respName(respUid)})`,por:persona.nombre||persona.id,fecha:new Date().toLocaleDateString("es-ES")};
                  onUpdate({...inc,estado:"en_proceso",departamentoEscalado:selDpto,responsableId:respUid,historialEscalado:[...(inc.historialEscalado||[]),histEntry]});
                  onClose();
                }} style={{width:"100%",padding:"10px",borderRadius:9,border:"none",background:DEPARTAMENTOS.find(d=>d.k===selDpto)?.color||C.navy,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                  Escalar a {DEPARTAMENTOS.find(d=>d.k===selDpto)?.label} {DEPARTAMENTOS.find(d=>d.k===selDpto)?.icon}
                </button>
              )}
            </div>
          )}

          {/* Responsable: marcar para CEO */}
          {esResp&&(
            <button onClick={()=>setNotifCEO(n=>!n)}
              style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderRadius:9,border:`2px solid ${notifCEO?C.purple:C.border}`,background:notifCEO?C.purpleL:"transparent",cursor:"pointer",fontSize:12,fontWeight:notifCEO?700:400,color:notifCEO?C.purple:C.muted,marginTop:12}}>
              <div style={{width:16,height:16,borderRadius:4,border:`2px solid ${notifCEO?C.purple:C.border}`,background:notifCEO?C.purple:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                {notifCEO&&<span style={{color:"#fff",fontSize:10,fontWeight:900}}>✓</span>}
              </div>
              👁 Notificar al CEO — requiere su conocimiento
            </button>
          )}

          {/* Solo lectura: solución si existe */}
          {soloLectura&&inc.solucion&&(
            <div style={{background:inc.estado==="resuelta"?C.greenL:C.amberL,borderRadius:8,padding:"10px 12px",fontSize:13,color:C.text}}>{inc.solucion}</div>
          )}
        </div>

        <div style={{padding:"12px 22px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"flex-end",gap:10}}>
          <button onClick={onClose} style={{padding:"8px 18px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>Cerrar</button>
          {puedeEditar&&<button onClick={()=>{onUpdate({...inc,solucion:sol,accionPendiente:accion,estado,notificarCEO:notifCEO,fechaSolucion:estado==="resuelta"?new Date().toISOString().split("T")[0]:inc.fechaSolucion});onClose();}} style={{padding:"8px 22px",borderRadius:8,border:"none",background:C.blue,color:C.white,fontWeight:700,fontSize:13,cursor:"pointer"}}>Guardar</button>}
        </div>
      </div>
    </div>
  );
}

const FB_BASE = `https://firestore.googleapis.com/v1/projects/${OPO_FB_PROJECT}/databases/(default)/documents`;

function toFirestore(obj) {
  const fields = {};
  Object.entries(obj).forEach(([k, v]) => {
    if (v === null || v === undefined) fields[k] = {nullValue: null};
    else if (typeof v === "boolean") fields[k] = {booleanValue: v};
    else if (typeof v === "number") fields[k] = {integerValue: String(v)};
    else if (typeof v === "string") fields[k] = {stringValue: v};
    else if (Array.isArray(v)) fields[k] = {arrayValue: {values: v.map(x =>
      typeof x === "string" ? {stringValue: x} :
      typeof x === "number" ? {integerValue: String(x)} :
      typeof x === "object" && x !== null ? {mapValue: {fields: toFirestore(x).fields}} :
      {nullValue: null}
    )}};
    else if (typeof v === "object") fields[k] = {mapValue: {fields: toFirestore(v).fields}};
  });
  return {fields};
}

function fromFirestore(doc) {
  if (!doc.fields) return {id: doc.name?.split("/").pop()};
  const obj = {id: doc.name?.split("/").pop()};
  Object.entries(doc.fields).forEach(([k, v]) => {
    if (v.stringValue !== undefined) obj[k] = v.stringValue;
    else if (v.integerValue !== undefined) obj[k] = parseInt(v.integerValue);
    else if (v.doubleValue !== undefined) obj[k] = v.doubleValue;
    else if (v.booleanValue !== undefined) obj[k] = v.booleanValue;
    else if (v.nullValue !== undefined) obj[k] = null;
    else if (v.arrayValue) obj[k] = (v.arrayValue.values || []).map(x =>
      x.stringValue ?? x.integerValue ?? x.doubleValue ?? x.booleanValue ??
      (x.mapValue ? fromFirestore({name:"", fields: x.mapValue.fields}) : null)
    );
    else if (v.mapValue) obj[k] = fromFirestore({name:"", fields: v.mapValue.fields});
  });
  return obj;
}

// Comprime imagen base64 para no superar el límite de Firestore (1MB/doc)
async function comprimirImagen(base64, maxWidth=600, quality=0.65) {
  return new Promise(res=>{
    try {
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const ratio=Math.min(1, maxWidth/img.width);
        canvas.width=img.width*ratio; canvas.height=img.height*ratio;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        res(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror=()=>res(base64);
      img.src=base64;
    } catch(e){ res(base64); }
  });
}

async function fbGuardar(id, datos) {
  // Comprimir imágenes antes de guardar
  let datosLimpios = {...datos};
  if (datosLimpios.imagenes && datosLimpios.imagenes.length > 0) {
    datosLimpios.imagenes = await Promise.all(
      datosLimpios.imagenes.map(async img => ({
        ...img,
        src: img.src && img.src.startsWith('data:') ? await comprimirImagen(img.src) : (img.src||'')
      }))
    );
  }
  if (datosLimpios.tarjetaVisita && datosLimpios.tarjetaVisita.startsWith('data:')) {
    datosLimpios.tarjetaVisita = await comprimirImagen(datosLimpios.tarjetaVisita, 800, 0.7);
  }
  const url = `${FB_BASE}/oportunidades/${id}`;
  const body = toFirestore(datosLimpios);
  try {
    const r = await fetch(`${url}?updateMask.fieldPaths=${Object.keys(datosLimpios).join("&updateMask.fieldPaths=")}`, {
      method: "PATCH", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body)
    });
    if (!r.ok) { const err=await r.json(); console.warn("FB error:", err); }
    return r.ok;
  } catch(e) { console.warn("FB write:", e.message); return false; }
}

async function fbCargar() {
  try {
    let docs = [], nextPage = null, intentos = 0;
    do {
      const url = `${FB_BASE}/oportunidades?pageSize=100${nextPage ? "&pageToken=" + nextPage : ""}`;
      const r = await fetch(url);
      const data = await r.json();
      if (data.documents) docs = [...docs, ...data.documents.map(fromFirestore)];
      nextPage = data.nextPageToken || null;
      intentos++;
    } while (nextPage && intentos < 5);
    return docs;
  } catch(e) { console.warn("FB read:", e.message); return []; }
}

async function fbEliminar(id) {
  try {
    await fetch(`${FB_BASE}/oportunidades/${id}`, {method: "DELETE"});
    return true;
  } catch(e) { return false; }
}

function Paso4({form,upd,onNext,onBack}){
  const valid=(form.descripcionOportunidad||"").trim().length>10;

  const [transcribiendo,setTranscribiendo]=useState(false);
  const [error,setError]=useState(null);
  const mediaRef=useRef(null);
  const chunksRef=useRef([]);

  const iniciarGrabacion=async()=>{
    setError(null);
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const mr=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported("audio/webm")?"audio/webm":"audio/mp4"});
      chunksRef.current=[];
      mr.ondataavailable=e=>{if(e.data.size>0) chunksRef.current.push(e.data);};
      mr.onstop=async()=>{
        stream.getTracks().forEach(t=>t.stop());
        setGrabando(false);
        setTranscribiendo(true);
        try{
          const blob=new Blob(chunksRef.current,{type:mr.mimeType});
          const base64=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(",")[1]);r.readAsDataURL(blob);});
          const resp=await fetch("https://api.anthropic.com/v1/messages",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
              model:"claude-sonnet-4-20250514",
              max_tokens:1000,
              messages:[{role:"user",content:[
                {type:"text",text:"Transcribe este audio exactamente en español. Devuelve SOLO el texto transcrito, sin comentarios, sin comillas, sin formato adicional. Si no hay audio o no se entiende, devuelve una cadena vacía."},
                {type:"document",source:{type:"base64",media_type:mr.mimeType,data:base64}}
              ]}]
            })
          });
          const data=await resp.json();
          const texto=(data.content?.[0]?.text||"").trim();
          if(texto){
            const actual=form.descripcionOportunidad||"";
            upd("descripcionOportunidad",(actual+(actual&&!actual.endsWith(" ")?" ":"")+texto));
          }
        }catch(e){setError("Error al transcribir. Escribe manualmente.");}
        setTranscribiendo(false);
      };
      mr.start();
      mediaRef.current=mr;
      setGrabando(true);
    }catch(e){
      if(e.name==="NotAllowedError"||e.name==="PermissionDeniedError"){
        setError("⚠️ Permiso de micrófono denegado. En iOS: Ajustes → Safari → Micrófono → Permitir. En Chrome: haz clic en el candado de la barra de dirección → Micrófono → Permitir.");
      } else if(e.name==="NotFoundError"){
        setError("⚠️ No se detectó micrófono. Conecta uno e inténtalo de nuevo.");
      } else {
        setError("⚠️ El micrófono no está disponible aquí. Escribe la descripción manualmente — funcionará en la app de Vercel.");
      }
    }
  };

  const pararGrabacion=()=>{
    if(mediaRef.current&&mediaRef.current.state==="recording"){
      mediaRef.current.stop();
    }
  };

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div><h2 style={{margin:"0 0 5px",fontSize:20,fontWeight:800,color:C.navy}}>¿Cuál es la oportunidad?</h2><p style={{margin:0,fontSize:13,color:C.muted}}>Describe el objetivo, el producto y por qué tienes posibilidades</p></div>

      {["Producto o gama que quieres introducir","Volumen estimado mensual","Lo que usa actualmente el cliente","Tu ventaja sobre la competencia","Plazo estimado para cerrar"].map((t,i)=><p key={i} style={{margin:"0 0 2px",fontSize:12,color:C.muted}}>· {t}</p>)}
    </div>
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <p style={{margin:0,fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:".05em"}}>Descripción *</p>
        {!grabando&&!transcribiendo&&(
          <button onClick={iniciarGrabacion}
            style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:8,border:`2px solid ${C.border}`,background:"#fff",color:C.muted,fontWeight:700,fontSize:12,cursor:"pointer"}}>
            <span style={{fontSize:15}}>🎙️</span> Hablar
          </button>

        {grabando&&(
          <button onClick={pararGrabacion}
            style={{display:"flex",alignItems:"center",gap:8,padding:"7px 14px",borderRadius:8,border:"2px solid #DC2626",background:"#FEF2F2",color:"#DC2626",fontWeight:700,fontSize:12,cursor:"pointer"}}>
            <span style={{width:10,height:10,borderRadius:"50%",background:"#DC2626",display:"inline-block",animation:"micpulse 1s infinite"}}/>
            Grabando… toca para parar
          </button>
        )}
        {transcribiendo&&(
          <span style={{display:"flex",alignItems:"center",gap:6,padding:"7px 14px",fontSize:12,color:C.blue,fontWeight:700}}>
            <span style={{fontSize:14}}>⏳</span> Transcribiendo…

      </div>
      <style>{`@keyframes micpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)}}`}</style>

      <div style={{flex:1,overflowY:"auto",padding:"22px 24px"}}>
        {paso===1&&<Paso1 form={form} upd={upd} onNext={()=>setPaso(2)}/>}

        {paso===3&&<Paso3 form={form} upd={upd} onNext={()=>setPaso(4)} onBack={()=>setPaso(2)}/>}

        {paso===6&&<Paso6 form={form} onSave={save} onBack={()=>setPaso(5)}/>}
      </div>
    </div>
  </div>);
}

    onUpdate({...opo,notas:[...notas,n],historial:[...hist,entry],estado:opo.esOportunidad!==false?"seguimiento":opo.estado});
    setNota("");
  };

  const asignar=()=>{
    if(!asignarId) return;
    const a=AGENTES.find(v=>v.id===asignarId);
    const entry={accion:`Asignada a ${a?.nombre}`,por:"Demo User",fecha:new Date().toLocaleDateString("es-ES"),nota:""};
    onUpdate({...opo,agenteId:asignarId,estado:"asignada",historial:[...hist,entry]});
    setShowAsignar(false);
  };

  const convertir=()=>{
    if(!tipologia) return;
    const tip=TIPOLOGIAS.find(t=>t.k===tipologia);
    const entry={accion:`✅ Convertida — ${tip?.icon} ${tip?.l} · Ruta ${ruta}`,por:"Demo User",fecha:new Date().toLocaleDateString("es-ES"),nota:"Seguimiento en informes semanales."};
    onUpdate({...opo,estado:"ganada",esOportunidad:false,tipoCliente:tipologia,rutaAsignada:parseInt(ruta),historial:[...hist,entry]});
    setShowCerrar(false);
    onClose();
  };

  const perder=()=>{
    const entry={accion:"❌ Oportunidad perdida",por:"Demo User",fecha:new Date().toLocaleDateString("es-ES"),nota:""};
    onUpdate({...opo,estado:"perdida",esOportunidad:false,historial:[...hist,entry]});
    onClose();

  const inp2={...inp,fontSize:13};

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:8}}>
      <div style={{background:"#fff",borderRadius:18,width:"min(680px,98vw)",maxHeight:"94vh",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 32px 80px #0006"}}>

        <div style={{padding:"14px 20px",background:C.navy,flexShrink:0}}>
          <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{padding:"3px 10px",borderRadius:6,background:est.bg,color:est.color,fontSize:11,fontWeight:700}}>{est.dot} {est.label}</span>
            <span style={{fontSize:11,color:"#94A3B8"}}>{tipo?.icon} {tipo?.l}</span>
            {opo.tipologia&&<span style={{fontSize:11,color:"#94A3B8"}}>· {TIPOLOGIAS.find(t=>t.k===opo.tipologia)?.icon} {TIPOLOGIAS.find(t=>t.k===opo.tipologia)?.l}</span>}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div><p style={{margin:"0 0 2px",fontSize:17,fontWeight:800,color:"#fff"}}>{opo.nombre}</p>
            <p style={{margin:0,fontSize:11,color:"#94A3B8"}}>Creada por {opo.creadaPorNombre} · {opo.creadaEn}</p></div>
            <button onClick={onClose} style={{background:"none",border:"none",color:"#94A3B8",fontSize:22,cursor:"pointer",marginLeft:8}}>✕</button>
          </div>
        </div>

        <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:C.bg,flexShrink:0,overflowX:"auto"}}>
          {[["info","📋 Info"],["notas",`📝 Notas${notas.length>0?` (${notas.length})`:""}`],["imagenes",`📷 Imgs${imgs.length>0?` (${imgs.length})`:""}`],["historial",`📅 Historia (${hist.length})`]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{padding:"10px 14px",border:"none",borderBottom:`2px solid ${tab===k?C.blue:"transparent"}`,background:"transparent",color:tab===k?C.blue:C.muted,fontWeight:tab===k?700:400,fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>{l}</button>
          ))}
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>

          {tab==="info"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:C.bg,borderRadius:12,padding:"14px 16px"}}>
              <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>🏢 Datos del cliente</p>
              {opo.tarjetaVisita&&(
                <div style={{marginBottom:12,borderRadius:10,overflow:"hidden",border:`1px solid ${C.border}`,background:"#f4f4f4",position:"relative"}}>
                  <img src={opo.tarjetaVisita} alt="Tarjeta" style={{width:"100%",maxHeight:180,objectFit:"contain",display:"block"}}/>
                  <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"5px 10px",background:"rgba(0,0,0,.45)"}}>
                    <p style={{margin:0,fontSize:10,color:"#fff",fontWeight:600,letterSpacing:".05em"}}>📇 TARJETA DE VISITA</p>
                  </div>
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
                {[["Contacto",opo.contacto],["Cargo",opo.cargo],["Tel.",opo.tel],["Email",opo.email],["Ciudad",opo.ciudad]].filter(([,v])=>v).map(([k,v])=>(
                  <p key={k} style={{margin:0,fontSize:12,color:C.text}}><span style={{color:C.muted}}>{k}: </span><b>{v}</b></p>

              </div>
              {opo.descripcionCliente&&<p style={{margin:"10px 0 0",fontSize:12,color:C.text,lineHeight:1.5,borderTop:`1px solid ${C.border}`,paddingTop:8}}>{opo.descripcionCliente}</p>}

            <div style={{background:C.orangeL,borderRadius:12,padding:"14px 16px",border:`1px solid ${C.orange}22`}}>
              <p style={{margin:"0 0 6px",fontSize:10,fontWeight:700,color:C.orange,textTransform:"uppercase"}}>🎯 Oportunidad</p>
              <p style={{margin:0,fontSize:13,color:C.text,lineHeight:1.7}}>{opo.descripcionOportunidad}</p>
            </div>
            <div style={{background:C.bg,borderRadius:12,padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
              {ag?<><Avt nombre={ag.nombre} color={ag.color} size={40}/><div style={{flex:1}}><p style={{margin:0,fontSize:13,fontWeight:700,color:C.text}}>{ag.nombre}</p><p style={{margin:"2px 0 0",fontSize:11,color:C.muted}}>{ag.equipo}</p></div></>
              :<><div style={{width:40,height:40,borderRadius:10,background:C.light,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>👤</div><p style={{margin:0,fontSize:13,color:C.muted,fontStyle:"italic",flex:1}}>Sin agente asignado</p></>}
              <button onClick={()=>setShowAsignar(s=>!s)} style={{padding:"7px 14px",borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",color:C.blue,fontSize:12,fontWeight:600,cursor:"pointer"}}>{ag?"Reasignar":"Asignar"}</button>
            </div>
            {showAsignar&&<div style={{background:C.bg,borderRadius:10,padding:"12px 14px",border:`1px solid ${C.border}`}}>
              <select value={asignarId} onChange={e=>setAsignarId(e.target.value)} style={{...inp2,marginBottom:8}}>
                <option value="">Sin asignar</option>
                {AGENTES.map(v=><option key={v.id} value={v.id}>{v.nombre} ({v.equipo})</option>)}
              </select>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setShowAsignar(false)} style={{flex:1,padding:"9px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontSize:13,cursor:"pointer"}}>Cancelar</button>

            {opo.estado==="ganada"&&<div style={{background:C.greenL,borderRadius:12,padding:"12px 14px",border:`1px solid #6EE7B7`,display:"flex",gap:10,alignItems:"center"}}>

              <div><p style={{margin:0,fontSize:13,fontWeight:700,color:C.green}}>Cliente convertido al CRM</p>
              <p style={{margin:"2px 0 0",fontSize:12,color:C.muted}}>Ruta {opo.rutaAsignada} · {TIPOLOGIAS.find(t=>t.k===opo.tipoCliente)?.icon} {TIPOLOGIAS.find(t=>t.k===opo.tipoCliente)?.l} · Seguimiento en informes semanales</p></div>
            </div>}
          </div>}

          {tab==="notas"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{background:"#fff",borderRadius:10,border:`1px solid ${C.border}`,padding:"14px"}}>
              <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Nueva nota de seguimiento</p>
              <textarea value={nota} onChange={e=>setNota(e.target.value)} rows={4}
                placeholder="Resultado de la visita, conversación, objeciones, siguientes pasos…"
                style={{...inp2,resize:"vertical",lineHeight:1.6,marginBottom:8}}/>
              <button onClick={addNota} disabled={!nota.trim()}
                style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:nota.trim()?C.blue:C.light,color:"#fff",fontWeight:700,fontSize:13,cursor:nota.trim()?"pointer":"default"}}>
                💾 Guardar nota en Firebase
              </button>
            </div>
            {notas.length===0&&<p style={{textAlign:"center",padding:"30px",fontSize:13,color:C.muted,fontStyle:"italic"}}>Sin notas — añade la primera</p>}
            {[...notas].reverse().map(n=>(
              <div key={n.id} style={{background:C.bg,borderRadius:10,padding:"13px 15px",borderLeft:`3px solid ${C.blue}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:7,flexWrap:"wrap",gap:4}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    {AGENTES.find(a=>a.nombre===n.por)&&<Avt nombre={n.por} color={AGENTES.find(a=>a.nombre===n.por)?.color} size={22}/>}
                    <span style={{fontSize:12,fontWeight:700,color:C.blue}}>{n.por}</span>
                  </div>
                  <span style={{fontSize:11,color:C.muted}}>{n.fecha}</span>
                </div>
                <p style={{margin:0,fontSize:13,color:C.text,lineHeight:1.7}}>{n.texto}</p>
              </div>
            ))}
          </div>}

          {tab==="imagenes"&&<div>
            {imgs.length===0?<div style={{textAlign:"center",padding:"50px 20px",background:C.bg,borderRadius:12,border:`1px solid ${C.border}`}}>
              <p style={{fontSize:40,margin:"0 0 10px"}}>📷</p>
              <p style={{margin:"0 0 4px",fontSize:14,fontWeight:700,color:C.text}}>Sin imágenes</p>
              <p style={{margin:0,fontSize:12,color:C.muted}}>Se añaden al crear la oportunidad</p>
            </div>:
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {imgs.map((img,i)=>(
                <div key={img.id||i} style={{borderRadius:12,overflow:"hidden",border:`1px solid ${C.border}`}}>
                  <div style={{position:"relative"}}>
                    <img src={img.src} alt="" style={{width:"100%",maxHeight:280,objectFit:"contain",background:"#f4f4f4",display:"block"}}/>
                    <div style={{position:"absolute",bottom:8,left:8,background:"rgba(0,0,0,.6)",borderRadius:6,padding:"3px 10px"}}>
                      <span style={{fontSize:11,color:"#fff",fontWeight:600}}>Imagen {i+1}</span>
                    </div>
                  </div>
                  {img.nota&&<div style={{padding:"10px 14px",background:"#fff"}}>
                    <p style={{margin:0,fontSize:12,color:C.text,lineHeight:1.5}}><span style={{color:C.muted,fontWeight:700}}>Descripción: </span>{img.nota}</p>
                  </div>}
                </div>
              ))}
            </div>}
          </div>}

          {tab==="historial"&&<div style={{display:"flex",flexDirection:"column",gap:0}}>
            {[...hist].reverse().map((h,i)=>(
              <div key={i} style={{display:"flex",gap:0,marginBottom:0}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginRight:12,flexShrink:0}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:h.accion.includes("✅")?"#ECFDF5":h.accion.includes("❌")?C.redL:h.accion.includes("creada")?C.purpleL:C.blueL,border:`2px solid ${h.accion.includes("✅")?C.green:h.accion.includes("❌")?C.red:h.accion.includes("creada")?C.purple:C.blue}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,zIndex:1}}>
                    {h.accion.includes("✅")?"✅":h.accion.includes("❌")?"❌":h.accion.includes("creada")?"🎯":h.accion.includes("Asignada")?"👤":"📝"}
                  </div>
                  {i<hist.length-1&&<div style={{width:2,flex:1,minHeight:20,background:C.border}}/>}
                </div>
                <div style={{flex:1,paddingBottom:16,paddingTop:4}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,flexWrap:"wrap",gap:4}}>
                    <span style={{fontSize:13,fontWeight:700,color:C.text}}>{h.accion}</span>
                    <span style={{fontSize:11,color:C.muted}}>{h.por} · {h.fecha}</span>
                  </div>
                  {h.nota&&<div style={{background:C.bg,borderRadius:8,padding:"8px 12px",fontSize:12,color:C.muted,lineHeight:1.5}}>{h.nota}</div>}
                </div>
              </div>
            ))}
          </div>}
        </div>

        <div style={{padding:"12px 20px",borderTop:`1px solid ${C.border}`,background:C.bg,flexShrink:0}}>
          {opo.esOportunidad!==false&&!showCerrar&&<div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowCerrar(true)} style={{flex:2,padding:"11px",borderRadius:9,border:"none",background:C.green,color:"#fff",fontWeight:800,fontSize:13,cursor:"pointer"}}>✅ Convertir a cliente CRM</button>
            <button onClick={perder} style={{flex:1,padding:"11px",borderRadius:9,border:"none",background:C.redL,color:C.red,fontWeight:700,fontSize:13,cursor:"pointer"}}>❌ Perdida</button>
            <button onClick={onClose} style={{padding:"11px 16px",borderRadius:9,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>Cerrar</button>
          </div>}
          {opo.esOportunidad!==false&&showCerrar&&<div style={{background:"#fff",borderRadius:12,padding:"14px",border:`1px solid ${C.green}44`}}>
            <p style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:C.green}}>✅ Selecciona tipología y ruta</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              {TIPOLOGIAS.map(t=><button key={t.k} onClick={()=>setTipologia(t.k)} style={{padding:"7px 12px",borderRadius:8,border:`2px solid ${tipologia===t.k?C.green:C.border}`,background:tipologia===t.k?C.greenL:"#fff",color:tipologia===t.k?C.green:C.muted,fontWeight:tipologia===t.k?700:400,fontSize:12,cursor:"pointer"}}>{t.icon} {t.l}</button>)}
            </div>
            <div style={{display:"flex",gap:6,marginBottom:10,alignItems:"center"}}>
              {[1,2,3,4,5].map(r=><button key={r} onClick={()=>setRuta(String(r))} style={{width:40,height:40,borderRadius:8,border:`2px solid ${ruta===String(r)?C.navy:C.border}`,background:ruta===String(r)?C.navy:"#fff",color:ruta===String(r)?"#fff":C.muted,fontWeight:800,fontSize:15,cursor:"pointer"}}>{r}</button>)}
              <span style={{fontSize:12,color:C.muted}}>← Ruta del agente</span>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowCerrar(false)} style={{flex:1,padding:"10px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontSize:13,cursor:"pointer"}}>Cancelar</button>
              <button onClick={convertir} disabled={!tipologia} style={{flex:2,padding:"10px",borderRadius:8,border:"none",background:tipologia?C.green:C.light,color:"#fff",fontWeight:800,fontSize:13,cursor:tipologia?"pointer":"default"}}>Confirmar →</button>
            </div>
          </div>}
          {opo.esOportunidad===false&&<button onClick={onClose} style={{width:"100%",padding:"10px",borderRadius:9,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>Cerrar</button>}
        </div>
      </div>
    </div>
  );
}
