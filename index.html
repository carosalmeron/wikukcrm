                      <div style={{flex:1,minWidth:0}}>
                        <p style={{margin:0,fontSize:12,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v.clienteNombre}</p>
                        <p style={{margin:0,fontSize:11,color:rv?.color||C.muted,fontWeight:600}}>{rv?.label||v.resultado}</p>
                      </div>
                      {v.notas&&<p style={{margin:0,fontSize:10,color:C.muted,fontStyle:"italic",maxWidth:100,textAlign:"right"}}>{v.notas.slice(0,30)}</p>}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Muestras */}
          {muestrasAg.length>0&&(
            <div style={{marginBottom:16}}>
              <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Muestras entregadas</p>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {muestrasAg.map((m,i)=>(
                  <div key={i} style={{background:"#FFF",borderRadius:10,padding:"10px 14px",border:`1px solid ${C.border}`,display:"flex",gap:10,alignItems:"center"}}>
                    <span style={{fontSize:16}}>📦</span>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{margin:0,fontSize:12,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.prodNombre||m.nombre}</p>
                      <p style={{margin:0,fontSize:11,color:C.muted}}>{m.tipo} · {m.cantidad} uds{m.clienteNombre?` · ${m.clienteNombre}`:""}</p>
                    </div>
                    <span style={{fontSize:11,fontWeight:700,color:FEEDBACK_MUESTRA[m.estado]?.color||C.muted}}>{FEEDBACK_MUESTRA[m.estado]?.icon}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Estrategias del agente */}
          {recsAg.length>0&&(
            <div>
              <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Estrategias</p>
              {recsAg.map(r=>{
                const est=ESTADOS_REC[r.estado]||ESTADOS_REC.en_curso;
                return(
                  <div key={r.id} style={{background:"#FFF",borderRadius:10,padding:"11px 14px",marginBottom:6,border:`1.5px solid ${est.color}33`,borderLeft:`4px solid ${est.color}`}}>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span>{est.dot}</span>
                      <p style={{margin:0,fontSize:13,fontWeight:700,flex:1}}>{r.clienteNombre}</p>
                      <span style={{fontSize:11,fontWeight:700,color:est.color}}>{est.label}</span>
                    </div>
                    {r.objetivo&&<p style={{margin:"4px 0 0",fontSize:11,color:C.muted}}>{r.objetivo.slice(0,60)}</p>}
                  </div>
                );
              })}
            </div>
          )}

          {visitasAg.length===0&&muestrasAg.length===0&&recsAg.length===0&&!rep&&(
            <div style={{textAlign:"center",padding:"32px",color:C.muted}}>
              <span style={{fontSize:32,display:"block",marginBottom:8}}>📭</span>
              <p style={{margin:0,fontSize:14,fontWeight:600}}>Sin actividad registrada esta semana</p>
            </div>
          )}
        </div>
      );
    }

    // ── Vista principal jefe: equipo ────────────────────────────────
    return(
      <div>
        {/* Tabs */}
        <div style={{display:"flex",gap:6,marginBottom:20}}>
          {[
            {id:"semana",       label:"📋 Semana",      badge:0},
            {id:"pendientes",   label:"⏳ Pendientes",   badge:pendAprobacion.length},
            {id:"estrategias",  label:"🔄 Estrategias",  badge:0},
          ].map(t=>(
            <button key={t.id} onClick={()=>setTabJefe(t.id)}
              style={{flex:1,padding:"10px 4px",borderRadius:11,border:"none",background:tabJefe===t.id?C.navy:"#FFF",color:tabJefe===t.id?"#fff":C.muted,fontWeight:700,fontSize:11,cursor:"pointer",boxShadow:"0 1px 4px #0001",position:"relative"}}>
              {t.label}
              {t.badge>0&&<span style={{position:"absolute",top:5,right:5,background:C.red,color:"#fff",borderRadius:99,fontSize:9,fontWeight:800,padding:"1px 5px"}}>{t.badge}</span>}
            </button>
          ))}
        </div>

        {/* Tab: Semana — estado del equipo */}
        {tabJefe==="semana"&&(
          <div>
            <p style={{margin:"0 0 12px",fontSize:13,fontWeight:700,color:C.text}}>Equipo {equipo} · Semana {semana}</p>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {agentesEquipo.map(v=>{
                const rep=reportes.find(r=>r.agente===v.id&&r.semana===semana);
                const clientesAg=CLIENTES.filter(c=>c.agente===v.id);
                const pctV=clientesAg.length&&rep?Math.round((rep.visitas?.length||0)/clientesAg.length*100):0;
                const ventas=rep?.ventas?.ventas_real?parseFloat(rep.ventas.ventas_real):null;
                const pendEstr=(recuperacionesAsignadas||[]).filter(r=>r.agente===v.id&&r.estado==="pend_aprobacion").length;

                return(
                  <button key={v.id} onClick={()=>setSelAgente(v)}
                    style={{display:"flex",gap:12,alignItems:"center",padding:"14px 16px",background:"#FFF",borderRadius:13,border:`1.5px solid ${rep?.enviado?v.color+"44":C.border}`,borderLeft:`4px solid ${v.color}`,cursor:"pointer",textAlign:"left",width:"100%"}}>
                    <div style={{width:40,height:40,borderRadius:"50%",background:v.color+"18",border:`2px solid ${v.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:v.color,flexShrink:0}}>
                      {v.nombre.split(" ").slice(0,2).map(n=>n[0]).join("")}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:4}}>
                        <p style={{margin:0,fontSize:14,fontWeight:800}}>{v.nombre}</p>
                        {pendEstr>0&&<span style={{background:C.red,color:"#fff",borderRadius:99,fontSize:10,fontWeight:800,padding:"1px 7px"}}>🔔 {pendEstr}</span>}
                        {rep?.enviado?<span style={{background:C.greenL,color:C.green,borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 7px"}}>✓ Enviado</span>:<span style={{background:C.amberL,color:C.amber,borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 7px"}}>⏳ Pendiente</span>}
                      </div>
                      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                        {ventas&&<span style={{fontSize:11,color:C.green,fontWeight:700}}>💰 {fmt(ventas)}€</span>}
                        {rep?.ventas?.mb_real&&<span style={{fontSize:11,color:C.blue,fontWeight:700}}>📊 {rep.ventas.mb_real}%</span>}
                        {rep?.visitas?.length>0&&<span style={{fontSize:11,color:C.purple,fontWeight:700}}>👥 {rep.visitas.length} visitas</span>}
                        {rep?.muestras?.length>0&&<span style={{fontSize:11,color:C.amber,fontWeight:700}}>📦 {rep.muestras.reduce((s,m)=>s+(parseInt(m.cantidad)||0),0)} muest</span>}
                        {!rep&&<span style={{fontSize:11,color:C.muted}}>Sin actividad</span>}
                      </div>
                    </div>
                    <span style={{color:C.light,fontSize:18,flexShrink:0}}>›</span>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Tab: Pendientes de aprobación */}
        {tabJefe==="pendientes"&&(
          <div>
            <p style={{margin:"0 0 12px",fontSize:13,fontWeight:700}}>Estrategias pendientes de aprobación</p>
            {pendAprobacion.length===0?(
              <div style={{textAlign:"center",padding:"32px",background:"#FFF",borderRadius:13,border:`1px solid ${C.border}`,color:C.muted}}>
                <span style={{fontSize:32,display:"block",marginBottom:8}}>✅</span>
                <p style={{margin:0,fontSize:14,fontWeight:600}}>Todo al día</p>
                <p style={{margin:"6px 0 0",fontSize:12}}>No hay estrategias pendientes</p>
              </div>
            ):pendAprobacion.map(r=>{
              const v=VENDEDORES.find(x=>x.id===r.agente);
              return(
                <div key={r.id} style={{background:"#FFF",borderRadius:13,padding:"14px 16px",marginBottom:10,border:`2px solid ${C.amber}44`,borderLeft:`4px solid ${C.amber}`}}>
                  <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:10}}>
                    <div style={{flex:1}}>
                      <p style={{margin:"0 0 3px",fontSize:14,fontWeight:800}}>{r.clienteNombre}</p>
                      <p style={{margin:0,fontSize:11,color:C.muted}}>{v?.nombre} · S{r.semanaInicio||r.semana}</p>
                      {r.objetivo&&<p style={{margin:"5px 0 0",fontSize:12,color:C.text,fontStyle:"italic"}}>"{r.objetivo.slice(0,80)}"</p>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>updRec&&updRec({...r,estado:"en_curso",aprobadoPor:uid})}
                      style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:C.green,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                      ✓ Aprobar
                    </button>
                    <button onClick={()=>{const m=prompt("Motivo del rechazo:");if(m)updRec&&updRec({...r,estado:"rechazada",motivoRechazo:m});}}
                      style={{flex:1,padding:"11px",borderRadius:10,border:`1.5px solid ${C.red}`,background:"#FFF",color:C.red,fontWeight:700,fontSize:13,cursor:"pointer"}}>
                      ✗ Rechazar
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Tab: Estrategias del equipo */}
        {tabJefe==="estrategias"&&(
          <div>
            <p style={{margin:"0 0 12px",fontSize:13,fontWeight:700}}>Todas las estrategias del equipo</p>
            {(recuperacionesAsignadas||[]).filter(r=>rol==="jefe"?r.equipo===equipo:true).length===0?(
              <div style={{textAlign:"center",padding:"32px",background:"#FFF",borderRadius:13,border:`1px solid ${C.border}`,color:C.muted}}>
                <span style={{fontSize:32,display:"block",marginBottom:8}}>🔄</span>
                <p style={{margin:0,fontSize:14,fontWeight:600}}>Sin estrategias activas</p>
              </div>
            ):(recuperacionesAsignadas||[]).filter(r=>rol==="jefe"?r.equipo===equipo:true).map(r=>{
              const est=ESTADOS_REC[r.estado]||ESTADOS_REC.en_curso;
              const v=VENDEDORES.find(x=>x.id===r.agente);
              const ultSeg=(r.seguimientos||[]).slice(-1)[0];
              return(
                <div key={r.id} style={{background:"#FFF",borderRadius:12,padding:"13px 16px",marginBottom:8,border:`1.5px solid ${est.color}33`,borderLeft:`4px solid ${est.color}`}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:ultSeg?6:0}}>
                    <span style={{fontSize:16}}>{est.dot}</span>
                    <div style={{flex:1}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700}}>{r.clienteNombre}</p>
                      <p style={{margin:0,fontSize:11,color:C.muted}}>{v?.nombre} · <span style={{color:est.color,fontWeight:600}}>{est.label}</span></p>
                    </div>
                  </div>
                  {ultSeg&&<div style={{background:C.bg,borderRadius:8,padding:"7px 10px",fontSize:11,color:C.muted,fontStyle:"italic"}}>"{ultSeg.nota.slice(0,70)}"</div>}
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  // ── AGENTE: wizard ───────────────────────────────────────────────
  const PASOS=[
    {id:"ventas",   label:"Ventas",       icon:"💰"},
    {id:"visitas",  label:"Visitas",      icon:"👥"},
    {id:"muestras", label:"Muestras",     icon:"📦"},
    {id:"recup",    label:"Recuperación", icon:"🔄"},
    {id:"resumen",  label:"Resumen",      icon:"📤"},
  ];

  const handleVisita=(v)=>{
    setVisitas(p=>{
      const idx=p.findIndex(x=>x.clienteId===v.clienteId);
      return idx>=0?p.map((x,i)=>i===idx?v:x):[...p,v];
    });
  };
  const handleEnviar=()=>{
    // Save agent-created strategies to global recuperaciones pool
    repRecuperaciones.forEach(r=>{
      if(!r.agente) {
        addRec({...r, agente:uid, equipo:usuario.equipo||"WIKUK"});
      }
    });
    const rep={agente:uid,semana,ventas,visitas,muestras,feedbackMuestras,recuperaciones:repRecuperaciones,clientes:misClientes,enviado:true,ts:new Date().toLocaleDateString("es-ES")};
    onSaveReporte(rep);
    setEnviado(true);
  };

  const repCompleto={ventas,visitas,muestras,feedbackMuestras,recuperaciones:repRecuperaciones,clientes:misClientes,muestrasPendientes:muestrasPendientes||[]};

  const [vistaRep,setVistaRep]=useState("informe");
  const [subPantalla,setSubPantalla]=useState(false); // true cuando PasoVisitas está en sub-pantalla
  const pendFeedback=(muestrasPendientes||[]).filter(m=>m.estado==="pendiente"&&m.agente===uid).length;
  // Include strategies assigned to this agent OR created by this agent (solicitadoPor)
  const misMisRecuperaciones=useMemo(()=>(recuperacionesAsignadas||[]).filter(r=>
    r.agente===uid || r.solicitadoPor===uid
  ).concat(
    // Also include local repRecuperaciones not yet in global (created this session)
    repRecuperaciones.filter(r=>!(recuperacionesAsignadas||[]).find(x=>x.id===r.id))
  ),[recuperacionesAsignadas,uid,repRecuperaciones]);

  const estrategiasEnCurso=misMisRecuperaciones.filter(r=>r.estado==="pend_aprobacion"||r.estado==="en_curso").length;

  const handleFeedback=(fb)=>{
    setFeedbackMuestras(p=>[...p.filter(x=>x.id!==fb.id),fb]);
  };

  return(
    <div style={{maxWidth:540,margin:"0 auto"}}>

      {/* Selector vista — 3 tabs */}
      <div style={{display:"flex",gap:5,marginBottom:20}}>
        {[
          {id:"informe",   label:"📋 Informe",     badge:0,         activeColor:color},
          {id:"muestras",  label:"📦 Muestras",    badge:pendFeedback,      activeColor:C.blue},
          {id:"estrategias",label:"🎯 Estrategias",badge:estrategiasEnCurso,activeColor:C.purple},
        ].map(t=>{
          const active=vistaRep===t.id;
          return(
            <button key={t.id} onClick={()=>setVistaRep(t.id)}
              style={{flex:1,padding:"10px 4px",borderRadius:11,border:"none",background:active?t.activeColor:"#FFF",color:active?"#fff":C.muted,fontWeight:700,fontSize:12,cursor:"pointer",boxShadow:"0 1px 4px #0001",position:"relative",transition:"all .15s"}}>
              {t.label}
              {t.badge>0&&<span style={{position:"absolute",top:5,right:5,background:active?"#ffffff44":C.amber,color:active?"#fff":"#fff",borderRadius:99,fontSize:9,fontWeight:800,padding:"1px 5px",minWidth:14,textAlign:"center"}}>{t.badge}</span>}
            </button>
          );
        })}
      </div>

      {/* ── VISTA MIS MUESTRAS ── */}
      {vistaRep==="muestras"&&(
        <VistaHistorialMuestras
          muestras={(muestrasPendientes||[]).filter(m=>m.agente===uid)}
          onFeedback={(id,resultado,nota)=>{
            const m=(muestrasPendientes||[]).find(x=>x.id===id);
            if(m) setFeedbackMuestras(p=>[...p.filter(x=>x.id!==id),{...m,resultado,nota,semanaFeedback:semana}]);
          }}
          feedbackLocal={feedbackMuestras}
        />
      )}

      {/* ── VISTA MIS ESTRATEGIAS ── */}
      {vistaRep==="estrategias"&&(
        <VistaEstrategias
          recuperaciones={misMisRecuperaciones}
          onUpdate={updRec||(()=>{})}
        />
      )}

      {/* ── VISTA INFORME SEMANAL ── */}
      {vistaRep==="informe"&&(<>
        {/* Stepper */}
        <div style={{display:"flex",gap:0,marginBottom:24,background:C.white,borderRadius:14,border:`1px solid ${C.border}`,overflow:"hidden"}}>
          {PASOS.map((p,i)=>{
            const done=i<step;
            const active=i===step;
            return(
              <button key={p.id} onClick={()=>setStep(i)}
                style={{flex:1,padding:"10px 0",border:"none",borderRight:i<PASOS.length-1?`1px solid ${C.border}`:"none",background:active?color:done?"#F0FDF4":"#FFF",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                <span style={{fontSize:18}}>{done?"✅":p.icon}</span>
                <span style={{fontSize:9,fontWeight:active||done?700:400,color:active?"#fff":done?C.green:C.muted}}>{p.label}</span>
              </button>
            );
          })}
        </div>

        {/* Título paso */}
        <div style={{marginBottom:20}}>
          <p style={{margin:0,fontSize:18,fontWeight:800,color:C.text}}>{PASOS[step].icon} {PASOS[step].label}</p>
          <p style={{margin:"2px 0 0",fontSize:12,color:C.muted}}>Semana {semana} {objetivo?`· Obj. ${fmt(objetivo.ventas)}€`:""}</p>
        </div>

        {/* Contenido paso */}
        {step===0&&<PasoVentas data={ventas} onChange={(k,v)=>setVentas(p=>({...p,[k]:v}))} objetivo={objetivo}/>}
        {step===1&&<PasoVisitas clientes={misClientes} visitas={visitas} onVisita={handleVisita} nuevosClientes={nuevosClientes} onGuardarNuevo={(c)=>setNuevosClientes(p=>[...p.filter(x=>x.id!==c.id),c])} onEditarNuevo={setEditandoNuevo} onSubPantalla={setSubPantalla} onOpenFicha={onOpenFicha}/>}
        {step===2&&<PasoMuestras muestras={muestras} onAdd={m=>setMuestras(p=>[...p,m])} onDel={id=>setMuestras(p=>p.filter(m=>m.id!==id))} muestrasPendientes={[]} onFeedback={()=>{}} uid={uid} onSubPantalla={setSubPantalla}/>}
        {step===3&&<PasoRecuperacion items={repRecuperaciones} onAdd={r=>setRepRecuperaciones(p=>[...p,r])} onDel={id=>setRepRecuperaciones(p=>p.filter(r=>r.id!==id))} onEdit={r=>setRepRecuperaciones(p=>p.map(x=>x.id===r.id?r:x))} recuperacionesAsignadas={recAsig} addRec={addRec} uid={uid} usuario={usuario}/>}
        {step===4&&<PasoResumen rep={repCompleto} objetivo={objetivo} color={color} onEnviar={handleEnviar} enviado={enviado}/>}

        {/* Navegación — oculta cuando hay sub-pantalla activa */}
        {!subPantalla&&<div style={{display:"flex",gap:12,marginTop:24}}>
          {step>0&&(
            <button onClick={()=>setStep(s=>s-1)}
              style={{flex:1,padding:"14px",borderRadius:12,border:`2px solid ${C.border}`,background:"#FFF",color:C.text,fontWeight:600,fontSize:15,cursor:"pointer"}}>
              ← Anterior
            </button>
          )}
          {step<PASOS.length-1&&(
            <button onClick={()=>setStep(s=>s+1)}
              style={{flex:2,padding:"14px",borderRadius:12,border:"none",background:color,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>
              Siguiente →
            </button>
          )}
        </div>}
      </>)}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// MODULE 3 · ESTADÍSTICAS
// ══════════════════════════════════════════════════════════════════
function Estadisticas({usuario}){
  const {rol,equipo,color,id}=usuario;
  const vend=VENDEDORES.find(v=>v.id===id);

  if(rol==="agente"&&vend){
    const totalV=sum(vend.ventas||[]),pct=Math.round((totalV/(ven(d.ppto||0)*12))*100);
    const wData=SEMANAS.map((s,i)=>({s:`S${s}`,v:(vend.ventas||[])[i]||0,p:vend.ppto,mb:(vend.mb||[])[i]||0}));
    return(
      <div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>
          <KPI label="Ventas acumuladas" value={`${fmt(totalV)}€`} sub={`Obj. ${fmt(ven(d.ppto||0)*12)}€`} color={color} trend={pct-100}/>
          <KPI label="Cumplimiento" value={`${pct}%`} color={pct>=100?C.green:C.amber}/>
          <KPI label="MB medio" value={`${avg(vend.mb||[]).toFixed(1)}%`} color={C.blue}/>
        </div>
        <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:14}}>
          <Card style={{flex:2,minWidth:260}}>
            <SHead>Ventas semanales</SHead>
            <SvgBarChart data={wData} height={180} color="#1A5FD4"/>
          </Card>
          <Card style={{flex:1,minWidth:200}}>
            <SHead>MB% evolución</SHead>
            <SvgLineChart data={wData} height={180} color="#059669"/>
          </Card>
        </div>
        <div style={{display:"flex",gap:14}}>
          <Card style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
            <SHead>Objetivo anual</SHead>
            <Ring pct={pct} color={pct>=100?C.green:color} size={110} stroke={12} label={`${fmt(totalV)}€`} sub={`de ${fmt(ven(d.ppto||0)*12)}€`}/>
          </Card>
        </div>
      </div>
    );
  }

  const d=equipo==="WIKUK"?DW:equipo==="INTERKEY"?DI:null;
  if((rol==="jefe")&&d){
    const vends=VENDEDORES.filter(v=>v.equipo===equipo&&v.rol==="agente");
    const sorted=[...vends].sort((a,b)=>sum(b.ventas)-sum(a.ventas));
    const wData=SEMANAS.map((s,i)=>({s:`S${s}`,v:(d.ventas||[])[i]||0,p:d.ppto,mb:(d.mb||[])[i]||0,desh:(d.desh||[])[i]||0,prep:(d.prep||[])[i]||0}));
    const pct=Math.round((sum(d.ventas||[])/((d.ppto||0)*12))*100);
    return(
      <div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>
          <KPI label="Ventas equipo" value={`${fmt(sum(d.ventas||[]))}€`} color={color} trend={pct-100}/>
          <KPI label="Cumplimiento" value={`${pct}%`} color={pct>=100?C.green:C.amber}/>
          <KPI label="MB medio" value={`${avg(d.mb||[]).toFixed(1)}%`} color={C.blue}/>
          <KPI label="Total muestras" value={sum(d.muestras)} color={color}/>
        </div>
        <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:14}}>
          <Card style={{flex:2,minWidth:260}}>
            <SHead>Ventas semanales vs objetivo</SHead>
            <SvgAreaChart data={wData} height={180} color="#1A5FD4"/>
          </Card>
          <Card style={{flex:1,minWidth:200}}>
            <SHead>Muestras — desglose</SHead>
            <SvgBarChart data={wData} height={180} bars={[{key:"desh",color:"#1A5FD4"},{key:"prep",color:"#1A5FD4"}]}/>
          </Card>
        </div>
        <Card>
          <SHead>Ranking vendedores</SHead>
          {sorted.map((v,i)=>{const vt=sum(v.ventas),mx=sum(sorted[0].ventas);return(
            <div key={v.id} style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13}}>{["🥇","🥈","🥉"][i]||`${i+1}.`} <b>{v.nombre}</b></span><span style={{fontSize:13,fontWeight:800,color}}>{fmt(vt)}€</span></div>
              <div style={{height:6,background:C.border,borderRadius:99}}><div style={{width:`${(vt/mx)*100}%`,height:"100%",background:color,borderRadius:99}}/></div>
            </div>
          );})}
        </Card>
      </div>
    );
  }

  // Director + CEO
  const wData=SEMANAS.map((s,i)=>({s:`S${s}`,WIKUK:DW.ventas[i],INTERKEY:DI.ventas[i],mbW:DW.mb[i],mbI:DI.mb[i]}));
  const tw=sum(DW.ventas),ti=sum(DI.ventas),tot=tw+ti;
  const pieD=[{name:"WIKUK",value:tw,color:C.green},{name:"INTERKEY",value:ti,color:C.amber}];
  const ranking=[...VENDEDORES.filter(v=>v.rol==="agente")].sort((a,b)=>sum(b.ventas)-sum(a.ventas));
  return(
    <div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>
        <KPI label="Ventas consolidadas" value={`${fmt(tot)}€`} color={rol==="ceo"?C.purple:C.blue}/>
        <KPI label="WIKUK" value={`${fmt(tw)}€`} sub={`${Math.round((tw/(DW.ppto*12))*100)}% obj.`} color={C.green}/>
        <KPI label="INTERKEY" value={`${fmt(ti)}€`} sub={`${Math.round((ti/(DI.ppto*12))*100)}% obj.`} color={C.amber}/>
        <KPI label="MB WIKUK" value={`${avg(DW.mb).toFixed(1)}%`} color={C.green}/>
        <KPI label="MB INTERKEY" value={`${avg(DI.mb).toFixed(1)}%`} color={C.amber}/>
      </div>
      <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:14}}>
        <Card style={{flex:3,minWidth:280}}>
          <SHead>Ventas por equipo — semanal</SHead>
          <SvgBarChart data={wData} height={190} bars={[{key:"WIKUK",color:"#1A5FD4"},{key:"INTERKEY",color:"#1A5FD4"}]}/>
        </Card>
        <Card style={{flex:1,minWidth:180,display:"flex",flexDirection:"column",gap:14,alignItems:"center",justifyContent:"center"}}>
          <SHead>Distribución</SHead>
          <SvgPieChart data={pieD} height={130}/>
          {pieD.map(d=><div key={d.name} style={{display:"flex",gap:6,alignItems:"center"}}><div style={{width:8,height:8,borderRadius:99,background:d.color}}/><span style={{fontSize:11,color:C.muted}}>{d.name}</span><span style={{fontSize:11,fontWeight:700,marginLeft:"auto"}}>{Math.round((d.value/tot)*100)}%</span></div>)}
        </Card>
      </div>
      <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:14}}>
        <Card style={{flex:2,minWidth:260}}>
          <SHead>MB% por equipo</SHead>
          <SvgLineChart data={wData} height={170} lines={[{key:"mbW",color:"#1A5FD4"},{key:"mbI",color:"#1A5FD4"}]}/>
        </Card>
        <Card style={{flex:1,minWidth:200}}>
          <SHead>Ranking global</SHead>
          {ranking.map((v,i)=>{const vt=sum(v.ventas),mx=sum(ranking[0].ventas);return(
            <div key={v.id} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:11}}>{["🥇","🥈","🥉"][i]||`${i+1}.`} <b>{v.nombre.split(" ")[0]}</b></span><span style={{fontSize:11,fontWeight:800,color:v.color}}>{fmt(vt)}€</span></div>
              <div style={{height:4,background:C.border,borderRadius:99}}><div style={{width:`${(vt/mx)*100}%`,height:"100%",background:v.color,borderRadius:99}}/></div>
            </div>
          );})}
        </Card>
      </div>
    </div>
  );
}

            <Tag label={tipo?.label} color={tipo?.color||C.muted}/>
            <Tag label={inc.equipo} color={inc.equipo==="WIKUK"?C.green:C.amber}/>

          </div>
          <p style={{margin:"0 0 6px",fontSize:15,fontWeight:800,color:C.text}}>{inc.titulo}</p>
          <div style={{display:"flex",gap:7,alignItems:"center"}}><Avt nombre={autor?.nombre||"?"} color={autor?.color||C.muted} size={20}/><span style={{fontSize:11,color:C.muted}}>Reportado por <b style={{color:C.text}}>{autor?.nombre}</b></span></div>

            <Tag label={(ESTADOS_INC[estado]||ESTADOS_INC.abierta).label} color={(ESTADOS_INC[estado]||ESTADOS_INC.abierta).color} bg={(ESTADOS_INC[estado]||ESTADOS_INC.abierta).bg}/>

              <p style={{margin:"0 0 7px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Actualizar estado</p>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:16}}>
                {Object.entries(ESTADOS_INC).map(([k,v])=>(
                  <button key={k} onClick={()=>setEstado(k)} style={{padding:"6px 12px",borderRadius:7,border:`2px solid ${estado===k?v.color:C.border}`,background:estado===k?v.bg:"transparent",color:estado===k?v.color:C.muted,fontWeight:estado===k?700:400,fontSize:12,cursor:"pointer"}}>{v.label}</button>
                ))}
              </div>
              <p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Solución / Respuesta</p>
              <textarea value={sol} onChange={e=>setSol(e.target.value)} rows={3} placeholder="Describe la acción tomada…" style={{...iSt,resize:"vertical",lineHeight:1.5,marginBottom:12}}/>
              <p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Acción pendiente</p>
              <textarea value={accion} onChange={e=>setAccion(e.target.value)} rows={2} placeholder="¿Qué queda por hacer?" style={{...iSt,resize:"vertical",lineHeight:1.5,marginBottom:14}}/>
              <button onClick={()=>setEscalar(e=>!e)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px",borderRadius:8,border:`2px solid ${escalar?C.purple:C.border}`,background:escalar?C.purpleL:"transparent",cursor:"pointer",fontSize:12,fontWeight:escalar?700:400,color:escalar?C.purple:C.muted}}>
                <div style={{width:14,height:14,borderRadius:3,border:`2px solid ${escalar?C.purple:C.border}`,background:escalar?C.purple:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{escalar&&<Ico d={IC.check} s={9} c="#fff"/>}</div>
                Importante para CEO
              </button>
            </>
          )}
          {!canEdit&&inc.solucion&&(
            <div style={{background:inc.estado==="resuelta"?C.greenL:C.amberL,borderRadius:8,padding:"10px 12px",fontSize:13,color:C.text}}>{inc.solucion}</div>

        <div style={{padding:"12px 22px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"flex-end",gap:10}}>
          <button onClick={onClose} style={{padding:"8px 18px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>Cerrar</button>
          {canEdit&&<button onClick={()=>{onUpdate({...inc,solucion:sol,accionPendiente:accion,estado,escalarCEO:escalar,fechaSolucion:estado==="resuelta"?new Date().toISOString().split("T")[0]:inc.fechaSolucion});onClose();}} style={{padding:"8px 22px",borderRadius:8,border:"none",background:C.blue,color:C.white,fontWeight:700,fontSize:13,cursor:"pointer"}}>Guardar</button>}
        </div>
      </div>
    </div>
  );
}

function Incidencias({usuario,incidencias,onAdd,onUpdate}){
  const {rol,equipo,color}=usuario;
  const [detalle,setDetalle]=useState(null);
  const [showNew,setShowNew]=useState(false);
  const [fEst,setFEst]=useState("todas");
  const [fEq,setFEq]=useState("todos");
  const [fPrio,setFPrio]=useState("todas");
  const [tab,setTab]=useState(rol==="ceo"?"resumen":"lista");

  const base=useMemo(()=>{
    if(rol==="agente")return incidencias.filter(i=>i.agenteId===usuario.id);
    if(rol==="jefe")return incidencias.filter(i=>i.equipo===equipo);
    return incidencias;
  },[rol,equipo,usuario.id,incidencias]);

  const filtered=useMemo(()=>base.filter(i=>{
    if(fEst!=="todas"&&i.estado!==fEst)return false;
    if(fEq!=="todos"&&i.equipo!==fEq)return false;
    if(fPrio!=="todas"&&i.prioridad!==fPrio)return false;
    return true;
  }),[base,fEst,fEq,fPrio]);

  const stats={abiertas:base.filter(i=>i.estado==="abierta").length,enProceso:base.filter(i=>i.estado==="en_proceso").length,resueltas:base.filter(i=>i.estado==="resuelta").length,sinSol:base.filter(i=>i.estado==="sin_solucion").length};
  const ceoIncs=incidencias.filter(i=>i.escalarCEO);

  return(
    <>
      {detalle&&<IncModal inc={detalle} persona={usuario} onClose={()=>setDetalle(null)} onUpdate={i=>{onUpdate(i);setDetalle(null);}}/>}
      {showNew&&<NewIncForm persona={usuario} onSave={i=>{onAdd(i);setShowNew(false);}} onClose={()=>setShowNew(false)}/>}

      {/* Stats */}
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:18}}>
        {[{l:"Abiertas",v:stats.abiertas,c:C.blue},{l:"En proceso",v:stats.enProceso,c:C.amber},{l:"Resueltas",v:stats.resueltas,c:C.green},{l:"Sin solución",v:stats.sinSol,c:stats.sinSol>0?C.red:C.muted}].map(k=>(
          <div key={k.l} style={{background:C.white,border:`1px solid ${C.border}`,borderTop:`3px solid ${k.c}`,borderRadius:10,padding:"12px 16px",flex:1,minWidth:100}}>
            <p style={{margin:"0 0 5px",fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>{k.l}</p>
            <p style={{margin:0,fontSize:24,fontWeight:800,color:k.c}}>{k.v}</p>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
        <div style={{display:"flex",gap:4}}>
          {rol==="ceo"&&<button onClick={()=>setTab("resumen")} style={{padding:"7px 16px",borderRadius:8,border:"none",cursor:"pointer",background:tab==="resumen"?C.purple:C.border,color:tab==="resumen"?C.white:C.muted,fontWeight:tab==="resumen"?700:400,fontSize:13}}>Resumen ejecutivo</button>}
          <button onClick={()=>setTab("lista")} style={{padding:"7px 16px",borderRadius:8,border:"none",cursor:"pointer",background:tab==="lista"?C.blue:C.border,color:tab==="lista"?C.white:C.muted,fontWeight:tab==="lista"?700:400,fontSize:13}}>Lista</button>
        </div>
        {rol==="agente"&&<button onClick={()=>setShowNew(true)} style={{display:"flex",alignItems:"center",gap:5,padding:"8px 16px",borderRadius:8,border:"none",background:C.red,color:C.white,fontWeight:700,fontSize:12,cursor:"pointer"}}><Ico d={IC.warn} s={14} c="#fff"/> Reportar</button>}
        {rol==="jefe"&&<button onClick={()=>setShowNew(true)} style={{display:"flex",alignItems:"center",gap:5,padding:"8px 16px",borderRadius:8,border:"none",background:C.amber,color:C.white,fontWeight:700,fontSize:12,cursor:"pointer"}}><Ico d={IC.plus} s={14} c="#fff"/> Nueva</button>}
      </div>

      {tab==="resumen"&&rol==="ceo"&&(
        <div>
          {/* Sin solución */}
          {incidencias.filter(i=>i.estado==="sin_solucion").length>0&&(
            <div style={{background:C.redL,border:`1.5px solid ${C.red}44`,borderRadius:12,padding:"16px 18px",marginBottom:16}}>
              <p style={{margin:"0 0 10px",fontSize:12,fontWeight:700,color:C.red,textTransform:"uppercase"}}>🚨 Sin solución — acción inmediata</p>
              {incidencias.filter(i=>i.estado==="sin_solucion").map(i=>(
                <div key={i.id} onClick={()=>setDetalle(i)} style={{background:C.white,borderRadius:9,padding:"12px 14px",marginBottom:7,borderLeft:`4px solid ${C.red}`,cursor:"pointer"}}>
                  <p style={{margin:"0 0 4px",fontSize:13,fontWeight:700}}>{i.titulo}</p>
                  <div style={{display:"flex",gap:7,flexWrap:"wrap"}}><Tag label={i.equipo} color={i.equipo==="WIKUK"?C.green:C.amber}/><Tag label={TIPOS_INC.find(t=>t.k===i.tipo)?.label||i.tipo} color={C.muted}/></div>
                  {i.accionPendiente&&<p style={{margin:"5px 0 0",fontSize:11,color:C.orange}}>→ {i.accionPendiente}</p>}
                </div>
              ))}
            </div>
          )}
          {/* Importantes en proceso */}
          {ceoIncs.filter(i=>i.estado!=="resuelta"&&i.estado!=="sin_solucion").length>0&&(
            <div style={{marginBottom:16}}>
              <p style={{margin:"0 0 10px",fontSize:12,fontWeight:700,color:C.amber,textTransform:"uppercase"}}>⏳ Importantes en gestión</p>
              {ceoIncs.filter(i=>i.estado!=="resuelta"&&i.estado!=="sin_solucion").map(i=>(
                <div key={i.id} onClick={()=>setDetalle(i)} style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:9,padding:"12px 14px",marginBottom:7,borderLeft:`4px solid ${PRIOS.find(p=>p.k===i.prioridad)?.color}`,cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",gap:10,alignItems:"flex-start"}}>
                    <div><p style={{margin:"0 0 4px",fontSize:13,fontWeight:700}}>{i.titulo}</p><div style={{display:"flex",gap:7,flexWrap:"wrap"}}><Tag label={i.equipo} color={i.equipo==="WIKUK"?C.green:C.amber}/><Tag label={(ESTADOS_INC[i.estado]||ESTADOS_INC.abierta).label} color={(ESTADOS_INC[i.estado]||ESTADOS_INC.abierta).color} bg={(ESTADOS_INC[i.estado]||ESTADOS_INC.abierta).bg}/></div>{i.solucion&&<p style={{margin:"5px 0 0",fontSize:11,color:C.muted}}>→ {i.solucion.slice(0,90)}</p>}</div>
                    <Tag label={PRIOS.find(p=>p.k===i.prioridad)?.dot} color={PRIOS.find(p=>p.k===i.prioridad)?.color}/>
                  </div>
                </div>
              ))}
            </div>
          )}
          {/* Resueltas */}
          {ceoIncs.filter(i=>i.estado==="resuelta").length>0&&(
            <div style={{marginBottom:16}}>
              <p style={{margin:"0 0 10px",fontSize:12,fontWeight:700,color:C.green,textTransform:"uppercase"}}>✅ Resueltas</p>
              {ceoIncs.filter(i=>i.estado==="resuelta").map(i=>(
                <div key={i.id} onClick={()=>setDetalle(i)} style={{background:C.greenL,border:`1px solid ${C.green}33`,borderRadius:9,padding:"11px 14px",marginBottom:7,cursor:"pointer"}}>
                  <p style={{margin:"0 0 3px",fontSize:13,fontWeight:700}}>{i.titulo}</p>
                  <p style={{margin:"0 0 4px",fontSize:11,color:C.green}}>✓ {i.solucion?.slice(0,90)}</p>
                  <Tag label={i.equipo} color={i.equipo==="WIKUK"?C.green:C.amber}/>
                </div>
              ))}
            </div>
          )}
          {/* Distribución por tipo */}
          <Card>
            <SHead>Distribución por tipo</SHead>
            {TIPOS_INC.map(t=>{const n=incidencias.filter(i=>i.tipo===t.k).length;if(!n)return null;return(
              <div key={t.k} style={{display:"flex",gap:12,alignItems:"center",marginBottom:9}}>
                <span style={{fontSize:12,color:C.text,width:100}}>{t.label}</span>

const COLS_NOM=["empleado_id","nombre","mes","año","salario_bruto","irpf","ss_empresa","ss_trabajador","neto"];

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  const headers=lines[0].split(";").map(h=>h.trim().toLowerCase());
  return lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals=l.split(";").map(v=>v.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=vals[i]||"");
    return obj;
  });
}

function validarFilas(filas){
  const errores=[];
  filas.forEach((f,i)=>{
    COLS_NOM.forEach(col=>{if(!f[col])errores.push(`Fila ${i+2}: falta "${col}"`)});
    if(f.salario_bruto&&isNaN(parseFloat(f.salario_bruto.replace(",","."))))errores.push(`Fila ${i+2}: salario_bruto no es número`);
  });
  return errores;
}

function descargarPlantilla(){
  const csv=COLS_NOM.join(";")+"\n"+"EMP001;Juan García;Enero;2026;2500;15;250;150;2100";
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="plantilla_nominas.csv";a.click();
}

function DropZone({onFile}){
  const [drag,setDrag]=useState(false);
  const ref=useRef();
  const handle=(file)=>{
    if(!file||!file.name.endsWith(".csv"))return;
    const r=new FileReader();
    r.onload=e=>onFile(e.target.result,file.name);
    r.readAsText(file,"ISO-8859-1");
  };
  return(
    <div onClick={()=>ref.current.click()}
      onDragOver={e=>{e.preventDefault();setDrag(true);}}
      onDragLeave={()=>setDrag(false)}
      onDrop={e=>{e.preventDefault();setDrag(false);handle(e.dataTransfer.files[0]);}}
      style={{border:`2px dashed ${drag?C.blue:C.border}`,borderRadius:12,padding:"32px 16px",textAlign:"center",cursor:"pointer",background:drag?C.blueL:"#FFF",transition:"all .2s"}}>
      <p style={{margin:"0 0 6px",fontSize:28}}>📄</p>
      <p style={{margin:"0 0 4px",fontSize:14,fontWeight:700,color:C.text}}>Arrastra el CSV aquí o toca para seleccionar</p>
      <p style={{margin:0,fontSize:11,color:C.muted}}>Formato CSV separado por punto y coma (;)</p>
      <input ref={ref} type="file" accept=".csv" style={{display:"none"}} onChange={e=>handle(e.target.files[0])}/>
    </div>
  );
}

function Nominas({usuario,nominasSubidas,onPublicar}){
  const [archivo,setArchivo]=useState(null);

  const handleFile=(text,nombre)=>{
    const parsed=parseCSV(text);
    const errs=validarFilas(parsed);
    setFilas(parsed);setErrores(errs);setArchivo(nombre);
  };

  const confirmar=()=>{
    if(errores.length||!filas)return;
    onPublicar(filas);
    setFilas(null);setArchivo(null);setTab("historial");
  };

    <div>

            style={{flex:1,padding:"10px",borderRadius:10,border:"none",background:tab===id?C.navy:"#FFF",color:tab===id?"#fff":C.muted,fontWeight:tab===id?700:400,fontSize:13,cursor:"pointer",boxShadow:"0 1px 4px #0001"}}>
            {l}

      </div>

      {tab==="subir"&&(
        <div>
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
            <button onClick={descargarPlantilla}

              ⬇ Plantilla CSV
            </button>
          </div>
          <DropZone onFile={handleFile}/>
          {archivo&&(
            <div style={{marginTop:16}}>
              <p style={{margin:"0 0 10px",fontSize:13,fontWeight:700}}>
                📄 {archivo} — {filas?.length} empleados
                {errores.length===0&&<span style={{color:C.green,marginLeft:8}}>✅ Sin errores</span>}
              </p>
              {errores.length>0&&(
                <div style={{background:C.redL,borderRadius:10,padding:"12px 16px",marginBottom:12}}>
                  <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:C.red}}>⚠ {errores.length} error(es)</p>
                  {errores.slice(0,5).map((e,i)=><p key={i} style={{margin:"2px 0",fontSize:11,color:C.red}}>{e}</p>)}

              {filas&&filas.length>0&&errores.length===0&&(
                <div style={{background:"#FFF",borderRadius:10,border:`1px solid ${C.border}`,overflow:"hidden",marginBottom:12}}>
                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                      <thead>
                        <tr style={{background:C.navy}}>
                          {["Empleado","Nombre","Mes","Año","Bruto","IRPF","Neto"].map(h=>(
                            <th key={h} style={{padding:"8px 10px",color:"#fff",textAlign:"left",fontWeight:700}}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {filas.slice(0,5).map((f,i)=>(
                          <tr key={i} style={{borderBottom:`1px solid ${C.border}`,background:i%2?"#FAFAFA":"#FFF"}}>
                            <td style={{padding:"7px 10px",fontFamily:"monospace"}}>{f.empleado_id}</td>
                            <td style={{padding:"7px 10px",fontWeight:600}}>{f.nombre}</td>
                            <td style={{padding:"7px 10px"}}>{f.mes}</td>
                            <td style={{padding:"7px 10px"}}>{f.año}</td>
                            <td style={{padding:"7px 10px",color:C.green}}>{f.salario_bruto}€</td>
                            <td style={{padding:"7px 10px",color:C.red}}>{f.irpf}%</td>
                            <td style={{padding:"7px 10px",fontWeight:700}}>{f.neto}€</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  {filas.length>5&&<p style={{margin:0,padding:"8px 12px",fontSize:11,color:C.muted}}>...y {filas.length-5} más</p>}
                </div>
              )}
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>{setFilas(null);setArchivo(null);setErrores([]);}}
                  style={{flex:1,padding:"12px",borderRadius:10,border:`1px solid ${C.border}`,background:"#FFF",color:C.muted,fontWeight:600,cursor:"pointer"}}>
                  Cancelar
                </button>
                <button onClick={confirmar} disabled={errores.length>0}
                  style={{flex:2,padding:"12px",borderRadius:10,border:"none",background:errores.length===0?C.navy:C.light,color:"#fff",fontWeight:700,cursor:"pointer"}}>

      {tab==="historial"&&(

function RRHHPortal({usuario,nominasSubidas,onPublicar}){
  const esRRHH=usuario.rol==="rrhh"||usuario.rol==="admin"||usuario.rol==="ceo";

function Recuperacion({usuario, recuperaciones, onAdd, onUpdate}){
  const {rol,equipo,id:uid}=usuario;
  const esJefe=rol==="jefe";
  const esAgente=rol==="agente";

  // Jefe: vista de gestión + crear órdenes
  // Agente: ve sus órdenes y registra avance
  const misRec=esAgente
    ? recuperaciones.filter(r=>r.agente===uid)
    : recuperaciones.filter(r=>esJefe?r.equipo===equipo:true);

  const [showNew,setShowNew]=useState(false);
  const [detalle,setDetalle]=useState(null); // recuperacion seleccionada
  const [form,setForm]=useState({clienteNombre:"",agente:uid,objetivo:"",semanaInicio:SEMANA_ACTUAL});
  const [seguForm,setSeguForm]=useState({nota:"",resultado:"contacto"});
  const [filtroEst,setFiltroEst]=useState("todos");

  const filtradas=misRec.filter(r=>filtroEst==="todos"||r.estado===filtroEst);
  const enCurso=misRec.filter(r=>r.estado==="en_curso").length;
  const recuperadas=misRec.filter(r=>r.estado==="recuperado").length;
  const sinExito=misRec.filter(r=>r.estado==="sin_exito").length;
  const tasaRec=recuperadas+sinExito>0?Math.round(recuperadas/(recuperadas+sinExito)*100):0;

  // Crear orden (jefe/director/ceo)
  const crearOrden=()=>{
    if(!form.clienteNombre.trim()||!form.objetivo.trim())return;
    const vend=VENDEDORES.find(v=>v.id===form.agente);
    onAdd({
      id:`rec-${Date.now()}`,
      clienteNombre:form.clienteNombre.trim(),
      agente:form.agente,
      equipo:vend?.equipo||equipo,
      objetivo:form.objetivo.trim(),
      semanaInicio:parseInt(form.semanaInicio)||SEMANA_ACTUAL,
      estado:"en_curso",
      seguimientos:[],
    });
    setShowNew(false);
    setForm({clienteNombre:"",agente:uid,objetivo:"",semanaInicio:SEMANA_ACTUAL});
  };

  // Añadir seguimiento (agente)
  const addSeguimiento=()=>{
    if(!seguForm.nota.trim()||!detalle)return;
    const updated={...detalle,seguimientos:[...detalle.seguimientos,{
      semana:SEMANA_ACTUAL,nota:seguForm.nota.trim(),resultado:seguForm.resultado,
      ts:new Date().toLocaleDateString("es-ES"),
    }]};
    onUpdate(updated);
    setDetalle(updated);
    setSeguForm({nota:"",resultado:"contacto"});
  };

  // Cambiar estado de una recuperación
  const cambiarEstado=(rec,estado)=>{
    const updated={...rec,estado};
    onUpdate(updated);
    if(detalle?.id===rec.id) setDetalle(updated);
  };

  return(
    <div>
      {/* Modal nueva orden — solo jefe/director/ceo */}
      {showNew&&!esAgente&&(
        <div style={{position:"fixed",inset:0,background:"#00000077",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:C.white,borderRadius:16,width:"min(500px,96vw)",overflow:"hidden",boxShadow:"0 24px 64px #0004"}}>
            <div style={{padding:"16px 22px",borderBottom:`1px solid ${C.border}`,background:C.navy,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <p style={{margin:0,fontSize:15,fontWeight:800,color:"#fff"}}>Nueva orden de recuperación</p>
              <button onClick={()=>setShowNew(false)} style={{background:"none",border:"none",cursor:"pointer"}}><Ico d={IC.x} s={17} c="#64748B"/></button>
            </div>
            <div style={{padding:"22px"}}>
              <div style={{marginBottom:14}}>
                <p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Cliente a recuperar <span style={{color:C.red}}>*</span></p>
                <input value={form.clienteNombre} onChange={e=>setForm(f=>({...f,clienteNombre:e.target.value}))} style={iSt} placeholder="Nombre del cliente perdido…" autoFocus/>
              </div>
              <div style={{display:"flex",gap:12,marginBottom:14}}>
                <div style={{flex:2}}>
                  <p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Agente responsable</p>
                  <select value={form.agente} onChange={e=>setForm(f=>({...f,agente:e.target.value}))} style={{...iSt,background:C.white}}>
                    {VENDEDORES.filter(v=>v.rol==="agente"&&(!esJefe||v.equipo===equipo)).map(v=>(
                      <option key={v.id} value={v.id}>{v.nombre} · {v.equipo}</option>
                    ))}
                  </select>
                </div>
                <div style={{flex:1}}>
                  <p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Semana inicio</p>
                  <input type="number" value={form.semanaInicio} onChange={e=>setForm(f=>({...f,semanaInicio:e.target.value}))} min={1} max={52} style={iSt}/>
                </div>
              </div>
              <div style={{marginBottom:20}}>
                <p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Objetivo <span style={{color:C.red}}>*</span></p>
                <textarea value={form.objetivo} onChange={e=>setForm(f=>({...f,objetivo:e.target.value}))} rows={3}
                  placeholder="¿Qué producto o línea queremos recuperar? ¿Por qué se perdió? ¿Qué acción tomar…"
                  style={{...iSt,resize:"vertical",lineHeight:1.5}}/>
              </div>
              <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                <button onClick={()=>setShowNew(false)} style={{padding:"9px 18px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancelar</button>
                <button onClick={crearOrden} disabled={!form.clienteNombre.trim()||!form.objetivo.trim()}
                  style={{padding:"9px 24px",borderRadius:8,border:"none",background:(form.clienteNombre.trim()&&form.objetivo.trim())?C.navy:C.light,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                  Crear orden
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Modal detalle / seguimiento */}
      {detalle&&(
        <div style={{position:"fixed",inset:0,background:"#00000077",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:C.white,borderRadius:16,width:"min(580px,96vw)",maxHeight:"90vh",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 24px 64px #0004"}}>
            {/* Header */}
            <div style={{padding:"16px 22px",borderBottom:`1px solid ${C.border}`,background:ESTADOS_REC[detalle.estado].bg}}>

                <span style={{fontSize:16}}>{ESTADOS_REC[detalle.estado].dot}</span>
                <Tag label={ESTADOS_REC[detalle.estado].label} color={ESTADOS_REC[detalle.estado].color} bg={ESTADOS_REC[detalle.estado].bg}/>
                <Tag label={detalle.equipo} color={detalle.equipo==="WIKUK"?C.green:C.amber}/>
                <Tag label={`Inicio S${detalle.semanaInicio}`} color={C.muted} bg={C.bg}/>
              </div>
              <p style={{margin:"0 0 4px",fontSize:16,fontWeight:800,color:C.text}}>{detalle.clienteNombre}</p>
              <div style={{display:"flex",gap:7,alignItems:"center"}}>
                {(()=>{const vend=VENDEDORES.find(v=>v.id===detalle.agente);return vend?<><Avt nombre={vend.nombre} color={vend.color} size={20}/><span style={{fontSize:12,color:C.muted}}>Asignado a <b style={{color:C.text}}>{vend.nombre}</b></span></>:null;})()}

            <div style={{overflowY:"auto",flex:1,padding:"18px 22px"}}>
              {/* Objetivo */}
              <p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Objetivo</p>
              <p style={{margin:"0 0 18px",fontSize:13,color:C.text,background:C.bg,borderRadius:9,padding:"10px 14px",lineHeight:1.5}}>{detalle.objetivo}</p>

              {/* Cambiar estado — jefe/director/ceo */}
              {!esAgente&&detalle.estado==="en_curso"&&(
                <div style={{marginBottom:18}}>
                  <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Actualizar estado</p>
                  <div style={{display:"flex",gap:7}}>
                    {["recuperado","sin_exito","pausado"].map(est=>(
                      <button key={est} onClick={()=>cambiarEstado(detalle,est)} style={{padding:"7px 14px",borderRadius:8,border:`2px solid ${ESTADOS_REC[est].color}`,background:ESTADOS_REC[est].bg,color:ESTADOS_REC[est].color,fontWeight:700,fontSize:12,cursor:"pointer"}}>

              {!esAgente&&detalle.estado!=="en_curso"&&(
                <button onClick={()=>cambiarEstado(detalle,"en_curso")} style={{marginBottom:18,padding:"7px 14px",borderRadius:8,border:`2px solid ${C.blue}`,background:C.blueL,color:C.blue,fontWeight:700,fontSize:12,cursor:"pointer"}}>

              {/* Timeline seguimientos */}
              <p style={{margin:"0 0 10px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Seguimiento ({detalle.seguimientos.length} entradas)</p>

                    ))}

                  <textarea value={seguForm.nota} onChange={e=>setSeguForm(f=>({...f,nota:e.target.value}))} rows={2}

        ))}
      </div>

      {/* Acciones cabecera */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
        {/* Filtros estado */}
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {[["todos","Todos"],[...Object.entries(ESTADOS_REC).map(([k,v])=>[k,v.dot+" "+v.label])]].flat(1).map(([k,l])=>(
            <button key={k} onClick={()=>setFiltroEst(k)} style={{padding:"5px 11px",borderRadius:7,border:`1.5px solid ${filtroEst===k?C.blue:C.border}`,background:filtroEst===k?C.blueL:"transparent",color:filtroEst===k?C.blue:C.muted,fontSize:11,fontWeight:filtroEst===k?700:400,cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>
        {/* Crear orden — solo jefe/director/ceo */}
        {!esAgente&&(
          <button onClick={()=>setShowNew(true)} style={{display:"flex",gap:6,alignItems:"center",padding:"9px 18px",borderRadius:9,border:"none",background:C.navy,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            <Ico d={IC.plus} s={14} c="#fff"/> Nueva orden
          </button>
        )}
      </div>

      {/* Lista recuperaciones */}
      {filtradas.length===0?(
        <Card style={{textAlign:"center",padding:40,color:C.muted,fontSize:13}}>
          <span style={{fontSize:32,display:"block",marginBottom:10}}>??</span>
          {esAgente?"No tienes órdenes de recuperación asignadas.":"Sin órdenes con estos filtros."}
        </Card>
      ):filtradas.map(rec=>{
        const est=ESTADOS_REC[rec.estado];
        const vend=VENDEDORES.find(v=>v.id===rec.agente);
        const ultimo=rec.seguimientos.slice(-1)[0];
        const ultimoRes=ultimo?RESULT_SEG[ultimo.resultado]:null;
        return(
          <div key={rec.id} onClick={()=>setDetalle(rec)} style={{background:C.white,borderRadius:12,border:`1px solid ${C.border}`,borderLeft:`4px solid ${est.color}`,padding:"14px 18px",marginBottom:10,cursor:"pointer",transition:"box-shadow .15s"}}
            onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px #0001"}
            onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
            <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:5,alignItems:"center"}}>
                  <span style={{fontSize:14}}>{est.dot}</span>
                  <p style={{margin:0,fontSize:14,fontWeight:700,color:C.text}}>{rec.clienteNombre}</p>
                  <Tag label={est.label} color={est.color} bg={est.bg}/>
                  <Tag label={rec.equipo} color={rec.equipo==="WIKUK"?C.green:C.amber}/>
                </div>
                <p style={{margin:"0 0 6px",fontSize:12,color:C.muted}}>{rec.objetivo.slice(0,90)}{rec.objetivo.length>90?"…":""}</p>
                {ultimo&&(
                  <div style={{display:"flex",gap:7,alignItems:"center"}}>
                    <Tag label={ultimoRes?.label||ultimo.resultado} color={ultimoRes?.color||C.muted}/>
                    <span style={{fontSize:11,color:C.muted}}>S{ultimo.semana} · {ultimo.nota.slice(0,60)}{ultimo.nota.length>60?"…":""}</span>
                  </div>
                )}
                {!ultimo&&<span style={{fontSize:11,color:C.light}}>Sin seguimientos aún</span>}
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
                {vend&&<Avt nombre={vend.nombre} color={vend.color} size={26}/>}
                <span style={{fontSize:10,color:C.muted}}>{rec.seguimientos.length} entrada{rec.seguimientos.length!==1?"s":""}</span>
                <span style={{fontSize:10,color:C.muted}}>Inicio S{rec.semanaInicio}</span>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// MODULE · DATOS — Clientes, Objetivos, Historial
// ══════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════
// FICHA CLIENTE — Timeline visual de visitas, muestras y estrategias
// ══════════════════════════════════════════════════════════════════
function FichaCliente({cliente, reportes=[], muestras=[], recuperaciones=[], onBack, onAddNota}){
  const [orden,setOrden]=useState("desc");
  const [showNota,setShowNota]=useState(false);
  const [notaForm,setNotaForm]=useState({resultado:"visitado",texto:"",semana:SEMANA_ACTUAL}); // desc=reciente primero

  const VISITA_DEF={
    visitado:    {c:C.green,  ic:"✅", l:"Visitado",         bg:C.greenL},
    nuevo_pedido:{c:C.blue,   ic:"🛒", l:"Nuevo pedido",     bg:C.blueL},
    llamada:     {c:C.purple, ic:"📞", l:"Llamada",          bg:"#F5F3FF"},
    no_disponible:{c:C.amber, ic:"⏰", l:"No disponible",    bg:C.amberL},
    no_compra:   {c:C.red,    ic:"❌", l:"No compra",        bg:C.redL},
  };
  const MUESTRA_DEF={
    pendiente:{c:C.amber, ic:"⏳", l:"Pendiente feedback"},
    positivo: {c:C.green, ic:"✅", l:"Positivo"},
    pedido:   {c:C.blue,  ic:"🛒", l:"Ha pedido"},
    ko:       {c:C.red,   ic:"❌", l:"KO — No le gusta"},
  };
  const ESTRAT_DEF={
    en_curso:  {c:C.blue,  ic:"🔵", l:"En curso"},
    recuperado:{c:C.green, ic:"✅", l:"Recuperado"},
    sin_exito: {c:C.red,   ic:"❌", l:"Sin éxito"},
    pausado:   {c:C.amber, ic:"⏸", l:"Pausado"},
  };
  const SEGUI_DEF={
    contacto:   {c:C.blue,   ic:"📞", l:"Contacto"},
    muestra:    {c:C.amber,  ic:"📦", l:"Muestra dejada"},
    pedido:     {c:C.green,  ic:"🛒", l:"¡Ha pedido!"},
    negativa:   {c:C.red,    ic:"✗",  l:"Negativa"},
    nocontacto: {c:C.muted,  ic:"📵", l:"No contacto"},
  };

  const agenteName=(id)=>VENDEDORES.find(v=>v.id===id)?.nombre||id||"";

  // ── Construir eventos unificados ──────────────────────────────
  const eventos=useMemo(()=>{
    const evs=[];

    // VISITAS — desde reportes enviados
    (reportes||[]).forEach(rep=>{
      (rep.visitas||[]).forEach(v=>{
        if(v.clienteId===cliente.id||v.clienteNombre===cliente.nombre){
          evs.push({
            tipo:"visita",
            semana:rep.semana,
            agente:rep.agente,
            resultado:v.resultado,
            // acepta tanto 'notas' como 'nota'
            texto:v.notas||v.nota||"",
            ts:rep.ts||`S${rep.semana}`,
          });
        }
      });
    });

    // MUESTRAS
    (muestras||[]).filter(m=>m.clienteNombre===cliente.nombre||m.clienteId===cliente.id).forEach(m=>{
      evs.push({
        tipo:"muestra",
        semana:m.semana,
        agente:m.agente,
        prodCodigo:m.prodCodigo,
        prodNombre:m.prodNombre,
        tipoMuestra:m.tipo,
        cantidad:m.cantidad,
        estado:m.estado,
        texto:m.nota||"",
        ts:`S${m.semana}`,
      });
    });

    // ESTRATEGIAS de recuperación
    (recuperaciones||[]).filter(r=>r.clienteNombre===cliente.nombre||r.clienteId===cliente.id).forEach(r=>{
      evs.push({
        tipo:"estrategia_inicio",
        semana:r.semanaInicio,
        agente:r.agente,
        objetivo:r.objetivo,
        estrategia:r.estrategia,
        estadoRec:r.estado,
        texto:"",
        ts:`S${r.semanaInicio}`,
      });
      (r.seguimientos||[]).forEach(s=>{
        evs.push({
          tipo:"seguimiento",
          semana:s.semana,
          agente:r.agente,
          resultado:s.resultado,
          texto:s.nota||"",
          ts:s.ts||`S${s.semana}`,
        });
      });
    });

    return evs.sort((a,b)=>orden==="desc"?(b.semana||0)-(a.semana||0):(a.semana||0)-(b.semana||0));
  },[cliente,reportes,muestras,recuperaciones,orden]);

  const totalVisitas=eventos.filter(e=>e.tipo==="visita").length;
  const totalMuestras=eventos.filter(e=>e.tipo==="muestra").length;
  const totalPedidos=eventos.filter(e=>e.tipo==="visita"&&e.resultado==="nuevo_pedido").length
    +eventos.filter(e=>e.tipo==="muestra"&&e.estado==="pedido").length;
  const totalEstrategias=(recuperaciones||[]).filter(r=>r.clienteNombre===cliente.nombre||r.clienteId===cliente.id).length;

  // Renderizar una tarjeta del timeline
  const renderEvento=(ev,i,arr)=>{
    const isLast=i===arr.length-1;

    if(ev.tipo==="visita"){
      const d=VISITA_DEF[ev.resultado]||{c:C.muted,ic:"👤",l:"Visita",bg:C.bg};
      return(
        <div key={i} style={{display:"flex",gap:0,marginBottom:0}}>
          {/* Línea + dot */}
          <div style={{width:40,display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:d.bg,border:`2.5px solid ${d.c}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,zIndex:1,position:"relative"}}>
              {d.ic}
            </div>
            {!isLast&&<div style={{width:2,flex:1,minHeight:16,background:C.border}}/>}
          </div>
          {/* Card */}
          <div style={{flex:1,paddingBottom:isLast?0:16,paddingLeft:10}}>
            <div style={{background:"#FFF",borderRadius:13,border:`1px solid ${C.border}`,borderLeft:`4px solid ${d.c}`,padding:"12px 14px",boxShadow:"0 1px 4px #0001"}}>
              {/* Cabecera */}
              <div style={{display:"flex",gap:8,justifyContent:"space-between",alignItems:"flex-start",marginBottom:ev.texto?8:0}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{padding:"3px 9px",borderRadius:6,background:d.bg,color:d.c,fontSize:11,fontWeight:800}}>{d.l}</span>
                    <span style={{fontSize:10,color:C.muted}}>👤 {agenteName(ev.agente)}</span>
                  </div>
                </div>
                <span style={{flexShrink:0,background:C.navy,color:"#fff",borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700}}>S{ev.semana}</span>
              </div>
              {/* Texto / notas del agente */}
              {ev.texto?(
                <div style={{background:C.bg,borderRadius:8,padding:"9px 12px",borderLeft:`3px solid ${d.c}44`}}>
                  <p style={{margin:0,fontSize:13,color:C.text,lineHeight:1.55,fontStyle:"normal"}}>{ev.texto}</p>
                </div>
              ):(
                <p style={{margin:0,fontSize:12,color:C.light,fontStyle:"italic"}}>Sin notas registradas</p>
              )}
            </div>
          </div>
        </div>
      );
    }

    if(ev.tipo==="muestra"){
      const d=MUESTRA_DEF[ev.estado]||MUESTRA_DEF.pendiente;
      return(
        <div key={i} style={{display:"flex",gap:0,marginBottom:0}}>
          <div style={{width:40,display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:C.amberL,border:`2.5px solid ${C.amber}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,zIndex:1,position:"relative"}}>📦</div>
            {!isLast&&<div style={{width:2,flex:1,minHeight:16,background:C.border}}/>}
          </div>
          <div style={{flex:1,paddingBottom:isLast?0:16,paddingLeft:10}}>
            <div style={{background:"#FFF",borderRadius:13,border:`1px solid ${C.border}`,borderLeft:`4px solid ${C.amber}`,padding:"12px 14px",boxShadow:"0 1px 4px #0001"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <p style={{margin:"0 0 3px",fontSize:13,fontWeight:700,color:C.text}}>📦 Muestra entregada</p>
                  {ev.prodCodigo&&<span style={{fontSize:10,fontFamily:"monospace",color:C.blue,fontWeight:700}}>{ev.prodCodigo} · </span>}
                  <span style={{fontSize:12,color:C.text,fontWeight:600}}>{ev.prodNombre}</span>
                  <p style={{margin:"3px 0 0",fontSize:11,color:C.muted}}>{ev.tipoMuestra} · {ev.cantidad} ud{ev.cantidad!==1?"s":""} · 👤 {agenteName(ev.agente)}</p>
                </div>
                <span style={{flexShrink:0,background:C.navy,color:"#fff",borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700}}>S{ev.semana}</span>
              </div>
              {/* Feedback */}
              <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{padding:"4px 10px",borderRadius:6,background:d.c+"18",color:d.c,fontSize:12,fontWeight:700}}>{d.ic} {d.l}</span>
                {ev.texto&&<span style={{fontSize:12,color:C.muted,fontStyle:"italic"}}>"{ev.texto}"</span>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    if(ev.tipo==="estrategia_inicio"){
      const d=ESTRAT_DEF[ev.estadoRec]||ESTRAT_DEF.en_curso;
      return(
        <div key={i} style={{display:"flex",gap:0,marginBottom:0}}>
          <div style={{width:40,display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:"#F5F3FF",border:`2.5px solid ${C.purple}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,zIndex:1}}>🎯</div>
            {!isLast&&<div style={{width:2,flex:1,minHeight:16,background:C.border}}/>}
          </div>
          <div style={{flex:1,paddingBottom:isLast?0:16,paddingLeft:10}}>
            <div style={{background:"#FFF",borderRadius:13,border:`1px solid ${C.border}`,borderLeft:`4px solid ${C.purple}`,padding:"12px 14px",boxShadow:"0 1px 4px #0001"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                <p style={{margin:0,fontSize:13,fontWeight:700,color:C.text}}>🎯 Inicio estrategia recuperación</p>
                <span style={{flexShrink:0,background:C.navy,color:"#fff",borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700}}>S{ev.semana}</span>
              </div>
              {ev.estrategia&&<div style={{display:"inline-flex",gap:5,alignItems:"center",background:C.blueL,borderRadius:7,padding:"3px 10px",marginBottom:6}}>
                <span style={{fontSize:12,color:C.blue,fontWeight:700}}>{ev.estrategia}</span>
              </div>}
              <div style={{background:C.bg,borderRadius:8,padding:"8px 12px"}}>
                <p style={{margin:0,fontSize:12,color:C.text,lineHeight:1.5}}>{ev.objetivo||"Sin objetivo especificado"}</p>
              </div>
              <div style={{display:"flex",gap:6,marginTop:7,alignItems:"center"}}>
                <span style={{padding:"3px 9px",borderRadius:6,background:d.c+"18",color:d.c,fontSize:11,fontWeight:700}}>{d.ic} {d.l}</span>
                <span style={{fontSize:10,color:C.muted}}>👤 {agenteName(ev.agente)}</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    if(ev.tipo==="seguimiento"){
      const d=SEGUI_DEF[ev.resultado]||{c:C.muted,ic:"📝",l:ev.resultado||"Seguimiento"};
      return(
        <div key={i} style={{display:"flex",gap:0,marginBottom:0}}>
          <div style={{width:40,display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:d.c+"15",border:`2px solid ${d.c}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,zIndex:1}}>
              {d.ic}
            </div>
            {!isLast&&<div style={{width:2,flex:1,minHeight:16,background:C.border}}/>}
          </div>
          <div style={{flex:1,paddingBottom:isLast?0:14,paddingLeft:10}}>
            <div style={{background:"#FAFAFA",borderRadius:11,border:`1px solid ${C.border}`,borderLeft:`3px solid ${d.c}`,padding:"10px 13px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:ev.texto?6:0}}>
                <span style={{padding:"2px 8px",borderRadius:5,background:d.c+"18",color:d.c,fontSize:11,fontWeight:700}}>{d.l}</span>
                <span style={{background:C.navy,color:"#fff",borderRadius:5,padding:"1px 7px",fontSize:10,fontWeight:700}}>S{ev.semana}</span>
              </div>
              {ev.texto&&<p style={{margin:0,fontSize:12,color:C.text,lineHeight:1.5}}>{ev.texto}</p>}
              <p style={{margin:"4px 0 0",fontSize:10,color:C.light}}>👤 {agenteName(ev.agente)}</p>
            </div>
          </div>
        </div>
      );
    }

    return null;
  };

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      {/* Header */}
      <div style={{background:C.navy,padding:"14px 18px 12px",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",color:"#9CA3AF",fontSize:22,lineHeight:1,padding:0}}>←</button>
          <div style={{flex:1,minWidth:0}}>
            <p style={{margin:0,fontSize:15,fontWeight:800,color:"#FFF",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{cliente.nombre}</p>
            <p style={{margin:0,fontSize:11,color:"#9CA3AF"}}>{cliente.equipo} · {agenteName(cliente.agente)}{cliente.codigoERP?` · ${cliente.codigoERP}`:""}</p>
          </div>
        </div>
      </div>

      <div style={{padding:"16px"}}>

        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:20}}>
          {[{l:"Visitas",v:totalVisitas,c:C.blue,ic:"👥"},{l:"Muestras",v:totalMuestras,c:C.amber,ic:"📦"},{l:"Pedidos",v:totalPedidos,c:C.green,ic:"🛒"},{l:"Estrategias",v:totalEstrategias,c:C.purple,ic:"🎯"}].map(k=>(
            <div key={k.l} style={{background:"#FFF",borderRadius:10,padding:"10px 6px",textAlign:"center",border:`1px solid ${C.border}`,borderTop:`3px solid ${k.c}`}}>
              <p style={{margin:"0 0 2px",fontSize:16}}>{k.ic}</p>
              <p style={{margin:0,fontSize:20,fontWeight:800,color:k.c}}>{k.v}</p>
              <p style={{margin:0,fontSize:9,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>{k.l}</p>
            </div>
          ))}
        </div>

        {/* Botón añadir nota rápida */}
        <button onClick={()=>setShowNota(s=>!s)}
          style={{width:"100%",padding:"12px 16px",borderRadius:12,border:`2px dashed ${showNota?C.blue:C.border}`,background:showNota?C.blueL:"#FFF",color:showNota?C.blue:C.muted,fontWeight:700,fontSize:14,cursor:"pointer",marginBottom:16,display:"flex",gap:8,alignItems:"center",justifyContent:"center",transition:"all .2s"}}>
          {showNota?"✕ Cancelar":"✏️ Añadir visita o nota"}
        </button>

        {/* Formulario nota rápida */}
        {showNota&&(
          <div style={{background:"#FFF",borderRadius:14,border:`2px solid ${C.blue}`,padding:"16px",marginBottom:20,boxShadow:"0 4px 16px #1A5FD415"}}>
            <p style={{margin:"0 0 12px",fontSize:13,fontWeight:800,color:C.text}}>Registrar visita / nota — S{SEMANA_ACTUAL}</p>
            {/* Resultado */}
            <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>¿Qué pasó?</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
              {Object.entries(VISITA_DEF).map(([k,d])=>(
                <button key={k} onClick={()=>setNotaForm(f=>({...f,resultado:k}))}
                  style={{padding:"8px 13px",borderRadius:9,border:`2px solid ${notaForm.resultado===k?d.c:C.border}`,background:notaForm.resultado===k?d.bg:"#FFF",color:notaForm.resultado===k?d.c:C.muted,fontWeight:notaForm.resultado===k?700:400,fontSize:12,cursor:"pointer",display:"flex",gap:5,alignItems:"center"}}>
                  <span>{d.ic}</span>{d.l}
                </button>
              ))}
            </div>
            {/* Texto */}
            <p style={{margin:"0 0 7px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Nota <span style={{color:C.red}}>*</span></p>
            <textarea value={notaForm.texto} onChange={e=>setNotaForm(f=>({...f,texto:e.target.value}))} rows={4}
              placeholder={`¿Qué ocurrió en esta visita? ¿Qué dijo el cliente? ¿Próximos pasos…`}
              style={{...iSt,resize:"none",borderRadius:10,fontSize:14,lineHeight:1.6,padding:"12px 14px",marginBottom:14}}/>
            <button onClick={()=>{
              if(!notaForm.texto.trim())return;
              onAddNota&&onAddNota(cliente,{...notaForm,ts:new Date().toLocaleDateString("es-ES")});
              setNotaForm({resultado:"visitado",texto:"",semana:SEMANA_ACTUAL});
              setShowNota(false);
            }} disabled={!notaForm.texto.trim()}
              style={{width:"100%",padding:"14px",borderRadius:11,border:"none",background:notaForm.texto.trim()?C.navy:C.light,color:"#fff",fontWeight:800,fontSize:15,cursor:notaForm.texto.trim()?"pointer":"default"}}>
              Guardar nota
            </button>
          </div>
        )}

        {/* Orden */}
        {eventos.length>0&&(
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <p style={{margin:0,fontSize:11,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>{eventos.length} evento{eventos.length!==1?"s":""}</p>
            <div style={{display:"flex",gap:4}}>
              {[["desc","Reciente ↓"],["asc","Antiguo ↑"]].map(([k,l])=>(
                <button key={k} onClick={()=>setOrden(k)}
                  style={{padding:"5px 11px",borderRadius:7,border:`1.5px solid ${orden===k?C.blue:C.border}`,background:orden===k?C.blueL:"#FFF",color:orden===k?C.blue:C.muted,fontSize:11,fontWeight:orden===k?700:400,cursor:"pointer"}}>
                  {l}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Timeline */}
        {eventos.length===0?(
          <div style={{textAlign:"center",padding:"48px 0",color:C.muted}}>
            <p style={{fontSize:44,margin:"0 0 12px"}}>📋</p>
            <p style={{fontSize:15,fontWeight:700,marginBottom:6}}>Sin actividad registrada</p>
            <p style={{fontSize:12,lineHeight:1.5}}>Las visitas con sus notas, muestras entregadas<br/>y estrategias aparecerán aquí.</p>
          </div>
        ):(
          <div>{eventos.map((ev,i,arr)=>renderEvento(ev,i,arr))}</div>
        )}
      </div>
    </div>
  );
}
