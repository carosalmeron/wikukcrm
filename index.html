function SvgBarChart({data=[], height=180, color="#1A5FD4", bars=null}){
  if(!data.length) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#ccc",fontSize:11}}>Sin datos</div>;
  const keys=bars?bars.map(b=>b.key):[Object.keys(data[0]).find(k=>k!=="s"&&typeof data[0][k]==="number")||"v"];
  const colors=bars?bars.map(b=>b.color):[color];
  const allVals=data.flatMap(d=>keys.map(k=>d[k]||0));
  const maxV=Math.max(...allVals,1);
  const pad={t:10,r:8,b:28,l:36};
  const W=300, H=height;
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  const bW=Math.max(4,(cW/data.length/keys.length)-2);
  const grp=cW/data.length;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,overflow:"visible"}}>
      {/* Grid lines */}
      {[0,0.25,0.5,0.75,1].map(f=>{
        const y=pad.t+cH*(1-f);
        return <g key={f}><line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="#E5E7EB" strokeWidth="0.5"/>
          <text x={pad.l-4} y={y+3} textAnchor="end" fontSize="8" fill="#9CA3AF">{Math.round(maxV*f).toLocaleString()}</text></g>;
      })}
      {/* Bars */}
      {data.map((d,i)=>{
        const x0=pad.l+i*grp;
        return(<g key={i}>
          {keys.map((k,ki)=>{
            const v=d[k]||0;
            const bH=Math.max(2,(v/maxV)*cH);
            const bx=x0+ki*(bW+2)+(grp-keys.length*(bW+2))/2;
            return <rect key={k} x={bx} y={pad.t+cH-bH} width={bW} height={bH} fill={colors[ki]||color} rx="2"/>;
          })}
          <text x={x0+grp/2} y={H-pad.b+10} textAnchor="middle" fontSize="8" fill="#6B7280">{d.s||""}</text>
        </g>);
      })}
    </svg>
  );
}

function SvgLineChart({data=[], height=180, color="#059669", lines=null}){
  if(!data.length) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#ccc",fontSize:11}}>Sin datos</div>;
  const keys=lines?lines.map(l=>l.key):[Object.keys(data[0]).find(k=>k!=="s"&&typeof data[0][k]==="number")||"v"];
  const colors=lines?lines.map(l=>l.color):[color];
  const allVals=data.flatMap(d=>keys.map(k=>d[k]||0));
  const maxV=Math.max(...allVals,1), minV=Math.min(...allVals,0);
  const pad={t:10,r:8,b:28,l:36};
  const W=300, H=height;
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  const range=maxV-minV||1;
  const px=(i)=>pad.l+i*(cW/(data.length-1||1));
  const py=(v)=>pad.t+cH*(1-(v-minV)/range);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,overflow:"visible"}}>
      {[0,0.5,1].map(f=>{
        const v=minV+range*f, y=py(v);
        return <g key={f}><line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="#E5E7EB" strokeWidth="0.5"/>
          <text x={pad.l-4} y={y+3} textAnchor="end" fontSize="8" fill="#9CA3AF">{Math.round(v).toLocaleString()}</text></g>;
      })}
      {keys.map((k,ki)=>{
        const pts=data.map((d,i)=>`${px(i)},${py(d[k]||0)}`).join(" ");
        return <polyline key={k} points={pts} fill="none" stroke={colors[ki]||color} strokeWidth="2" strokeLinejoin="round"/>;
      })}
      {data.map((d,i)=>(
        <text key={i} x={px(i)} y={H-pad.b+10} textAnchor="middle" fontSize="8" fill="#6B7280">{d.s||""}</text>
      ))}
    </svg>
  );
}

function SvgAreaChart({data=[], height=180, color="#1A5FD4"}){
  if(!data.length) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#ccc",fontSize:11}}>Sin datos</div>;
  const key=Object.keys(data[0]).find(k=>k!=="s"&&typeof data[0][k]==="number")||"v";
  const vals=data.map(d=>d[key]||0);
  const maxV=Math.max(...vals,1);
  const pad={t:10,r:8,b:28,l:36};
  const W=300, H=height;
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  const px=(i)=>pad.l+i*(cW/(data.length-1||1));
  const py=(v)=>pad.t+cH*(1-v/maxV);
  const linePts=data.map((d,i)=>`${px(i)},${py(d[key]||0)}`).join(" ");
  const areaPts=`${px(0)},${pad.t+cH} `+linePts+` ${px(data.length-1)},${pad.t+cH}`;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,overflow:"visible"}}>
      <defs><linearGradient id={`ag${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
        <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
      </linearGradient></defs>
      {[0,0.5,1].map(f=>{const y=pad.t+cH*(1-f);return(
        <g key={f}><line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="#E5E7EB" strokeWidth="0.5"/>
          <text x={pad.l-4} y={y+3} textAnchor="end" fontSize="8" fill="#9CA3AF">{Math.round(maxV*f).toLocaleString()}</text></g>
      );})}
      <polygon points={areaPts} fill={`url(#ag${color.replace("#","")})`}/>
      <polyline points={linePts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
      {data.map((d,i)=>(
        <text key={i} x={px(i)} y={H-pad.b+10} textAnchor="middle" fontSize="8" fill="#6B7280">{d.s||""}</text>
      ))}
    </svg>
  );
}

function SvgPieChart({data=[], height=130}){
  if(!data.length) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#ccc",fontSize:11}}>Sin datos</div>;
  const key=Object.keys(data[0]).find(k=>k!=="name"&&k!=="s"&&typeof data[0][k]==="number")||"value";
  const COLORS=["#1A5FD4","#059669","#D97706","#DC2626","#7C3AED","#0891B2"];
  const total=data.reduce((s,d)=>s+(d[key]||0),0)||1;
  const cx=50,cy=50,r=40;
  let angle=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const v=(d[key]||0)/total;
    const a1=angle, a2=angle+v*2*Math.PI;
    angle=a2;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const large=v>0.5?1:0;
    return{path:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`,color:d.color||COLORS[i%COLORS.length],name:d.name||d.s||""};
  });
  return(
    <svg viewBox="0 0 100 100" style={{width:"100%",height,overflow:"visible"}}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke="#fff" strokeWidth="0.5"/>)}
    </svg>
  );
}

// ── BUSCADOR DE CLIENTES INLINE ──────────────────────────────────
function ClienteBuscadorInline({uid, value, onChange, onSelect, placeholder="Cliente…", clientesDB=[]}){
  const [open,setOpen]   = useState(false);
  const [q,setQ]         = useState("");

  const resultados = useMemo(()=>{
    if(!q||q.length<2) return [];
    const ql=q.toLowerCase();
    const src=clientesDB.length>3?clientesDB:CLIENTES;
    return src.filter(c=>
      c.agente===uid &&
      (c.nombre.toLowerCase().includes(ql)||c.id.toLowerCase().includes(ql))
    ).slice(0,20);
  },[q,uid,clientesDB]);

  const seleccionar = (c) => {
    onChange(c.nombre);
    setQ("");
    setOpen(false);
  };

  return(
    <div style={{position:"relative"}}>
      {/* Campo + lupa */}
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1,padding:"11px 14px",border:`1px solid ${C.border}`,borderRadius:10,background:"#FFF",fontSize:14,color:value?C.text:C.muted,minHeight:44,display:"flex",alignItems:"center"}}>
          {value||<span style={{color:C.light}}>{placeholder}</span>}
        </div>
        <button onClick={()=>setOpen(s=>!s)}
          style={{width:44,height:44,borderRadius:10,border:`1.5px solid ${open?C.blue:C.border}`,background:open?C.blueL:"#FFF",color:open?C.blue:C.muted,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          🔍
        </button>
        {value&&<button onClick={()=>onChange("")}
          style={{width:44,height:44,borderRadius:10,border:`1px solid ${C.border}`,background:"#FFF",color:C.red,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          ×
        </button>}
      </div>

      {/* Panel búsqueda */}
      {open&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:500,background:"#FFF",borderRadius:10,border:`1.5px solid ${C.blue}`,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",marginTop:4}}>
          <div style={{padding:"10px 12px",borderBottom:`1px solid ${C.border}`}}>
            <input value={q} onChange={e=>setQ(e.target.value)} autoFocus
              placeholder="Buscar por nombre o código…"
              style={{...iSt,borderRadius:8,fontSize:13,padding:"9px 12px"}}/>
          </div>
          <div style={{maxHeight:200,overflowY:"auto"}}>
            {q.length<2?(
              <p style={{padding:"12px",fontSize:12,color:C.muted,margin:0}}>Escribe para buscar…</p>
            ):resultados.length===0?(
              <p style={{padding:"12px",fontSize:12,color:C.muted,margin:0}}>Sin resultados para "{q}"</p>
            ):resultados.map(c=>(
              <button key={c.id} onClick={()=>seleccionar(c)}
                style={{width:"100%",padding:"10px 14px",border:"none",borderBottom:`1px solid ${C.border}`,background:"transparent",cursor:"pointer",textAlign:"left",display:"flex",gap:10,alignItems:"center"}}
                onMouseEnter={e=>e.currentTarget.style.background=C.bg}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nombre}</p>
                  <p style={{margin:0,fontSize:10,color:C.muted}}>{c.id}{c.ruta>0?` · Ruta ${c.ruta}`:""}</p>
                </div>
              </button>
            ))}
          </div>
          <div style={{padding:"8px 12px",borderTop:`1px solid ${C.border}`}}>
            <button onClick={()=>setOpen(false)} style={{width:"100%",padding:"8px",borderRadius:8,border:"none",background:C.bg,color:C.muted,fontSize:12,cursor:"pointer"}}>Cerrar</button>
          </div>
        </div>
      )}
    </div>
  );
}

// PRODUCT SEARCH MODAL — conectado al catálogo Wikuk
// ══════════════════════════════════════════════════════════════════
function ProdModal({onSelect, onClose}){
  const [q,setQ]         = useState("");
  const [cat,setCat]     = useState("Todos");
  const [prods,setProds] = useState(PRODUCTOS_LOCAL); // empieza con locales
  const [loading,setLoading] = useState(false);

  // Cargar desde Firebase si está disponible
  useEffect(()=>{
    if(!window.fbObtener) return;
    setLoading(true);
    window.fbObtener('productos').then(data=>{
      if(data && data.length > 0){
        setProds(data.map(d=>({
          codigo:d.codigo||d.id,
          nombre:d.nombre||"",
          formato:d.formato||"",
          precio:d.precio||"",
          cat:d.categoria||d.cat||"Otros",
          sub:d.subcategoria||d.sub||"",
        })));
      }
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);

  const CAT_GROUPS=[
    {label:"Wikuk",    cats:["Wikuk — Especias","Wikuk — Preparados"]},
    {label:"Ceylan",   cats:["Ceylan — Especias","Ceylan — Preparados"]},
    {label:"Taberner", cats:["Taberner — Especias","Taberner — Preparados"]},
    {label:"Campana",  cats:["La Campana"]},
    {label:"Spots",    cats:["Spot Wikuk","Spot Ceylan","Spot Taberner","Spot Campana"]},
    {label:"Otros",    cats:["Envases","Accesorios","Aditivos"]},
  ];

  const catColor=c=>c.includes('Preparados')?C.blue:c.includes('Especias')?C.amber:c.includes('Campana')?C.green:c.includes('Envases')?'#0891B2':c.includes('Aditivos')?C.purple:c.includes('Spot')?'#7C3AED':C.muted;

  const filtered=useMemo(()=>{
    const qn=q.trim().toLowerCase();
    return prods.filter(p=>{
      const mq=!qn||
        (p.codigo||"").toLowerCase().includes(qn)||
        (p.nombre||"").toLowerCase().includes(qn)||
        (p.formato||"").toLowerCase().includes(qn);
      return mq&&(cat==="Todos"||p.cat===cat);
    }).slice(0,80);
  },[q,cat,prods]);

  return(
    <div style={{position:"fixed",inset:0,background:"#00000077",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:"8px"}}>
      <div style={{background:C.white,borderRadius:16,width:"min(680px,100%)",maxHeight:"88vh",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 24px 64px #0004"}}>

        {/* Header buscador */}
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:18}}>🔍</span>
          <input value={q} onChange={e=>setQ(e.target.value)} autoFocus
            placeholder="Código o nombre del producto…"
            style={{flex:1,border:"none",outline:"none",fontSize:15,color:C.text,background:"transparent"}}/>
          <span style={{fontSize:11,color:C.muted}}>{filtered.length<80?filtered.length:"80+"} resultados</span>
          {loading&&<span style={{fontSize:10,color:C.blue}}>⏳ Cargando…</span>}
          {!loading&&prods.length>80&&<span style={{fontSize:10,color:C.green}}>🔥 {prods.length} productos</span>}
          <button onClick={onClose} style={{background:C.bg,border:"none",borderRadius:6,padding:"4px 11px",cursor:"pointer",color:C.muted,fontSize:15,fontWeight:700}}>✕</button>
        </div>

        {/* Filtros categoría — scroll horizontal */}
        <div style={{padding:"8px 12px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:5,overflowX:"auto",flexShrink:0}}>
          <button onClick={()=>setCat("Todos")}
            style={{padding:"5px 12px",borderRadius:99,border:`1.5px solid ${cat==="Todos"?C.navy:C.border}`,background:cat==="Todos"?C.navy:"transparent",color:cat==="Todos"?"#fff":C.muted,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
            Todos
          </button>
          {CAT_GROUPS.map(g=>(
            <div key={g.label} style={{display:"flex",gap:4,alignItems:"center"}}>
              <span style={{fontSize:10,color:C.light,padding:"0 2px"}}>|</span>
              {g.cats.map(c=>{
                const active=cat===c;
                const col=catColor(c);
                return(
                  <button key={c} onClick={()=>setCat(active?"Todos":c)}
                    style={{padding:"5px 10px",borderRadius:99,border:`1.5px solid ${active?col:C.border}`,background:active?col+"15":"transparent",color:active?col:C.muted,fontSize:10,fontWeight:active?700:400,cursor:"pointer",whiteSpace:"nowrap"}}>
                    {c.replace('Spot ','').replace('Promo ','')}
                  </button>
                );
              })}
            </div>
          ))}
        </div>

        {/* Lista productos */}
        <div style={{overflowY:"auto",flex:1}}>
          {q.trim()===''&&cat==="Todos"?(
            <div style={{padding:"32px",textAlign:"center",color:C.muted}}>
              <span style={{fontSize:36,display:"block",marginBottom:12}}>🔍</span>
              <p style={{margin:"0 0 6px",fontSize:15,fontWeight:700,color:C.text}}>Busca un producto</p>
              <p style={{margin:0,fontSize:13}}>Escribe el código o nombre, o filtra por categoría arriba</p>
              <p style={{margin:"12px 0 0",fontSize:11,color:C.light}}>{prods.length} productos disponibles {prods.length>80?"🔥 Firebase":"📦 local"}</p>
            </div>
          ):filtered.length===0?(
            <div style={{padding:"32px",textAlign:"center",color:C.muted}}>
              <span style={{fontSize:32,display:"block",marginBottom:8}}>😕</span>
              <p style={{margin:0,fontSize:14}}>Sin resultados para "<b>{q}</b>"</p>
            </div>
          ):(
            filtered.map((p,i)=>{
              const col=catColor(p.cat);
              return(
                <button key={p.codigo+i} onClick={()=>onSelect({codigo:p.codigo,nombre:p.nombre,tipo:p.tipo||"Otros",formato:p.formato,precio:p.precio||""})}
                  style={{width:"100%",display:"flex",gap:12,alignItems:"center",padding:"11px 16px",border:"none",borderBottom:`1px solid ${C.border}`,background:"transparent",cursor:"pointer",textAlign:"left",transition:"background .1s"}}
                  onMouseEnter={e=>e.currentTarget.style.background=C.bg}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div style={{width:36,height:36,borderRadius:9,background:col+"15",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{fontSize:16}}>{p.cat.includes('Preparados')?'🍔':p.cat.includes('Especias')?'🌶️':p.cat.includes('Tripa')?'🧵':p.cat.includes('Envases')?'📦':p.cat.includes('Aditivos')?'🧪':p.cat.includes('Spot')?'⭐':p.cat.includes('Promo')?'🏷️':'📋'}</span>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",gap:8,alignItems:"baseline"}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.nombre}</p>
                    </div>
                    <div style={{display:"flex",gap:8,marginTop:2,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,fontFamily:"monospace",color:col,fontWeight:700}}>{p.codigo}</span>
                      {p.formato&&<span style={{fontSize:10,color:C.muted}}>{p.formato}</span>}
                    </div>
                  </div>
                  <span style={{fontSize:10,color:col,fontWeight:700,flexShrink:0,background:col+"15",padding:"3px 8px",borderRadius:99}}>{p.cat.replace('Wikuk ','').replace('Ceylan ','').replace('Taberner ','')}</span>
                </button>
              );
            })
          )}
        </div>
      </div>
    </div>
  );
}

// MODULE 1 · DASHBOARD
// ══════════════════════════════════════════════════════════════════
function Dashboard({usuario, recuperaciones=[], muestrasPendientes=[], incidencias=[], onNavigate}){
  const {rol,equipo,color}=usuario;
  const isW=equipo==="WIKUK",isI=equipo==="INTERKEY";
  const d=isW?DW:isI?DI:null;
  const vend=VENDEDORES.filter(v=>v.rol==="agente");

  // Vendedor view
  if(rol==="agente"){
    const uid=usuario.id;
    const v=VENDEDORES.find(vv=>vv.id===uid)||vend[0];
    const totalV=sum(v.ventas),pct=Math.round((totalV/(v.ppto*12))*100),mbA=avg(v.mb).toFixed(1);
    const wData=SEMANAS.map((s,i)=>({s:`S${s}`,v:(v.ventas||[])[i]||0,p:v.ppto,mb:(v.mb||[])[i]||0}));
    const misMuestras=(muestrasPendientes||[]).filter(m=>m.agente===uid);
    const pendFeed=misMuestras.filter(m=>m.estado==="pendiente").length;
    const misRec=(recuperaciones||[]).filter(r=>r.agente===uid||r.solicitadoPor===uid);
    const enCurso=misRec.filter(r=>r.estado==="en_curso"||r.estado==="pend_aprobacion").length;
    const misInc=(incidencias||[]).filter(i=>i.agenteId===uid&&i.estado!=="resuelta").length;
    return(
      <div>
        <div style={{marginBottom:18}}>
          <p style={{margin:0,fontSize:20,fontWeight:900,color:C.text}}>Hola, {usuario.nombre?.split(" ")[0]} 👋</p>
          <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>Semana {SEMANA_ACTUAL} · {equipo}</p>
        </div>
        {/* Alertas agente */}
        {(pendFeed>0||enCurso>0||misInc>0)&&(
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:18}}>
            {pendFeed>0&&<button onClick={()=>onNavigate?.("reporting")} style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",background:C.amberL,borderRadius:12,border:`1.5px solid ${C.amber}44`,cursor:"pointer",textAlign:"left",width:"100%"}}>

  // CEO view
  const tot=sum(DW.ventas)+sum(DI.ventas),pptot=(DW.ppto+DI.ppto)*12,pctG=Math.round((tot/pptot)*100);
  const wData=SEMANAS.map((s,i)=>({s:`S${s}`,t:DW.ventas[i]+DI.ventas[i]}));
  const ranking=[...vend].sort((a,b)=>sum(b.ventas)-sum(a.ventas));
  return(
    <div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>
        <KPI label="Ventas totales" value={`${fmt(tot)}€`} sub={`Obj. ${fmt(pptot)}€`} color={C.purple} trend={pctG-100}/>

        <KPI label="MB consolidado" value={`${((avg(DW.mb)*sum(DW.ventas)+avg(DI.mb)*sum(DI.ventas))/tot).toFixed(1)}%`} color={C.blue}/>

            );
          })}
        </Card>
      </div>
    </div>
  );
}

// ─ Paso 2: Visitas ────────────────────────────────────────────────
function PasoVisitas({clientes, visitas, onVisita, nuevosClientes=[], onGuardarNuevo, onSubPantalla, onOpenFicha}){
  const [rutaFijada,setRutaFijada] = useState(null);
  const [sel,setSel]               = useState(null);
  const [formV,setFormV]           = useState({resultado:"pedido",notas:""});
  const [q,setQ]                   = useState("");
  const [showNuevo,setShowNuevo]   = useState(false);
  const [fotoTarjeta,setFotoTarjeta] = useState(null);
  const [formNuevo,setFormNuevo]   = useState({nombre:"",contacto:"",telefono:"",poblacion:"",empresa:"",email:""});

  const visitados = visitas.map(v=>v.clienteId||v.clienteNombre);

  // Agrupar por ruta (numérico) o semana
  const rutasDisp = [...new Set(clientes.map(c=>c.ruta||c.semana||0).filter(r=>r>0))].sort((a,b)=>a-b);
  const clientesRuta = rutaFijada!=null ? clientes.filter(c=>(c.ruta||c.semana||0)===rutaFijada) : [];
  const clientesBusq = q.length>=2 ? clientes.filter(c=>(c.ruta||c.semana||0)!==rutaFijada&&(c.nombre.toLowerCase().includes(q.toLowerCase())||(c.codigoERP||"").toLowerCase().includes(q.toLowerCase()))).slice(0,30) : [];
  const nuevosDeRuta = (nuevosClientes||[]).filter(c=>c.ruta===rutaFijada);

  const guardarVisita=()=>{
    if(!sel) return;
    onVisita({clienteId:sel.id,clienteNombre:sel.nombre,resultado:formV.resultado,notas:formV.notas,semana:SEMANA_ACTUAL});
    setFormV({resultado:"pedido",notas:""});
    setSel(null);
    if(onSubPantalla) onSubPantalla(false);
  };

  const guardarNuevo=()=>{
    if(!formNuevo.nombre.trim()) return;
    const nuevoC={id:`NUEVO-${Date.now()}`,nombre:formNuevo.nombre.trim(),contacto:formNuevo.contacto,telefono:formNuevo.telefono,poblacion:formNuevo.poblacion,empresa:formNuevo.empresa,email:formNuevo.email,foto:fotoTarjeta||null,ruta:rutaFijada,esNuevo:true};
    setSel(nuevoC);
    if(onGuardarNuevo) onGuardarNuevo(nuevoC);
    if(onSubPantalla) onSubPantalla(true);
    setShowNuevo(false);
    setFotoTarjeta(null);
    setFormNuevo({nombre:"",contacto:"",telefono:"",poblacion:"",empresa:"",email:""});
  };

  // ── Pantalla detalle visita ───────────────────────────────────────
  if(sel){
    const yaVisitado=visitados.includes(sel.id)||visitados.includes(sel.nombre);
    return(
      <div>
        <button onClick={()=>{setSel(null);if(onSubPantalla)onSubPantalla(false);}} style={{background:"none",border:"none",color:C.blue,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:16,display:"flex",alignItems:"center",gap:4}}>
          ← Ruta {rutaFijada}
        </button>
        <div style={{background:C.white,borderRadius:14,border:`1px solid ${C.border}`,padding:"18px 20px",marginBottom:16}}>
          <p style={{margin:"0 0 4px",fontSize:16,fontWeight:800,color:C.text}}>{sel.nombre}</p>
          {sel.codigoERP&&<p style={{margin:"0 0 2px",fontSize:12,color:C.muted}}>Cód: {sel.codigoERP}</p>}
          {sel.tel&&<p style={{margin:0,fontSize:12,color:C.muted}}>{sel.tel}</p>}
          {yaVisitado&&<div style={{marginTop:8,padding:"4px 10px",background:C.greenL,borderRadius:6,fontSize:11,color:C.green,fontWeight:700,display:"inline-block"}}>✓ Ya registrado esta semana</div>}
        </div>
        <p style={{margin:"0 0 8px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Resultado de la visita</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:16}}>
          {["pedido","llamada","no_contesta","visita_sin_pedido","primera_visita"].map(r=>(
            <button key={r} onClick={()=>setFormV(f=>({...f,resultado:r}))}
              style={{padding:"8px 14px",borderRadius:9,border:`2px solid ${formV.resultado===r?C.blue:C.border}`,background:formV.resultado===r?C.blueL:"transparent",color:formV.resultado===r?C.blue:C.muted,fontWeight:formV.resultado===r?700:400,fontSize:12,cursor:"pointer"}}>
              {r==="pedido"?"✅ Pedido":r==="llamada"?"📞 Llamada":r==="no_contesta"?"📵 No contesta":r==="visita_sin_pedido"?"👋 Visita s/pedido":"🆕 Primera visita"}
            </button>
          ))}
        </div>
        <p style={{margin:"0 0 6px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Notas</p>
        <textarea value={formV.notas} onChange={e=>setFormV(f=>({...f,notas:e.target.value}))} rows={4}
          placeholder="Qué se habló, próximos pasos…"
          style={{...iSt,resize:"vertical",lineHeight:1.5,marginBottom:18}}/>
        <button onClick={guardarVisita}
          style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:C.navy,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>
          Guardar visita →
        </button>
      </div>
    );
  }

  // ── Pantalla nuevo cliente ────────────────────────────────────────
  if(showNuevo){
    return(
      <div>
        <button onClick={()=>setShowNuevo(false)} style={{background:"none",border:"none",color:C.blue,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:16}}>← Volver</button>
        <p style={{margin:"0 0 16px",fontSize:15,fontWeight:800,color:C.text}}>Nuevo cliente · Ruta {rutaFijada}</p>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {[["nombre","Nombre empresa *"],["contacto","Contacto"],["telefono","Teléfono"],["email","Email"],["poblacion","Población"]].map(([k,label])=>(
            <div key={k}>
              <p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>{label}</p>
              <input value={formNuevo[k]||""} onChange={e=>setFormNuevo(f=>({...f,[k]:e.target.value}))} style={iSt}/>
            </div>
          ))}
          <div>
            <p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Foto tarjeta</p>
            <label style={{display:"block",border:`2px dashed ${C.border}`,borderRadius:10,padding:"20px",textAlign:"center",cursor:"pointer"}}>
              {fotoTarjeta?<img src={fotoTarjeta} style={{maxWidth:"100%",maxHeight:180,borderRadius:8,objectFit:"contain"}}/>:<><p style={{fontSize:28}}>📷</p><p style={{fontSize:12,color:C.muted}}>Toca para hacer foto</p></>}
              <input type="file" accept="image/*" onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>setFotoTarjeta(ev.target.result);r.readAsDataURL(f);}}} style={{display:"none"}}/>
            </label>
          </div>
          <button onClick={guardarNuevo} disabled={!formNuevo.nombre.trim()}
            style={{padding:"14px",borderRadius:12,border:"none",background:formNuevo.nombre.trim()?C.navy:C.light,color:"#fff",fontWeight:700,fontSize:14,cursor:formNuevo.nombre.trim()?"pointer":"default"}}>
            Guardar y registrar visita →
          </button>
        </div>
      </div>
    );
  }

  // ── Pantalla principal — selección de ruta ────────────────────────
  if(rutaFijada===null){
    return(
      <div>
        <p style={{margin:"0 0 4px",fontSize:15,fontWeight:800,color:C.text}}>¿Qué ruta haces hoy?</p>
        <p style={{margin:"0 0 18px",fontSize:12,color:C.muted}}>Selecciona la ruta. Una vez elegida no se puede cambiar.</p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {rutasDisp.map(r=>{
            const cli=clientes.filter(c=>(c.ruta||c.semana||0)===r);
            const visitadosRuta=cli.filter(c=>visitados.includes(c.id)||visitados.includes(c.nombre)).length;
            return(
              <div key={r} onClick={()=>setRutaFijada(r)}
                style={{background:C.white,borderRadius:14,border:`1px solid ${C.border}`,padding:"18px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:16,transition:"box-shadow .15s"}}
                onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px #0001"}
                onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
                <div style={{width:48,height:48,borderRadius:12,background:C.navy,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:900,flexShrink:0}}>{r}</div>
                <div style={{flex:1}}>
                  <p style={{margin:"0 0 3px",fontSize:15,fontWeight:700,color:C.text}}>Ruta {r}</p>
                  <p style={{margin:0,fontSize:12,color:C.muted}}>{cli.length} clientes programados{visitadosRuta>0?` · ${visitadosRuta} visitados`:""}</p>
                </div>
                {visitadosRuta>0&&<div style={{background:C.greenL,borderRadius:8,padding:"4px 10px",fontSize:11,color:C.green,fontWeight:700}}>{Math.round(visitadosRuta/cli.length*100)}%</div>}
                <span style={{color:C.muted,fontSize:20}}>›</span>
              </div>
            );
          })}
          {rutasDisp.length===0&&<div style={{textAlign:"center",padding:40,color:C.muted,background:C.white,borderRadius:14,border:`1px solid ${C.border}`}}><p style={{fontSize:28}}>⏳</p><p style={{fontWeight:600}}>Cargando clientes…</p></div>}
        </div>
      </div>
    );
  }

  // ── Pantalla lista clientes de la ruta ───────────────────────────
  return(
    <div>
      <button onClick={()=>setRutaFijada(null)} style={{background:"none",border:"none",color:C.blue,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:14,display:"flex",alignItems:"center",gap:4}}>
        ← Cambiar ruta
      </button>
      <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
        <div style={{flex:1,position:"relative"}}>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Buscar en toda la cartera…"
            style={{...iSt,padding:"11px 36px 11px 16px",borderRadius:12,fontSize:14,width:"100%"}}/>
          {q&&<button onClick={()=>setQ("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:18}}>×</button>}
        </div>
        <button onClick={()=>setShowNuevo(true)}
          style={{padding:"11px 14px",borderRadius:12,border:"none",background:C.navy,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>
          + Nuevo
        </button>
      </div>

      <p style={{margin:"0 0 10px",fontSize:12,color:C.muted,fontWeight:600}}>
        Ruta {rutaFijada} · {clientesRuta.length} clientes
        {visitas.length>0&&<span style={{marginLeft:8,color:C.green}}>· {visitas.length} visitados</span>}
      </p>

      {/* Búsqueda fuera de ruta */}
      {q.length>=2&&clientesBusq.length>0&&(
        <div style={{marginBottom:12}}>
          <p style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase",margin:"0 0 6px"}}>Otros clientes</p>
          {clientesBusq.map(c=>(
            <div key={c.id} onClick={()=>{setSel(c);if(onSubPantalla)onSubPantalla(true);}}
              style={{background:"#FFFBF5",borderRadius:10,border:`1px solid ${C.border}`,padding:"10px 14px",cursor:"pointer",marginBottom:6,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:16}}>🏢</span>
              <div style={{flex:1}}><p style={{margin:"0 0 2px",fontSize:13,fontWeight:600,color:C.text}}>{c.nombre}</p><p style={{margin:0,fontSize:11,color:C.muted}}>Ruta {c.ruta||c.semana||"—"} · {c.codigoERP||c.id}</p></div>
              <span style={{color:C.muted}}>›</span>
            </div>
          ))}
        </div>
      )}

      {/* Clientes de la ruta */}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {[...nuevosDeRuta,...clientesRuta].map(c=>{
          const visitado=visitados.includes(c.id)||visitados.includes(c.nombre);
          return(
            <div key={c.id} onClick={()=>{setSel(c);if(onSubPantalla)onSubPantalla(true);}}
              style={{background:C.white,borderRadius:12,border:`1px solid ${visitado?"#86EFAC":C.border}`,padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"box-shadow .15s"}}
              onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 8px #0001"}
              onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
              <div style={{width:36,height:36,borderRadius:9,background:visitado?C.greenL:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>
                {visitado?"✅":"🏢"}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{margin:"0 0 2px",fontSize:13,fontWeight:700,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.nombre}</p>
                <p style={{margin:0,fontSize:11,color:C.muted}}>{c.codigoERP||c.id}{c.tel?` · ${c.tel}`:""}</p>
              </div>
              {c.esNuevo&&<span style={{fontSize:10,background:"#FEF3C7",color:"#D97706",borderRadius:5,padding:"2px 7px",fontWeight:700}}>NUEVO</span>}
              {c.esOportunidad&&<span style={{fontSize:10,background:"#EFF6FF",color:"#1A5FD4",borderRadius:5,padding:"2px 7px",fontWeight:700}}>🎯 OPO</span>}
              {visitado&&<span style={{fontSize:11,color:C.green,fontWeight:700,flexShrink:0}}>✓</span>}
              <span style={{color:C.muted,fontSize:16}}>›</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}



// ─ Paso 3: Muestras ───────────────────────────────────────────────
function PasoMuestras({muestras, onAdd, onDel, muestrasPendientes, onFeedback, uid, onSubPantalla}){
  const [show,setShow]   = useState(false);
  const [form,setForm]   = useState({prodCodigo:"",prodNombre:"",tipo:"Ingredientes",cantidad:"",clienteNombre:"",obs:""});
  const [showProd,setShowProd] = useState(false);
  const [qProd,setQProd] = useState("");
  const [feedbackSel,setFeedbackSel] = useState(null);
  const [feedbackForm,setFeedbackForm] = useState({resultado:"positivo",nota:""});

  const FEEDBACK_FB = {
    pendiente:{label:"Pendiente",  color:C.muted, bg:C.bg,     icon:"⏳"},
    positivo: {label:"Positivo",   color:C.green, bg:C.greenL, icon:"✅"},
    pedido:   {label:"Ha pedido",  color:C.blue,  bg:C.blueL,  icon:"🛒"},
    ko:       {label:"KO",         color:C.red,   bg:C.redL,   icon:"❌"},
  };

  const prodResults = useMemo(()=>{
    if(!qProd||qProd.length<2) return [];
    const ql=qProd.toLowerCase();
    return PRODUCTOS_LOCAL.filter(p=>(p.codigo||"").toLowerCase().includes(ql)||(p.nombre||"").toLowerCase().includes(ql)).slice(0,30);
  },[qProd]);

  // ── Pantalla feedback muestra previa ──
  if(feedbackSel){
    return(
      <div>
        <div style={{background:C.bg,borderRadius:12,padding:"12px 16px",marginBottom:20,display:"flex",gap:12,alignItems:"center"}}>
          <div style={{flex:1}}>
            <p style={{margin:0,fontSize:14,fontWeight:800}}>{feedbackSel.prodNombre||feedbackSel.nombre}</p>
            <p style={{margin:0,fontSize:11,color:C.muted}}>{feedbackSel.clienteNombre} · S{feedbackSel.semana}</p>
          </div>
          <button onClick={()=>{setFeedbackSel(null);if(onSubPantalla)onSubPantalla(false);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:C.muted}}>✕</button>
        </div>
        <p style={{margin:"0 0 10px",fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Feedback del cliente</p>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {Object.entries(FEEDBACK_FB).filter(([k])=>k!=="pendiente").map(([k,v])=>(
            <button key={k} onClick={()=>setFeedbackForm(f=>({...f,resultado:k}))}
              style={{padding:"14px 16px",borderRadius:12,border:`2px solid ${feedbackForm.resultado===k?v.color:C.border}`,background:feedbackForm.resultado===k?v.bg:"#FFF",display:"flex",gap:12,alignItems:"center",cursor:"pointer"}}>
              <span style={{fontSize:24}}>{v.icon}</span>
              <p style={{margin:0,fontSize:15,fontWeight:feedbackForm.resultado===k?700:400,color:feedbackForm.resultado===k?v.color:C.text}}>{v.label}</p>
              {feedbackForm.resultado===k&&<span style={{marginLeft:"auto",color:v.color}}>✓</span>}
            </button>
          ))}
        </div>
        <textarea value={feedbackForm.nota} onChange={e=>setFeedbackForm(f=>({...f,nota:e.target.value}))} rows={2}
          placeholder="Nota opcional…" style={{...iSt,resize:"none",borderRadius:10,marginBottom:14,fontSize:13}}/>
        <button onClick={()=>{onFeedback(feedbackSel.firestoreId||feedbackSel.id,feedbackForm.resultado,feedbackForm.nota);setFeedbackSel(null);if(onSubPantalla)onSubPantalla(false);setFeedbackForm({resultado:"positivo",nota:""}); }}
          style={{width:"100%",padding:16,borderRadius:12,border:"none",background:C.navy,color:"#fff",fontWeight:800,fontSize:16,cursor:"pointer"}}>
          Guardar feedback
        </button>
      </div>
    );
  }

  return(
    <div>
      {/* Muestras previas pendientes */}
      {(muestrasPendientes||[]).length>0&&(
        <div style={{marginBottom:20}}>
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>⏳ Pendientes de resultado</p>
          {muestrasPendientes.map(m=>{
            const fb=FEEDBACK_FB[m.estado]||FEEDBACK_FB.pendiente;
            return(
              <div key={m.id||m.firestoreId} onClick={()=>{if(m.estado==="pendiente"){setFeedbackSel(m);if(onSubPantalla)onSubPantalla(true);}}}
                style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",borderRadius:12,border:`2px solid ${fb.color}44`,background:fb.bg,marginBottom:8,cursor:m.estado==="pendiente"?"pointer":"default"}}>
                <span style={{fontSize:22}}>{fb.icon}</span>
                <div style={{flex:1}}>
                  <p style={{margin:0,fontSize:13,fontWeight:700}}>{m.prodNombre||m.nombre}</p>
                  <p style={{margin:"2px 0 0",fontSize:11,color:C.muted}}>{m.clienteNombre} · S{m.semana}</p>
                </div>
                {m.estado==="pendiente"&&<span style={{fontSize:11,color:C.amber,fontWeight:700}}>Tap →</span>}
              </div>
            );
          })}
        </div>
      )}

      {/* Muestras entregadas esta semana */}
      <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>📦 Entregadas esta semana</p>
      {muestras.map(m=>(
        <div key={m.id} style={{display:"flex",gap:12,alignItems:"center",padding:"12px 16px",background:"#FFF",borderRadius:12,border:`1px solid ${C.border}`,marginBottom:8}}>
          <div style={{flex:1}}>
            {m.prodCodigo&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:C.blue,fontWeight:700}}>{m.prodCodigo}</p>}
            <p style={{margin:0,fontSize:13,fontWeight:700}}>{m.prodNombre}</p>
            <p style={{margin:"2px 0 0",fontSize:11,color:C.muted}}>{m.tipo} · {m.cantidad} uds{m.clienteNombre?` · ${m.clienteNombre}`:""}</p>
          </div>
          <button onClick={()=>onDel(m.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.red,fontSize:18}}>🗑</button>
        </div>
      ))}

      {/* Buscador producto */}
      {showProd&&(
        <div style={{background:C.bg,borderRadius:12,padding:"14px",marginBottom:10,border:`1.5px solid ${C.blue}`}}>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input value={qProd} onChange={e=>setQProd(e.target.value)} autoFocus placeholder="Buscar producto…" style={{...iSt,borderRadius:10}}/>
            <button onClick={()=>{setShowProd(false);setQProd("");}} style={{padding:"0 12px",borderRadius:10,border:`1px solid ${C.border}`,background:"#FFF",cursor:"pointer",color:C.muted,fontSize:16}}>✕</button>
          </div>
          <div style={{maxHeight:220,overflowY:"auto",borderRadius:8,border:`1px solid ${C.border}`,background:"#FFF"}}>
            {prodResults.length===0&&qProd.length>=2&&<p style={{padding:"12px",fontSize:13,color:C.muted,margin:0}}>Sin resultados</p>}
            {prodResults.map(p=>(
              <button key={p.codigo} onClick={()=>{setForm(f=>({...f,prodCodigo:p.codigo,prodNombre:p.nombre}));setShowProd(false);setQProd("");}}
                style={{width:"100%",padding:"10px 14px",border:"none",borderBottom:`1px solid ${C.border}`,background:"transparent",cursor:"pointer",textAlign:"left",display:"flex",gap:10,alignItems:"center"}}
                onMouseEnter={e=>e.currentTarget.style.background=C.bg} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{flex:1}}>
                  <p style={{margin:0,fontSize:13,fontWeight:700}}>{p.nombre}</p>
                  <p style={{margin:0,fontSize:10,color:C.muted}}>{p.codigo} · {p.cat}</p>
                </div>
                {p.precio&&<span style={{fontSize:12,fontWeight:700,color:C.green,flexShrink:0}}>{p.precio}€</span>}
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Form añadir muestra */}
      {show?(
        <div style={{background:C.bg,borderRadius:13,padding:"16px",border:`2px solid ${C.blue}`,marginTop:8}}>
          <p style={{margin:"0 0 12px",fontSize:13,fontWeight:700}}>Nueva muestra entregada</p>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <input value={form.prodNombre} onChange={e=>setForm(f=>({...f,prodNombre:e.target.value}))}
              placeholder="Producto *" style={{...iSt,flex:1,borderRadius:10}}/>
            <button onClick={()=>setShowProd(true)} style={{padding:"0 12px",borderRadius:10,border:`1.5px solid ${C.blue}`,background:"#FFF",color:C.blue,fontWeight:700,cursor:"pointer"}}>🔍</button>
          </div>
          <ClienteBuscadorInline uid={uid} value={form.clienteNombre} onChange={v=>setForm(f=>({...f,clienteNombre:v}))} onSelect={c=>setForm(f=>({...f,clienteNombre:c.nombre}))} placeholder="Cliente (opcional)"/>
          <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:10}}>
            {TIPO_MUESTRA.map(t=>(
              <button key={t} onClick={()=>setForm(f=>({...f,tipo:t}))}
                style={{padding:"7px 13px",borderRadius:9,border:`2px solid ${form.tipo===t?C.blue:C.border}`,background:form.tipo===t?C.blueL:"#FFF",color:form.tipo===t?C.blue:C.muted,fontWeight:form.tipo===t?700:400,fontSize:12,cursor:"pointer"}}>{t}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            <input type="number" inputMode="numeric" value={form.cantidad} onChange={e=>setForm(f=>({...f,cantidad:e.target.value}))}
              placeholder="Uds *" style={{...iSt,width:80,flex:"none",borderRadius:9,fontSize:15}}/>
            <input value={form.obs} onChange={e=>setForm(f=>({...f,obs:e.target.value}))}
              placeholder="Observación" style={{...iSt,flex:1,borderRadius:9}}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setShow(false);if(onSubPantalla)onSubPantalla(false);}} style={{flex:1,padding:"12px",borderRadius:10,border:`1px solid ${C.border}`,background:"transparent",cursor:"pointer",color:C.muted}}>Cancelar</button>
            <button onClick={()=>{if(!form.prodNombre.trim()||!form.cantidad)return;onAdd({...form,prodCodigo:form.prodCodigo,id:`m${Date.now()}`,semana:SEMANA_ACTUAL,estado:"pendiente"});setShow(false);if(onSubPantalla)onSubPantalla(false);setForm({prodCodigo:"",prodNombre:"",tipo:"Ingredientes",cantidad:"",clienteNombre:"",obs:""}); }}
              disabled={!form.prodNombre.trim()||!form.cantidad}
              style={{flex:2,padding:"12px",borderRadius:10,border:"none",background:form.prodNombre.trim()&&form.cantidad?C.blue:C.light,color:"#fff",fontWeight:700,cursor:"pointer"}}>
              ✓ Añadir
            </button>
          </div>
        </div>
      ):(
        <button onClick={()=>{setShow(true);if(onSubPantalla)onSubPantalla(true);}}
          style={{width:"100%",padding:14,borderRadius:12,border:`2px dashed ${C.blue}`,background:C.blueL+"66",color:C.blue,fontWeight:700,fontSize:14,cursor:"pointer",marginTop:8}}>
          + Añadir muestra entregada
        </button>
      )}
    </div>
  );
}

// ─ Paso 4: Acciones comerciales ─────────────────────────────────
const RESULTADO_ACCION=[
  {k:"interesado", label:"Interesado",       icon:"👀", color:"#7C3AED"},
  {k:"pedido",     label:"Ha pedido",         icon:"🛒", color:C.green},
  {k:"pendiente",  label:"Pendiente resp.",   icon:"⏳", color:C.amber},
  {k:"rechazado",  label:"No interesado",     icon:"❌", color:C.red},
  {k:"cita",       label:"Cita concertada",   icon:"📅", color:C.blue},
];

function PasoRecuperacion({items, onAdd, onDel, onEdit, recuperacionesAsignadas, addRec, uid, usuario}){
  const [tipo,setTipo]               = useState(null);
  const [editId,setEditId]           = useState(null);
  const [clienteNombre,setClienteNombre] = useState("");
  const [resultado,setResultado]     = useState("");
  const [notaResultado,setNotaResultado] = useState("");
  const [ofertas,setOfertas]         = useState([]);
  const [muestrasAcc,setMuestrasAcc] = useState([]);
  const [showProdOF,setShowProdOF]   = useState(false);
  const [showProdMS,setShowProdMS]   = useState(false);
  const [formOf,setFormOf]           = useState({codigo:"",nombre:"",precioBase:"",dto:"",nota:""});
  const [formMs,setFormMs]           = useState({codigo:"",nombre:"",cantidad:"",nota:""});

  const precioFinal = useMemo(()=>{
    if(!formOf.precioBase) return "";
    const base = parseFloat(formOf.precioBase.replace(",","."));
    if(isNaN(base)) return "";
    if(formOf.dto){
      const dto = parseFloat(formOf.dto);
      return isNaN(dto) ? base.toFixed(2) : (base*(1-dto/100)).toFixed(2);
    }
    return base.toFixed(2);
  },[formOf.precioBase,formOf.dto]);

  const resetForm = ()=>{
    setTipo(null); setEditId(null); setClienteNombre(""); setResultado(""); setNotaResultado("");
    setOfertas([]); setMuestrasAcc([]);
    setFormOf({codigo:"",nombre:"",precioBase:"",dto:"",nota:""});
    setFormMs({codigo:"",nombre:"",cantidad:"",nota:""});
  };

  const openEdit = (r)=>{
    setTipo(r.tipo); setEditId(r.id); setClienteNombre(r.clienteNombre||"");
    setResultado(r.resultado||""); setNotaResultado(r.notaResultado||"");
    setOfertas(r.ofertas||[]); setMuestrasAcc(r.muestras||[]);
  };

  const addOferta = ()=>{
    if(!formOf.nombre.trim()) return;
    const id=`of${Date.now()}`;
    setOfertas(p=>[...p,{...formOf,precioFinal,id}]);
    setFormOf({codigo:"",nombre:"",precioBase:"",dto:"",nota:""});
  };
  const addMuestra = ()=>{
    if(!formMs.nombre.trim()) return;
    setMuestrasAcc(p=>[...p,{...formMs,id:`ms${Date.now()}`}]);
    setFormMs({codigo:"",nombre:"",cantidad:"",nota:""});
  };
  const guardar = ()=>{
    if(!clienteNombre.trim()) return;
    const accion={
      id: editId||`acc${Date.now()}`,
      tipo, clienteNombre:clienteNombre.trim(),
      estrategia: tipo==="nuevo"?"Cliente nuevo":"Recuperación",
      equipo:"WIKUK", estado:"pend_aprobacion",
      solicitadoPor: "agente",
      seguimientos:[],
      semana:SEMANA_ACTUAL,
      resultado, notaResultado,
      ofertas:[...ofertas], muestras:[...muestrasAcc],
    };
    if(editId && onEdit) onEdit(accion);
    else {
      onAdd(accion);
      // Also push to global pool immediately so it shows in Mis Estrategias
      if(addRec) addRec({...accion, agente:uid, equipo:usuario?.equipo||"WIKUK"});
    }
    resetForm();
  };

  // ── Pantalla 1: lista + selector tipo ───────────────────────────
  if(!tipo){
    return(
      <div>
        {recuperacionesAsignadas.length>0&&(
          <div style={{marginBottom:20}}>
            <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>📌 Asignadas por el jefe</p>
            {recuperacionesAsignadas.map(r=>(
              <div key={r.id} style={{background:"#FFFBEB",border:"2px solid #D97706AA",borderRadius:13,padding:"13px 16px",marginBottom:10}}>
                <p style={{margin:0,fontSize:15,fontWeight:800}}>{r.clienteNombre}</p>
                <div style={{background:C.amberL,borderRadius:8,padding:"6px 10px",marginTop:6,display:"inline-flex",gap:6,alignItems:"center"}}>
                  <span style={{fontSize:14}}>🎯</span>
                  <span style={{fontSize:12,fontWeight:700,color:C.amber}}>{r.estrategia||"Sin especificar"}</span>
                </div>
              </div>
            ))}
          </div>
        )}

        {items.length>0&&(
          <div style={{marginBottom:16}}>
            <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>✍️ Mis acciones esta semana</p>
            {items.map(r=>{
              const res=RESULTADO_ACCION.find(x=>x.k===r.resultado);
              return(
                <div key={r.id} style={{background:"#FFF",border:`2px solid ${r.tipo==="nuevo"?C.green+"44":C.blue+"44"}`,borderLeft:`4px solid ${r.tipo==="nuevo"?C.green:C.blue}`,borderRadius:13,padding:"13px 16px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                        <span style={{fontSize:15}}>{r.tipo==="nuevo"?"🌱":"🔄"}</span>
                        <p style={{margin:0,fontSize:14,fontWeight:700}}>{r.clienteNombre}</p>
                        <Tag label={r.tipo==="nuevo"?"Nuevo":"Recuperación"} color={r.tipo==="nuevo"?C.green:C.blue}/>
                        {res&&<Tag label={`${res.icon} ${res.label}`} color={res.color}/>}
                      </div>
                      {r.ofertas?.length>0&&<p style={{margin:"2px 0",fontSize:11,color:C.muted}}>🏷️ {r.ofertas.length} oferta{r.ofertas.length>1?"s":""}</p>}
                      {r.muestras?.length>0&&<p style={{margin:"2px 0",fontSize:11,color:C.muted}}>📦 {r.muestras.length} muestra{r.muestras.length>1?"s":""}</p>}
                      {r.notaResultado&&<p style={{margin:"4px 0 0",fontSize:12,color:C.muted,fontStyle:"italic"}}>"{r.notaResultado.slice(0,50)}"</p>}
                    </div>
                    <div style={{display:"flex",gap:6,flexShrink:0}}>
                      <button onClick={()=>openEdit(r)}
                        style={{padding:"5px 10px",borderRadius:7,border:`1px solid ${C.border}`,background:"#FFF",color:C.blue,fontWeight:600,fontSize:12,cursor:"pointer"}}>
                        ✏️ Editar
                      </button>
                      <button onClick={()=>onDel(r.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.red,fontSize:18}}>🗑</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        <p style={{margin:"0 0 12px",fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Nueva acción</p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {[
            {t:"recuperacion",icon:"🔄",label:"Recuperar cliente",sub:"Cliente que ha dejado de comprar",color:C.blue},
            {t:"nuevo",       icon:"🌱",label:"Cliente nuevo",     sub:"Primera visita o prospecto",      color:C.green},
          ].map(opt=>(
            <button key={opt.t} onClick={()=>setTipo(opt.t)}
              style={{display:"flex",gap:14,alignItems:"center",padding:"16px",borderRadius:14,border:`2px solid ${opt.color}33`,background:`${opt.color}08`,cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:28,flexShrink:0}}>{opt.icon}</span>
              <div>
                <p style={{margin:0,fontSize:15,fontWeight:700,color:C.text}}>{opt.label}</p>
                <p style={{margin:"2px 0 0",fontSize:12,color:C.muted}}>{opt.sub}</p>
              </div>
              <span style={{marginLeft:"auto",color:opt.color,fontSize:20}}>›</span>
            </button>
          ))}
        </div>
      </div>
    );
  }

  // ── Pantalla 2: formulario acción ───────────────────────────────
  const accionColor = tipo==="nuevo"?C.green:C.blue;
  const accionIcon  = tipo==="nuevo"?"🌱":"🔄";
  const accionLabel = tipo==="nuevo"?"Cliente nuevo":"Recuperar cliente";

  return(
    <div>
      {showProdOF&&<ProdModal onSelect={p=>{setFormOf(f=>({...f,codigo:p.codigo,nombre:p.nombre,precioBase:p.precio||""}));setShowProdOF(false);}} onClose={()=>setShowProdOF(false)}/>}
      {showProdMS&&<ProdModal onSelect={p=>{setFormMs(f=>({...f,codigo:p.codigo,nombre:p.nombre}));setShowProdMS(false);}} onClose={()=>setShowProdMS(false)}/>}

      {/* Header */}
      <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:18}}>
        <button onClick={resetForm} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:C.muted}}>←</button>
        <span style={{fontSize:20}}>{accionIcon}</span>
        <p style={{margin:0,fontSize:16,fontWeight:800,color:C.text}}>{editId?"Editar":"Nueva"} — {accionLabel}</p>
      </div>

      {/* Cliente */}
      <div style={{marginBottom:16}}>
        <p style={{margin:"0 0 7px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Cliente <span style={{color:C.red}}>*</span></p>
        <ClienteBuscadorInline uid={uid} value={clienteNombre} onChange={setClienteNombre} onSelect={c=>setClienteNombre(c.nombre)} placeholder="Nombre del cliente…"/>
      </div>



      {/* ── Ofertas ── */}
      <div style={{marginBottom:20}}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
          <p style={{margin:0,fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>🏷️ Ofertas personalizadas</p>
          {ofertas.length>0&&<span style={{background:accionColor,color:"#fff",borderRadius:99,fontSize:10,fontWeight:800,padding:"2px 8px"}}>{ofertas.length}</span>}
        </div>
        {ofertas.map(o=>(
          <div key={o.id} style={{background:"#FFF",border:`1px solid ${C.border}`,borderRadius:11,padding:"10px 14px",marginBottom:8,display:"flex",gap:10,alignItems:"center"}}>
            <div style={{flex:1}}>
              {o.codigo&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:accionColor,fontWeight:700}}>{o.codigo}</p>}
              <p style={{margin:0,fontSize:13,fontWeight:700}}>{o.nombre}</p>
              <div style={{display:"flex",gap:8,marginTop:3,alignItems:"center"}}>
                {o.precioBase&&<span style={{fontSize:11,color:C.muted,textDecoration:o.dto?"line-through":"none"}}>{o.precioBase}€/kg</span>}
                {o.dto&&<span style={{fontSize:11,fontWeight:700,color:C.red}}>-{o.dto}%</span>}
                {o.precioFinal&&o.dto&&<span style={{fontSize:12,fontWeight:800,color:C.green}}>{o.precioFinal}€/kg</span>}
              </div>
            </div>
            <button onClick={()=>setOfertas(p=>p.filter(x=>x.id!==o.id))} style={{background:"none",border:"none",cursor:"pointer",color:C.red,fontSize:16}}>🗑</button>
          </div>
        ))}
        <div style={{background:C.bg,borderRadius:12,padding:"14px",border:`1.5px dashed ${accionColor}66`}}>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input value={formOf.nombre} onChange={e=>setFormOf(f=>({...f,nombre:e.target.value}))}
              placeholder="Producto" style={{...iSt,flex:1,borderRadius:9,fontSize:13}}/>
            <button onClick={()=>setShowProdOF(true)}
              style={{padding:"9px 12px",borderRadius:9,border:`1.5px solid ${accionColor}`,background:"#FFF",color:accionColor,fontWeight:700,fontSize:12,cursor:"pointer"}}>🔍</button>
          </div>
          {formOf.codigo&&<p style={{margin:"-4px 0 8px",fontSize:10,fontFamily:"monospace",color:accionColor}}>{formOf.codigo}</p>}
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Precio base €/kg</p>
              <input value={formOf.precioBase} onChange={e=>setFormOf(f=>({...f,precioBase:e.target.value}))}
                placeholder="0,00" style={{...iSt,borderRadius:9,fontSize:14,padding:"10px 12px"}}/>
            </div>
            <div style={{flex:1}}>
              <p style={{margin:"0 0 4px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Dto. %</p>
              <input type="number" value={formOf.dto} onChange={e=>setFormOf(f=>({...f,dto:e.target.value}))}
                placeholder="0" style={{...iSt,borderRadius:9,fontSize:14,padding:"10px 12px"}}/>
            </div>
          </div>
          {precioFinal&&(
            <div style={{background:C.greenL,borderRadius:8,padding:"8px 12px",marginBottom:8,display:"flex",gap:10,alignItems:"center"}}>
              <span>✓</span>
              <p style={{margin:0,fontSize:13,fontWeight:800,color:C.green}}>Precio final: {precioFinal}€/kg</p>
              {formOf.dto&&<span style={{fontSize:11,color:C.green}}>(-{formOf.dto}%)</span>}
            </div>
          )}
          <input value={formOf.nota} onChange={e=>setFormOf(f=>({...f,nota:e.target.value}))}
            placeholder="Nota" style={{...iSt,borderRadius:9,fontSize:13,marginBottom:10}}/>
          <button onClick={addOferta} disabled={!formOf.nombre.trim()}
            style={{width:"100%",padding:"11px",borderRadius:9,border:"none",background:formOf.nombre.trim()?accionColor:C.light,color:"#fff",fontWeight:700,fontSize:13,cursor:formOf.nombre.trim()?"pointer":"default"}}>
            + Añadir oferta
          </button>
        </div>
      </div>

      {/* ── Muestras ── */}
      <div style={{marginBottom:24}}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
          <p style={{margin:0,fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>📦 Muestras enviadas</p>
          {muestrasAcc.length>0&&<span style={{background:accionColor,color:"#fff",borderRadius:99,fontSize:10,fontWeight:800,padding:"2px 8px"}}>{muestrasAcc.length}</span>}
        </div>
        {muestrasAcc.map(m=>(
          <div key={m.id} style={{background:"#FFF",border:`1px solid ${C.border}`,borderRadius:11,padding:"10px 14px",marginBottom:8,display:"flex",gap:10,alignItems:"center"}}>
            <div style={{flex:1}}>
              {m.codigo&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:accionColor,fontWeight:700}}>{m.codigo}</p>}
              <p style={{margin:0,fontSize:13,fontWeight:700}}>{m.nombre}</p>
              {m.cantidad&&<p style={{margin:"2px 0 0",fontSize:11,color:C.muted}}>{m.cantidad} uds{m.nota?` · ${m.nota}`:""}</p>}
            </div>
            <button onClick={()=>setMuestrasAcc(p=>p.filter(x=>x.id!==m.id))} style={{background:"none",border:"none",cursor:"pointer",color:C.red,fontSize:16}}>🗑</button>
          </div>
        ))}
        <div style={{background:C.bg,borderRadius:12,padding:"14px",border:`1.5px dashed ${accionColor}66`}}>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input value={formMs.nombre} onChange={e=>setFormMs(f=>({...f,nombre:e.target.value}))}
              placeholder="Producto" style={{...iSt,flex:1,borderRadius:9,fontSize:13}}/>
            <button onClick={()=>setShowProdMS(true)}
              style={{padding:"9px 12px",borderRadius:9,border:`1.5px solid ${accionColor}`,background:"#FFF",color:accionColor,fontWeight:700,fontSize:12,cursor:"pointer"}}>🔍</button>
          </div>
          {formMs.codigo&&<p style={{margin:"-4px 0 8px",fontSize:10,fontFamily:"monospace",color:accionColor}}>{formMs.codigo}</p>}
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <input type="number" value={formMs.cantidad} onChange={e=>setFormMs(f=>({...f,cantidad:e.target.value}))}
              placeholder="Cantidad uds" style={{...iSt,flex:1,borderRadius:9,fontSize:13}}/>
            <input value={formMs.nota} onChange={e=>setFormMs(f=>({...f,nota:e.target.value}))}
              placeholder="Nota" style={{...iSt,flex:2,borderRadius:9,fontSize:13}}/>
          </div>
          <button onClick={addMuestra} disabled={!formMs.nombre.trim()}
            style={{width:"100%",padding:"11px",borderRadius:9,border:"none",background:formMs.nombre.trim()?accionColor:C.light,color:"#fff",fontWeight:700,fontSize:13,cursor:formMs.nombre.trim()?"pointer":"default"}}>
            + Añadir muestra
          </button>
        </div>
      </div>

      <button onClick={guardar} disabled={!clienteNombre.trim()}
        style={{width:"100%",padding:"15px",borderRadius:13,border:"none",background:clienteNombre.trim()?accionColor:C.light,color:"#fff",fontWeight:800,fontSize:16,cursor:clienteNombre.trim()?"pointer":"default"}}>
        {editId?"✓ Guardar cambios":"✓ Guardar acción"}
      </button>
    </div>
  );
}

// ─ Paso 5: Resumen ────────────────────────────────────────────────
function PasoResumen({rep, objetivo, color, onEnviar, enviado}){
  const ventasOk=rep.ventas.ventas_real&&rep.ventas.mb_real;
  const visitasPct=rep.clientes?.length?Math.round(rep.visitas.length/rep.clientes.length*100):0;
  const totalMuestrasUds=rep.muestras.reduce((s,m)=>s+(parseInt(m.cantidad)||0),0);
  const fbPositivo=(rep.feedbackMuestras||[]).filter(f=>f.resultado==="positivo"||f.resultado==="pedido").length;
  const fbKo=(rep.feedbackMuestras||[]).filter(f=>f.resultado==="ko").length;
  const fbPendiente=(rep.muestrasPendientes||[]).filter(m=>m.estado==="pendiente").length;

  const resumen=[
    {ic:"💰",label:"Ventas",      v:rep.ventas.ventas_real?`${fmt(parseFloat(rep.ventas.ventas_real))}€`:"-", sub:objetivo?`Obj. ${fmt(objetivo.ventas)}€`:"", ok:rep.ventas.ventas_real&&(!objetivo||parseFloat(rep.ventas.ventas_real)>=objetivo.ventas)},
    {ic:"📊",label:"MB%",         v:rep.ventas.mb_real?`${rep.ventas.mb_real}%`:"-",                          sub:objetivo?`Obj. ${objetivo.mb}%`:"",            ok:rep.ventas.mb_real&&(!objetivo||parseFloat(rep.ventas.mb_real)>=objetivo.mb)},
    {ic:"🏷️",label:"Promo",      v:rep.ventas.promo_real?`${fmt(parseFloat(rep.ventas.promo_real))}€`:"-",  sub:"",                                             ok:!!rep.ventas.promo_real},
    {ic:"💧",label:"Liquidación", v:rep.ventas.liq_real?`${fmt(parseFloat(rep.ventas.liq_real))}€`:"-",      sub:"",                                             ok:!!rep.ventas.liq_real},
    {ic:"👥",label:"Visitas",     v:`${rep.visitas.length}/${rep.clientes?.length||0}`,                       sub:`${visitasPct}% completadas`,                   ok:visitasPct===100},
    {ic:"📦",label:"Muestras",    v:`${totalMuestrasUds} uds`,                                                sub:`${rep.muestras.length} producto${rep.muestras.length!==1?"s":""}`, ok:rep.muestras.length>0},
    {ic:"✅",label:"Feedback +",  v:`${fbPositivo}`,                                                          sub:"Positivo o pedido",                            ok:fbPositivo>0},
    {ic:"❌",label:"Feedback KO", v:`${fbKo}`,                                                                sub:fbPendiente>0?`${fbPendiente} pendiente${fbPendiente>1?"s":""}`:"-", ok:fbKo===0&&fbPositivo>0},
    {ic:"🔄",label:"Recuperación",v:`${rep.recuperaciones.length}`,                                           sub:"acciones",                                     ok:true},
  ];

  return(
    <div>
      {/* KPIs grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        {resumen.map(r=>(
          <div key={r.label} style={{background:"#FFF",borderRadius:12,padding:"13px 15px",border:`1.5px solid ${r.ok?color+"44":C.border}`,borderTop:`3px solid ${r.ok?color:C.border}`}}>
            <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:4}}>
              <span style={{fontSize:18}}>{r.ic}</span>
              <span style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>{r.label}</span>
            </div>
            <p style={{margin:"0 0 2px",fontSize:20,fontWeight:800,color:r.ok?color:C.text}}>{r.v}</p>
            {r.sub&&<p style={{margin:0,fontSize:10,color:C.muted}}>{r.sub}</p>}
          </div>
        ))}
      </div>

      {/* Alerta muestras pendientes */}
      {fbPendiente>0&&(
        <div style={{background:C.amberL,border:`1px solid ${C.amber}55`,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:C.amber,fontWeight:600,display:"flex",gap:8}}>
          <span>⚠</span> Tienes {fbPendiente} muestra{fbPendiente>1?"s":""} pendiente{fbPendiente>1?"s":""} de dar feedback. Ve al Paso 3 para registrarlas.
        </div>
      )}

      {!ventasOk&&(
        <div style={{background:C.redL,border:`1px solid ${C.red}33`,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:C.red,fontWeight:600}}>
          ⚠ Completa ventas y MB para poder enviar el reporte
        </div>
      )}
      <button onClick={onEnviar} disabled={!ventasOk||enviado}
        style={{width:"100%",padding:"16px",borderRadius:13,border:"none",background:enviado?"#E8F5E9":ventasOk?color:C.light,color:enviado?C.green:"#fff",fontWeight:800,fontSize:16,cursor:ventasOk&&!enviado?"pointer":"default",transition:"all .2s"}}>
        {enviado?"✅ Reporte enviado":"📤 Enviar reporte"}
      </button>
    </div>
  );
}

const ESTADOS_REC={
  pend_aprobacion:{label:"Pendiente aprobación", color:C.amber, bg:C.amberL, dot:"⏳"},
  rechazada:      {label:"Rechazada",            color:C.red,   bg:C.redL,   dot:"✗"},
  en_curso:       {label:"En curso",             color:C.blue,  bg:C.blueL,  dot:"🔵"},
  recuperado:     {label:"Recuperado",           color:C.green, bg:C.greenL, dot:"✅"},
  sin_exito:      {label:"Sin éxito",            color:C.red,   bg:C.redL,   dot:"❌"},
  pausado:        {label:"Pausado",              color:C.amber, bg:C.amberL, dot:"⏸"},
};
const RESULT_SEG={
  contacto: {label:"Contacto",        color:C.blue  },
  muestra:  {label:"Muestra dejada",  color:C.purple},
  pedido:   {label:"¡Ha pedido!",     color:C.green },
  negativa: {label:"Negativa",        color:C.red   },
  nocontacto:{label:"No contacto",    color:C.muted },
};

// ─ Vista Mis Estrategias de Recuperación ─────────────────────────
const RESULT_ESTRAT={
  contactado: {label:"Contactado",       color:C.blue,   bg:C.blueL,   icon:"📞"},
  muestra:    {label:"Muestra dejada",   color:C.purple, bg:"#F5F3FF",  icon:"📦"},
  negociando: {label:"Negociando",       color:C.amber,  bg:C.amberL,  icon:"🤝"},
  pedido:     {label:"¡Ha pedido!",      color:C.green,  bg:C.greenL,  icon:"🛒"},
  sin_exito:  {label:"Sin éxito",        color:C.red,    bg:C.redL,    icon:"❌"},
  en_curso:   {label:"En curso",         color:C.muted,  bg:C.bg,      icon:"⏳"},
};

function VistaEstrategias({recuperaciones, onUpdate}){
  const [sel,setSel]=useState(null);
  const [formUpd,setFormUpd]=useState({resultado:"contactado",nota:""});
  const [filtro,setFiltro]=useState("en_curso");

  const pendientes=recuperaciones.filter(r=>r.estado==="pend_aprobacion").length;
  const enCurso=recuperaciones.filter(r=>r.estado==="en_curso"||r.estado==="pausado").length;
  const recuperados=recuperaciones.filter(r=>r.estado==="recuperado").length;
  const sinExito=recuperaciones.filter(r=>r.estado==="sin_exito").length;

  const filtradas=filtro==="todas"
    ?recuperaciones
    :filtro==="pendiente"
      ?recuperaciones.filter(r=>r.estado==="pend_aprobacion")
      :filtro==="en_curso"
        ?recuperaciones.filter(r=>r.estado==="en_curso"||r.estado==="pausado")
        :recuperaciones.filter(r=>r.estado===filtro);

  const addSeguimiento=()=>{
    if(!sel||!formUpd.nota.trim())return;
    const nuevoSeg={semana:SEMANA_ACTUAL,resultado:formUpd.resultado,nota:formUpd.nota.trim(),ts:new Date().toLocaleDateString("es-ES")};
    // Si el resultado es pedido → marcar como recuperado
    const nuevoEstado=formUpd.resultado==="pedido"?"recuperado":formUpd.resultado==="sin_exito"?"sin_exito":"en_curso";
    onUpdate({...sel,estado:nuevoEstado,seguimientos:[...(sel.seguimientos||[]),nuevoSeg]});
    setSel(null); setFormUpd({resultado:"contactado",nota:""});
  };

  if(sel){
    return(
      <div>
        {/* Header */}
        <div style={{background:C.bg,border:`2px solid ${C.border}`,borderRadius:13,padding:"14px 16px",marginBottom:20}}>
          <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
            <div style={{flex:1}}>
              <p style={{margin:0,fontSize:16,fontWeight:800,color:C.text}}>{sel.clienteNombre}</p>
              <p style={{margin:"3px 0 0",fontSize:11,color:C.muted}}>Inicio S{sel.semanaInicio||sel.semana} · {sel.equipo}</p>
            </div>
            <button onClick={()=>setSel(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:C.muted,flexShrink:0}}>✕</button>
          </div>
          {/* Estrategia */}
          <div style={{background:C.blueL,borderRadius:9,padding:"8px 12px",display:"inline-flex",gap:7,alignItems:"center"}}>
            <span style={{fontSize:16}}>🎯</span>
            <div>
              <p style={{margin:0,fontSize:10,fontWeight:700,color:C.blue,textTransform:"uppercase"}}>Estrategia</p>
              <p style={{margin:0,fontSize:13,fontWeight:700,color:C.text}}>{sel.estrategia}</p>
            </div>
          </div>
          {sel.objetivo&&<p style={{margin:"8px 0 0",fontSize:12,color:C.muted}}>{sel.objetivo}</p>}
        </div>

        {/* Timeline seguimientos anteriores */}
        {(sel.seguimientos||[]).length>0&&(
          <div style={{marginBottom:20}}>
            <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Historial de seguimiento</p>
            {[...(sel.seguimientos||[])].reverse().map((s,i)=>{
              const r=RESULT_ESTRAT[s.resultado]||RESULT_ESTRAT.en_curso;
              return(
                <div key={i} style={{display:"flex",gap:10,marginBottom:12,paddingLeft:4}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:r.bg,border:`2px solid ${r.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{r.icon}</div>
                  <div style={{flex:1,background:"#FFF",borderRadius:10,padding:"9px 13px",border:`1px solid ${C.border}`}}>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>
                      <Tag label={r.label} color={r.color}/>
                      <span style={{fontSize:11,color:C.muted}}>S{s.semana}{s.ts?` · ${s.ts}`:""}</span>
                    </div>
                    <p style={{margin:0,fontSize:13,color:C.text}}>{s.nota}</p>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Añadir seguimiento */}
        {(sel.estado==="en_curso"||sel.estado==="pend_aprobacion")&&(
          <div style={{background:"#F8FAFC",borderRadius:13,padding:"16px",border:`2px solid ${C.blue}`}}>
            <p style={{margin:"0 0 12px",fontSize:13,fontWeight:800,color:C.text}}>Registrar avance — S{SEMANA_ACTUAL}</p>
            <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>¿Qué ha pasado?</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:14}}>
              {Object.entries(RESULT_ESTRAT).filter(([k])=>k!=="en_curso").map(([k,v])=>(
                <button key={k} onClick={()=>setFormUpd(f=>({...f,resultado:k}))}
                  style={{padding:"9px 13px",borderRadius:9,border:`2px solid ${formUpd.resultado===k?v.color:C.border}`,background:formUpd.resultado===k?v.bg:"#FFF",color:formUpd.resultado===k?v.color:C.muted,fontWeight:formUpd.resultado===k?700:400,fontSize:12,cursor:"pointer",display:"flex",gap:5,alignItems:"center"}}>
                  <span>{v.icon}</span>{v.label}
                </button>
              ))}
            </div>
            <div style={{marginBottom:14}}>
              <p style={{margin:"0 0 7px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Nota <span style={{color:C.red}}>*</span></p>
              <textarea value={formUpd.nota} onChange={e=>setFormUpd(f=>({...f,nota:e.target.value}))} rows={3}
                placeholder="¿Qué pasó? ¿Cómo reaccionó el cliente…"
                style={{...iSt,resize:"none",borderRadius:10,fontSize:13}}/>
            </div>
            <button onClick={addSeguimiento} disabled={!formUpd.nota.trim()}
              style={{width:"100%",padding:"14px",borderRadius:11,border:"none",background:formUpd.nota.trim()?C.navy:C.light,color:"#fff",fontWeight:800,fontSize:15,cursor:formUpd.nota.trim()?"pointer":"default"}}>
              Guardar seguimiento
            </button>
          </div>
        )}
        {sel.estado!=="en_curso"&&(
          <div style={{background:ESTADOS_REC[sel.estado]?.bg||C.bg,borderRadius:10,padding:"12px 14px",fontSize:13,color:ESTADOS_REC[sel.estado]?.color||C.muted,fontWeight:700,textAlign:"center"}}>
            {ESTADOS_REC[sel.estado]?.dot} Cerrado como "{ESTADOS_REC[sel.estado]?.label}"
          </div>
        )}
      </div>
    );
  }

  return(
    <div>
      {/* KPIs */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[{l:"⏳ Pendiente",v:pendientes,c:C.amber,f:"pendiente"},{l:"🔵 En curso",v:enCurso,c:C.blue,f:"en_curso"},{l:"✅ Recuperado",v:recuperados,c:C.green,f:"recuperado"}].map(k=>(
          <div key={k.l} onClick={()=>setFiltro(f=>f===k.f?"todas":k.f)}
            style={{flex:1,background:filtro===k.f?k.c+"15":"#FFF",border:`2px solid ${filtro===k.f?k.c:C.border}`,borderRadius:12,padding:"11px 8px",textAlign:"center",cursor:"pointer"}}>
            <p style={{margin:0,fontSize:20,fontWeight:800,color:k.c}}>{k.v}</p>
            <p style={{margin:"2px 0 0",fontSize:9,fontWeight:700,color:C.muted}}>{k.l}</p>
          </div>
        ))}
      </div>

      {/* Filtros */}
      <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>
        {[["pendiente","⏳ Pendiente"],["en_curso","🔵 En curso"],["recuperado","✅ Recuperado"],["sin_exito","❌ Sin éxito"],["todas","Todas"]].map(([k,l])=>(
          <button key={k} onClick={()=>setFiltro(k)}
            style={{padding:"6px 12px",borderRadius:8,border:`1.5px solid ${filtro===k?C.blue:C.border}`,background:filtro===k?C.blueL:"#FFF",color:filtro===k?C.blue:C.muted,fontSize:11,fontWeight:filtro===k?700:400,cursor:"pointer"}}>
            {l}
          </button>
        ))}
      </div>

      {filtradas.length===0?(
        <div style={{textAlign:"center",padding:"28px",background:"#FFF",borderRadius:13,border:`1px solid ${C.border}`,color:C.muted}}>
          <span style={{fontSize:32,display:"block",marginBottom:8}}>🔄</span>
          <p style={{margin:0,fontSize:14,fontWeight:600}}>Sin estrategias en este estado</p>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtradas.map(r=>{
            const est=ESTADOS_REC[r.estado]||ESTADOS_REC.en_curso;
            const asignadaJefe=r.asignadoPor!=="agente";
            const ultimoSeg=(r.seguimientos||[]).slice(-1)[0];
            const ultimoRes=ultimoSeg?RESULT_ESTRAT[ultimoSeg.resultado]:null;
            return(
              <div key={r.id} onClick={()=>setSel(r)}
                style={{background:"#FFF",borderRadius:13,border:`2px solid ${est.color}44`,borderLeft:`4px solid ${est.color}`,padding:"14px 16px",cursor:"pointer",transition:"transform .1s"}}
                onMouseEnter={e=>e.currentTarget.style.transform="translateX(3px)"}
                onMouseLeave={e=>e.currentTarget.style.transform="none"}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center",marginBottom:5}}>
                      <span style={{fontSize:15}}>{est.dot}</span>
                      <p style={{margin:0,fontSize:15,fontWeight:800,color:C.text}}>{r.clienteNombre}</p>
                      {asignadaJefe&&<Tag label="Del jefe" color={C.amber}/>}
                    </div>
                    {/* Estrategia */}
                    <div style={{display:"inline-flex",gap:5,alignItems:"center",background:C.blueL,borderRadius:7,padding:"4px 10px",marginBottom:6}}>
                      <span style={{fontSize:13}}>🎯</span>
                      <span style={{fontSize:12,fontWeight:700,color:C.blue}}>{r.estrategia}</span>
                    </div>
                    {/* Último seguimiento */}
                    {ultimoSeg?(
                      <p style={{margin:0,fontSize:12,color:ultimoRes?.color||C.muted}}>
                        {ultimoRes?.icon} {ultimoSeg.nota.slice(0,55)}{ultimoSeg.nota.length>55?"…":""}
                        <span style={{color:C.light}}> · S{ultimoSeg.semana}</span>
                      </p>
                    ):(
                      <p style={{margin:0,fontSize:12,color:C.muted,fontStyle:"italic"}}>Sin seguimientos — toca para añadir</p>
                    )}
                  </div>
                  <div style={{flexShrink:0,textAlign:"right"}}>
                    <span style={{fontSize:20,color:C.light}}>›</span>
                    <p style={{margin:"4px 0 0",fontSize:10,color:C.muted}}>{(r.seguimientos||[]).length} entrada{(r.seguimientos||[]).length!==1?"s":""}</p>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
      {enCurso>0&&filtro==="en_curso"&&(
        <div style={{marginTop:16,background:C.blueL,borderRadius:10,padding:"10px 14px",fontSize:12,color:C.blue,fontWeight:600}}>
          💡 Toca cualquier estrategia para registrar el avance de esta semana.
        </div>
      )}
    </div>
  );
}

// ─ Vista Historial de Muestras ───────────────────────────────────
function VistaHistorialMuestras({muestras, onFeedback, feedbackLocal}){
  const [sel,setSel]=useState(null);
  const [formFb,setFormFb]=useState({resultado:"positivo",nota:""});
  const [filtro,setFiltro]=useState("pendiente");

  const todasConFb=muestras.map(m=>{
    const fb=feedbackLocal?.find(f=>f.id===m.id);
    return fb?{...m,estado:fb.resultado,nota:fb.nota}:m;

  const filtradas=filtro==="todas"?todasConFb:todasConFb.filter(m=>m.estado===filtro);
  const pendCount=todasConFb.filter(m=>m.estado==="pendiente").length;
  const posCount=todasConFb.filter(m=>m.estado==="positivo"||m.estado==="pedido").length;
  const koCount=todasConFb.filter(m=>m.estado==="ko").length;
