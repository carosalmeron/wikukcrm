function MisClientes({clientes=[], muestras=[], recuperaciones=[], reportes=[], onOpenFicha, usuario, onClienteCreado, cargando=false}){
  const [q,setQ]=useState("");
  const [filtroEquipo,setFiltroEquipo]=useState("todos");
  const [showNuevo,setShowNuevo]=useState(false);

  const filtered=clientes.filter(c=>{
    const matchQ=!q||c.nombre.toLowerCase().includes(q.toLowerCase())||c.codigoERP?.includes(q);
    return matchQ;
  });

  const getStats=(c)=>{
    const visitas=(reportes||[]).flatMap(r=>r.visitas||[]).filter(v=>v.clienteId===c.id||v.clienteNombre===c.nombre);
    const mts=(muestras||[]).filter(m=>m.clienteNombre===c.nombre||m.clienteId===c.id);
    const recs=(recuperaciones||[]).filter(r=>r.clienteNombre===c.nombre||r.clienteId===c.id);
    return {visitas:visitas.length, muestras:mts.length, recuperaciones:recs.length,
      ultimaVisita:visitas[0]?.semana, muestraPendiente:mts.some(m=>m.estado==="pendiente")};
  };

  const equipos=[...new Set(clientes.map(c=>c.equipo).filter(Boolean))];
  const agenteName=(id)=>VENDEDORES.find(v=>v.id===id)?.nombre||id||"";

  return(
    <div>
      {showNuevo&&usuario&&<NuevoClienteForm usuario={usuario} onSave={c=>onClienteCreado&&onClienteCreado(c)} onClose={()=>setShowNuevo(false)}/>}

      {/* Banner carga Firebase */}
      {cargando&&(
        <div style={{background:C.blueL,border:`1px solid ${C.blue}44`,borderRadius:10,padding:"10px 16px",marginBottom:12,display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:16}}>⏳</span>
          <p style={{margin:0,fontSize:12,color:C.blue,fontWeight:600}}>Cargando clientes desde Firebase…</p>
        </div>
      )}

      {/* Buscador + botón nuevo */}
      <div style={{position:"sticky",top:0,background:C.bg,paddingBottom:12,zIndex:5}}>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <div style={{position:"relative",flex:1}}>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 Buscar cliente…"
              style={{...iSt,paddingLeft:16,borderRadius:12,fontSize:14,padding:"12px 16px",width:"100%"}}/>
            {q&&<button onClick={()=>setQ("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:18}}>×</button>}
          </div>
          <button onClick={()=>setShowNuevo(true)}
            style={{padding:"0 18px",borderRadius:12,border:"none",background:C.navy,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:18}}>+</span> Nuevo cliente
          </button>
        </div>
        {equipos.length>1&&(
          <div style={{display:"flex",gap:6}}>
            {["todos",...equipos].map(eq=>(
              <button key={eq} onClick={()=>setFiltroEquipo(eq)}
                style={{padding:"6px 14px",borderRadius:8,border:`1.5px solid ${filtroEquipo===eq?C.blue:C.border}`,background:filtroEquipo===eq?C.blueL:"#FFF",color:filtroEquipo===eq?C.blue:C.muted,fontSize:12,fontWeight:filtroEquipo===eq?700:400,cursor:"pointer"}}>
                {eq==="todos"?"Todos":eq}
              </button>
            ))}
          </div>
        )}
        <p style={{margin:"8px 0 0",fontSize:11,color:C.muted}}>{filtered.length} cliente{filtered.length!==1?"s":""}{q?` · "${q}"`:""}</p>
      </div>

      {/* Lista */}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.length===0&&(
          <div style={{textAlign:"center",padding:"40px 0",color:C.muted}}>
            <p style={{fontSize:32}}>🔍</p><p style={{fontWeight:600}}>Sin resultados</p>
          </div>
        )}
        {filtered.map(c=>{
          const s=getStats(c);
          return(
            <div key={c.id} style={{background:"#FFF",borderRadius:13,border:`1px solid ${C.border}`,padding:"13px 15px",display:"flex",gap:12,alignItems:"center"}}>
              <div style={{flex:1,minWidth:0}} onClick={()=>onOpenFicha&&onOpenFicha(c.id)} style={{flex:1,minWidth:0,cursor:onOpenFicha?"pointer":"default"}}>
                <p style={{margin:0,fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nombre}</p>
                <p style={{margin:"2px 0 0",fontSize:11,color:C.muted}}>
                  {agenteName(c.agente)}
                  {c.codigoERP?` · ${c.codigoERP}`:""}
                </p>
                {/* Mini badges */}
                <div style={{display:"flex",gap:5,marginTop:5,flexWrap:"wrap"}}>
                  {c.esOportunidad&&<span style={{padding:"2px 7px",borderRadius:5,background:"#EFF6FF",color:"#1A5FD4",fontSize:10,fontWeight:700}}>🎯 Oportunidad</span>}
                  {s.visitas>0&&<span style={{padding:"2px 7px",borderRadius:5,background:C.blueL,color:C.blue,fontSize:10,fontWeight:700}}>👥 {s.visitas}</span>}
                  {s.muestras>0&&<span style={{padding:"2px 7px",borderRadius:5,background:C.amberL,color:C.amber,fontSize:10,fontWeight:700}}>📦 {s.muestras}</span>}
                  {s.recuperaciones>0&&<span style={{padding:"2px 7px",borderRadius:5,background:C.purpleL,color:C.purple,fontSize:10,fontWeight:700}}>🎯 {s.recuperaciones}</span>}
                  {s.muestraPendiente&&<span style={{padding:"2px 7px",borderRadius:5,background:C.amberL,color:C.amber,fontSize:10,fontWeight:700}}>⏳ feedback</span>}
                  {!c.esOportunidad&&s.visitas===0&&s.muestras===0&&s.recuperaciones===0&&<span style={{padding:"2px 7px",borderRadius:5,background:C.bg,color:C.light,fontSize:10}}>Sin actividad</span>}
                </div>
              </div>
              <button onClick={()=>onOpenFicha&&onOpenFicha(c.id)}
                style={{width:44,height:44,borderRadius:11,border:`1.5px solid ${C.blue}`,background:C.blueL,color:C.blue,fontSize:20,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                📋
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function HistorialProductosMuestra({muestras=[], onBack}){
  const [sel,setSel]=useState(null);
  const [filtro,setFiltro]=useState("todos");

  // Group muestras by product
  const porProducto=useMemo(()=>{
    const map={};
    muestras.forEach(m=>{
      const key=m.prodCodigo||m.prodNombre;
      if(!map[key]) map[key]={codigo:m.prodCodigo,nombre:m.prodNombre,tipo:m.tipo,entregas:[],totalUds:0};
      map[key].entregas.push(m);
      map[key].totalUds+=(parseInt(m.cantidad)||0);
    });
    return Object.values(map).map(p=>({
      ...p,
      positivos:p.entregas.filter(e=>e.estado==="positivo").length,
      pedidos:p.entregas.filter(e=>e.estado==="pedido").length,
      kos:p.entregas.filter(e=>e.estado==="ko").length,
      pendientes:p.entregas.filter(e=>e.estado==="pendiente").length,
      clientes:[...new Set(p.entregas.map(e=>e.clienteNombre))].length,
    })).sort((a,b)=>b.entregas.length-a.entregas.length);
  },[muestras]);

  const filtradas=filtro==="todos"?porProducto:porProducto.filter(p=>{
    if(filtro==="pedido") return p.pedidos>0;
    if(filtro==="positivo") return p.positivos>0;
    if(filtro==="ko") return p.kos>0;
    if(filtro==="pendiente") return p.pendientes>0;
    return true;
  });

  // Totales
  const totEntregas=muestras.length;
  const totPedidos=muestras.filter(m=>m.estado==="pedido").length;
  const totPositivos=muestras.filter(m=>m.estado==="positivo").length;
  const totKos=muestras.filter(m=>m.estado==="ko").length;
  const tasaExito=totEntregas>0?Math.round((totPedidos+totPositivos)/totEntregas*100):0;

  // Vista detalle de un producto
  if(sel){
    const prod=porProducto.find(p=>(p.codigo||p.nombre)===sel);
    if(!prod) return null;
    const FB={positivo:{c:C.green,ic:"✅",l:"Positivo"},pedido:{c:C.blue,ic:"🛒",l:"Ha pedido"},ko:{c:C.red,ic:"❌",l:"KO"},pendiente:{c:C.muted,ic:"⏳",l:"Pendiente"}};
    return(
      <div style={{minHeight:"100vh",background:C.bg}}>
        <div style={{background:C.navy,padding:"14px 18px"}}>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <button onClick={()=>setSel(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#9CA3AF",fontSize:22,padding:0}}>←</button>
            <div style={{flex:1}}>
              <p style={{margin:0,fontSize:15,fontWeight:800,color:"#FFF"}}>{prod.nombre}</p>
              <p style={{margin:0,fontSize:11,color:"#9CA3AF"}}>{prod.codigo||prod.tipo} · {prod.entregas.length} entregas · {prod.clientes} clientes</p>
            </div>
          </div>
        </div>
        <div style={{padding:16}}>
          {/* KPIs del producto */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
            {[{l:"Total uds",v:prod.totalUds,c:C.blue},{l:"Clientes",v:prod.clientes,c:C.purple},
              {l:"✅ Positivo",v:prod.positivos,c:C.green},{l:"🛒 Han pedido",v:prod.pedidos,c:C.blue},
              {l:"❌ KO",v:prod.kos,c:C.red},{l:"⏳ Pendiente",v:prod.pendientes,c:C.muted}
            ].map(k=>(
              <div key={k.l} style={{background:"#FFF",borderRadius:11,padding:"12px 14px",border:`1px solid ${C.border}`,borderTop:`3px solid ${k.c}`}}>
                <p style={{margin:0,fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>{k.l}</p>
                <p style={{margin:"4px 0 0",fontSize:22,fontWeight:800,color:k.c}}>{k.v}</p>
              </div>
            ))}
          </div>
          {/* Lista entregas */}
          <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Histórico de entregas</p>
          {prod.entregas.sort((a,b)=>(b.semana||0)-(a.semana||0)).map((e,i)=>{
            const fb=FB[e.estado]||FB.pendiente;
            return(
              <div key={i} style={{background:"#FFF",borderRadius:12,border:`1px solid ${C.border}`,borderLeft:`3px solid ${fb.c}`,padding:"12px 14px",marginBottom:8}}>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <span style={{fontSize:20}}>{fb.ic}</span>
                  <div style={{flex:1}}>
                    <p style={{margin:0,fontSize:13,fontWeight:700}}>{e.clienteNombre}</p>
                    <div style={{display:"flex",gap:8,marginTop:3,alignItems:"center"}}>
                      <Tag label={fb.l} color={fb.c}/>
                      <span style={{fontSize:11,color:C.muted}}>{e.cantidad} uds · S{e.semana}</span>
                    </div>
                    {e.nota&&<p style={{margin:"4px 0 0",fontSize:12,color:C.muted,fontStyle:"italic"}}>"{e.nota}"</p>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      {/* Header */}
      <div style={{background:C.navy,padding:"14px 18px",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
          {onBack&&<button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",color:"#9CA3AF",fontSize:22,padding:0}}>←</button>}
          <div>
            <p style={{margin:0,fontSize:16,fontWeight:800,color:"#FFF"}}>📦 Historial de Muestras</p>
            <p style={{margin:0,fontSize:11,color:"#9CA3AF"}}>{porProducto.length} productos · {totEntregas} entregas</p>
          </div>
        </div>
        {/* Resumen rápido */}
        <div style={{display:"flex",gap:8,paddingBottom:14}}>
          {[{l:"Éxito",v:`${tasaExito}%`,c:C.green},{l:"Pedidos",v:totPedidos,c:C.blue},{l:"KO",v:totKos,c:C.red},{l:"Pendientes",v:muestras.filter(m=>m.estado==="pendiente").length,c:C.amber}].map(k=>(
            <div key={k.l} style={{flex:1,background:"#FFFFFF22",borderRadius:8,padding:"6px 8px",textAlign:"center"}}>
              <p style={{margin:0,fontSize:16,fontWeight:800,color:"#FFF"}}>{k.v}</p>
              <p style={{margin:0,fontSize:9,color:"#9CA3AF",fontWeight:700}}>{k.l}</p>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:"16px"}}>
        {/* Filtros */}
        <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>
          {[["todos","Todos"],["pedido","🛒 Han pedido"],["positivo","✅ Positivo"],["ko","❌ KO"],["pendiente","⏳ Pendiente"]].map(([k,l])=>(
            <button key={k} onClick={()=>setFiltro(k)}
              style={{padding:"6px 12px",borderRadius:8,border:`1.5px solid ${filtro===k?C.blue:C.border}`,background:filtro===k?C.blueL:"#FFF",color:filtro===k?C.blue:C.muted,fontSize:11,fontWeight:filtro===k?700:400,cursor:"pointer"}}>
              {l}
            </button>
          ))}
        </div>

        {/* Lista productos */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtradas.map((prod,i)=>{
            const total=prod.entregas.length;
            const exito=prod.pedidos+prod.positivos;
            const pct=total>0?Math.round(exito/total*100):0;
            const maxPct=100;
            return(
              <div key={i} onClick={()=>setSel(prod.codigo||prod.nombre)}
                style={{background:"#FFF",borderRadius:14,border:`1px solid ${C.border}`,padding:"14px 16px",cursor:"pointer",transition:"transform .1s,box-shadow .1s"}}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow="0 4px 16px #0001";}}
                onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
                <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10}}>
                  <div style={{width:44,height:44,borderRadius:12,background:C.amberL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>📦</div>
                  <div style={{flex:1,minWidth:0}}>
                    {prod.codigo&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:C.blue,fontWeight:700}}>{prod.codigo}</p>}
                    <p style={{margin:0,fontSize:14,fontWeight:700,color:C.text,lineHeight:1.3}}>{prod.nombre}</p>
                    <p style={{margin:"2px 0 0",fontSize:11,color:C.muted}}>{prod.tipo} · {prod.totalUds} uds · {prod.clientes} cliente{prod.clientes!==1?"s":""}</p>
                  </div>
                  <span style={{color:C.light,fontSize:20,flexShrink:0}}>›</span>
                </div>
                {/* Barra de éxito */}
                <div style={{marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:10,color:C.muted,fontWeight:700,textTransform:"uppercase"}}>Tasa de éxito</span>
                    <span style={{fontSize:11,fontWeight:800,color:pct>=50?C.green:pct>=25?C.amber:C.red}}>{pct}%</span>
                  </div>
                  <div style={{height:6,background:C.bg,borderRadius:3,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:pct>=50?C.green:pct>=25?C.amber:C.red,borderRadius:3,transition:"width .3s"}}/>
                  </div>
                </div>
                {/* Badges resultado */}
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <span style={{padding:"3px 9px",borderRadius:6,background:C.greenL,color:C.green,fontSize:11,fontWeight:700}}>✅ {prod.positivos}</span>
                  <span style={{padding:"3px 9px",borderRadius:6,background:C.blueL,color:C.blue,fontSize:11,fontWeight:700}}>🛒 {prod.pedidos}</span>
                  <span style={{padding:"3px 9px",borderRadius:6,background:C.redL,color:C.red,fontSize:11,fontWeight:700}}>❌ {prod.kos}</span>
                  {prod.pendientes>0&&<span style={{padding:"3px 9px",borderRadius:6,background:C.bg,color:C.muted,fontSize:11,fontWeight:700}}>⏳ {prod.pendientes}</span>}
                  <span style={{padding:"3px 9px",borderRadius:6,background:"#F3F4F6",color:C.muted,fontSize:11}}>Total: {total}</span>
                </div>
              </div>
            );
          })}
        </div>
        {filtradas.length===0&&(
          <div style={{textAlign:"center",padding:"40px 0",color:C.muted}}>
            <p style={{fontSize:36}}>📦</p><p style={{fontWeight:600}}>Sin productos con ese filtro</p>
          </div>
        )}
      </div>
    </div>
  );
}

                    return(
                      <div key={f.semana} style={{display:"flex",gap:5,padding:"8px 12px",borderBottom:`1px solid ${C.border}`,alignItems:"center",background:editing?color+"08":i%2===0?"#FFF":"#FCFCFC"}}>
                        <div style={{flex:0.6}}>
                          <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:28,height:26,borderRadius:6,background:editing?color+"20":C.bg,border:`1.5px solid ${editing?color:C.border}`,fontSize:10,fontWeight:800,color:editing?color:C.text}}>S{f.semana}</span>
                        </div>
                        {["ventas","mb","muestras","promo","liq"].map((campo)=>(
                          <div key={campo} style={{flex:1}}>
                            {editing?(
                              <input type="number" defaultValue={f[campo]||0}
                                onChange={e=>updateFila(f.semana,campo,e.target.value)}
                                style={{...iSt,padding:"4px 5px",fontSize:10,borderColor:color}}/>
                            ):(
                              <span style={{fontSize:11,fontWeight:campo==="ventas"?700:400,color:campo==="mb"?C.blue:campo==="ventas"?C.text:C.muted}}>
                                {campo==="mb"?`${f.mb}%`:campo==="muestras"?`${f.muestras||0}u`:`${((f[campo]||0)/1000).toFixed(1)}k`}
                              </span>
                            )}
                          </div>
                        ))}
                        <div style={{width:66,display:"flex",gap:3,flexShrink:0}}>
                          {editing?(
                            <button onClick={()=>setEditSemObj(null)} style={{flex:1,padding:"5px",borderRadius:6,border:"none",background:color,color:"#fff",fontSize:12,cursor:"pointer"}}>✓</button>
                          ):(
                            <button onClick={()=>setEditSemObj(f.semana)} style={{flex:1,padding:"5px",borderRadius:6,border:`1px solid ${C.border}`,background:"#FFF",color:C.blue,fontSize:11,cursor:"pointer"}}>✏</button>
                          )}
                          <button onClick={()=>deleteFila(f.semana)} style={{flex:1,padding:"5px",borderRadius:6,border:"none",background:C.redL,color:C.red,fontSize:11,cursor:"pointer"}}>🗑</button>
                        </div>
                      </div>
                    );
                  })}

                  {filas.length>0&&(
                    <div style={{padding:"8px 12px",background:"#F8FAFC",borderTop:`1px solid ${C.border}`,display:"flex",gap:14,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,color:C.muted}}>Ventas: <b>{((filas.reduce((s,f)=>s+(f.ventas||0),0)/filas.length)/1000).toFixed(0)}k€</b></span>
                      <span style={{fontSize:10,color:C.muted}}>MB: <b style={{color:C.blue}}>{(filas.reduce((s,f)=>s+(f.mb||0),0)/filas.length).toFixed(1)}%</b></span>
                      <span style={{fontSize:10,color:C.muted}}>Promo: <b>{((filas.reduce((s,f)=>s+(f.promo||0),0)/filas.length)/1000).toFixed(1)}k€</b></span>
                      <span style={{fontSize:10,color:C.muted}}>Liq: <b>{((filas.reduce((s,f)=>s+(f.liq||0),0)/filas.length)/1000).toFixed(1)}k€</b></span>
                    </div>
                  )}
                </Card>
              </div>
            );
          })()}
        </div>
      )}

      {/* ── HISTORIAL ── */}
      {tab==="historial"&&(
        <div>
          {showFormH&&(
            <div style={{position:"fixed",inset:0,background:"#00000077",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
              <div style={{background:C.white,borderRadius:16,width:"min(480px,96vw)",overflow:"hidden",boxShadow:"0 24px 64px #0004"}}>
                <div style={{padding:"16px 22px",borderBottom:`1px solid ${C.border}`,background:C.navy,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <p style={{margin:0,fontSize:15,fontWeight:800,color:"#fff"}}>Registrar venta semanal</p>
                  <button onClick={()=>setShowFormH(false)} style={{background:"none",border:"none",cursor:"pointer"}}><Ico d={IC.x} s={17} c="#64748B"/></button>
                </div>
                <div style={{padding:"22px"}}>
                  <div style={{display:"flex",gap:12,marginBottom:14}}>
                    <div style={{flex:2}}>
                      <p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Comercial</p>
                      <select value={formH.agente} onChange={e=>{const v=VENDEDORES.find(vv=>vv.id===e.target.value);setFormH(f=>({...f,agente:e.target.value,equipo:v?.equipo||f.equipo}));}} style={{...iSt,background:C.white}}>
                        {VENDEDORES.filter(v=>v.rol==="agente").map(v=><option key={v.id} value={v.id}>{v.nombre} ({v.equipo})</option>)}
                      </select>
                    </div>
                    <div style={{flex:1}}>
                      <p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Semana</p>
                      <select value={formH.semana} onChange={e=>setFormH(f=>({...f,semana:parseInt(e.target.value)}))} style={{...iSt,background:C.white}}>
                        {SEMANAS_OPTS2.map(s=><option key={s} value={s}>Semana {s}</option>)}
                      </select>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:12,marginBottom:14}}>
                    <div style={{flex:1}}><p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Ventas € <span style={{color:C.red}}>*</span></p><input type="number" value={formH.ventas} onChange={e=>setFormH(f=>({...f,ventas:e.target.value}))} placeholder="0" style={iSt}/></div>
                    <div style={{flex:1}}><p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>MB% <span style={{color:C.red}}>*</span></p><input type="number" value={formH.mb} onChange={e=>setFormH(f=>({...f,mb:e.target.value}))} placeholder="0.0" style={iSt}/></div>
                  </div>
                  <div style={{display:"flex",gap:12,marginBottom:16}}>
                    <div style={{flex:1}}><p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Muest. Desh.</p><input type="number" value={formH.desh} onChange={e=>setFormH(f=>({...f,desh:e.target.value}))} placeholder="0" style={iSt}/></div>
                    <div style={{flex:1}}><p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Muest. Prep.</p><input type="number" value={formH.prep} onChange={e=>setFormH(f=>({...f,prep:e.target.value}))} placeholder="0" style={iSt}/></div>
                    <div style={{flex:1}}><p style={{margin:"0 0 5px",fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Liquidación €</p><input type="number" value={formH.liq} onChange={e=>setFormH(f=>({...f,liq:e.target.value}))} placeholder="0" style={iSt}/></div>
                  </div>
                  <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                    <button onClick={()=>setShowFormH(false)} style={{padding:"9px 18px",borderRadius:8,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancelar</button>
                    <button onClick={saveHistorial} disabled={!formH.ventas||!formH.mb} style={{padding:"9px 24px",borderRadius:8,border:"none",background:(formH.ventas&&formH.mb)?C.navy:C.light,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Registrar</button>
                  </div>
                </div>
              </div>
            </div>
          )}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
            <p style={{margin:0,fontSize:13,color:C.muted}}>{historial.length} registros · Semana actual: {SEMANA_ACTUAL}</p>
            <button onClick={()=>setShowFormH(true)} style={{display:"flex",gap:6,alignItems:"center",padding:"9px 18px",borderRadius:9,border:"none",background:C.navy,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>
              <Ico d={IC.plus} s={14} c="#fff"/> Registrar venta
            </button>
          </div>
          {historial.length===0?(
            <Card style={{textAlign:"center",padding:40,color:C.muted,fontSize:13}}>
              <span style={{fontSize:32,display:"block",marginBottom:10}}>📊</span>
              Aún no hay registros. Pulsa "Registrar venta" para añadir el primero.
            </Card>
          ):(
            <Card style={{padding:0,overflow:"hidden"}}>
              <div style={{background:"#F8FAFC",padding:"9px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:8}}>
                {["Comercial","Sem.","Ventas","MB%","Desh.","Prep.","Liq.","Fecha"].map((h,i)=>(
                  <span key={h} style={{flex:i===0?2:1,fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>{h}</span>
                ))}
              </div>
              {historial.map((h,i)=>{
                const vend=VENDEDORES.find(v=>v.id===h.agente);
                return(
                  <div key={h.id} style={{display:"flex",gap:8,padding:"11px 18px",borderBottom:`1px solid ${C.border}`,alignItems:"center",background:i%2===0?C.white:"#FCFCFC"}}>
                    <div style={{flex:2,display:"flex",gap:6,alignItems:"center"}}><Avt nombre={vend?.nombre||"?"} color={vend?.color||C.muted} size={22}/><span style={{fontSize:12,fontWeight:600}}>{vend?.nombre?.split(" ")[0]}</span></div>
                    <span style={{flex:1,fontSize:12,color:C.muted}}>S{h.semana}</span>
                    <span style={{flex:1,fontSize:12,fontWeight:700}}>{(h.ventas/1000).toFixed(0)}k€</span>
                    <span style={{flex:1,fontSize:12,color:C.blue}}>{h.mb}%</span>
                    <span style={{flex:1,fontSize:12,color:C.muted}}>{h.desh||"—"}</span>
                    <span style={{flex:1,fontSize:12,color:C.muted}}>{h.prep||"—"}</span>
                    <span style={{flex:1,fontSize:12,color:C.muted}}>{h.liq?`${(h.liq/1000).toFixed(1)}k`:"—"}</span>
                    <span style={{flex:1,fontSize:10,color:C.light}}>{h.ts}</span>
                  </div>
                );
              })}
            </Card>
          )}
        </div>
      )}
    </div>
  );
}

// ADMIN — GESTIÓN DE USUARIOS
// ══════════════════════════════════════════════════════════════════
function AdminUsers({users, onUpdate}){
  const BG="#EFEDE8";
  const NARANJA="#C2622D";
  const NARANJA_L="#F5E6DC";
  const ROL_LABELS={agente:"Comercial",jefe:"Responsable",director:"Director Comercial",ceo:"CEO",rrhh:"RRHH",admin:"Admin"};
  const ROL_GRUPO={ceo:"Dirección",director:"Dirección",jefe:"Responsables",agente:"Comerciales",rrhh:"Soporte",admin:"Soporte"};

  const [tab,setTab]=useState("usuarios"); // "usuarios" | "admins"
  const [editUser,setEditUser]=useState(null); // null=lista | user=form
  const [isNew,setIsNew]=useState(false);
  const [form,setForm]=useState({nombre:"",username:"",password:"",rol:"agente",equipo:"WIKUK",uid:"",activo:true});
  const [showPass,setShowPass]=useState(false);
  const [confirm,setConfirm]=useState(null); // id a eliminar

  const genPass=()=>{
    const c="abcdefghjkmnpqrstuvwxy23456789";
    return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join("");
  };

  const comerciales=users.filter(u=>!["admin"].includes(u.rol));
  const admins=users.filter(u=>u.rol==="admin");
  const lista=tab==="admins"?admins:comerciales;

  const openNew=(rol="agente")=>{
    setForm({nombre:"",username:"",password:genPass(),rol,equipo:"WIKUK",uid:"",activo:true});
    setIsNew(true); setEditUser({}); setShowPass(true);
  };
  const openEdit=(u)=>{
    setForm({...u,password:""}); setIsNew(false); setEditUser(u); setShowPass(false);
  };
  const cancelar=()=>{ setEditUser(null); };
  const guardar=()=>{
    if(!form.nombre.trim()||!form.username.trim())return;
    const id=isNew?`u-${Date.now()}`:editUser.id;
    const pwd=form.password.trim()||editUser?.password||"";
    const userDoc={...form,id,password:pwd};
    // Guardar en Firebase
    if(window.fbGuardar) window.fbGuardar('usuarios',id,userDoc);
    onUpdate(users.filter(u=>u.id!==id).concat([userDoc]));
    setEditUser(null);
  };
  const eliminar=(id)=>{
    // Desactivar en Firebase en lugar de eliminar (más seguro)
    if(window.fbGuardar) window.fbGuardar('usuarios',id,{activo:false});
    onUpdate(users.filter(u=>u.id!==id));
    setConfirm(null);
  };
  const toggleActivo=(id)=>{
    const updated=users.map(u=>u.id===id?{...u,activo:!u.activo}:u);
    const u=updated.find(x=>x.id===id);
    if(window.fbGuardar&&u) window.fbGuardar('usuarios',id,{activo:u.activo});
    onUpdate(updated);
  };

  // ── FORMULARIO EDITAR / NUEVO ──────────────────────────────────
  if(editUser!==null){
    const needsEquipo=["agente","jefe"].includes(form.rol);
    const agentesDisp=VENDEDORES.filter(v=>v.rol==="agente"&&(!needsEquipo||v.equipo===form.equipo));
    const valid=form.nombre.trim()&&form.username.trim();

    return(
      <div style={{minHeight:"100vh",background:BG,padding:"0 0 40px"}}>
        {/* Header */}
        <div style={{background:C.navy,padding:"14px 18px",display:"flex",gap:12,alignItems:"center"}}>
          <button onClick={cancelar} style={{background:"none",border:"none",cursor:"pointer",color:"#9CA3AF",fontSize:13,display:"flex",alignItems:"center",gap:5}}>
            ← Volver
          </button>
        </div>

        <div style={{padding:"24px 18px"}}>
          <p style={{margin:"0 0 20px",fontSize:18,fontWeight:700,color:C.text}}>
            {isNew?"Nuevo usuario":"Editar usuario"}
          </p>

          {/* Nombre */}
          <input value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))}
            placeholder="Nombre completo"
            style={{width:"100%",padding:"14px 16px",borderRadius:10,border:"1px solid #D1D5DB",background:"#FFF",fontSize:15,marginBottom:12,boxSizing:"border-box",fontFamily:"inherit"}}/>

          {/* Username */}
          <input value={form.username} onChange={e=>setForm(f=>({...f,username:e.target.value}))}
            placeholder="Usuario (@nombre)"
            style={{width:"100%",padding:"14px 16px",borderRadius:10,border:"1px solid #D1D5DB",background:"#FFF",fontSize:15,marginBottom:12,boxSizing:"border-box",fontFamily:"inherit"}}/>

          {/* Password */}
          <div style={{position:"relative",marginBottom:12}}>
            <input value={form.password} onChange={e=>setForm(f=>({...f,password:e.target.value}))}
              type={showPass?"text":"password"}
              placeholder={isNew?"Contraseña":"Nueva contraseña (vacío = sin cambios)"}
              style={{width:"100%",padding:"14px 16px",borderRadius:10,border:"1px solid #D1D5DB",background:"#FFF",fontSize:15,boxSizing:"border-box",fontFamily:"inherit"}}/>
            <button onClick={()=>setShowPass(s=>!s)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:14}}>
              {showPass?"🙈":"👁"}
            </button>
          </div>
          {isNew&&form.password&&(
            <div style={{background:C.greenL,borderRadius:9,padding:"8px 14px",marginBottom:12,fontSize:12,color:C.green,fontWeight:600}}>
              🔑 Contraseña generada: <b>{form.password}</b> — compártela con el usuario
            </div>
          )}

          {/* Rol */}
          {isNew&&(
            <div style={{marginBottom:12}}>
              <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Rol</p>
              <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                {[["agente","Comercial"],["jefe","Responsable"],["director","Director"],["ceo","CEO"],["rrhh","RRHH"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setForm(f=>({...f,rol:k,uid:""}))}
                    style={{padding:"8px 14px",borderRadius:9,border:`2px solid ${form.rol===k?NARANJA:"#D1D5DB"}`,background:form.rol===k?NARANJA_L:"#FFF",color:form.rol===k?NARANJA:C.muted,fontWeight:form.rol===k?700:400,fontSize:13,cursor:"pointer"}}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Equipo */}
          {needsEquipo&&(
            <div style={{marginBottom:12}}>
              <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Equipo</p>
              <div style={{display:"flex",gap:8}}>
                {["WIKUK","INTERKEY"].map(eq=>(
                  <button key={eq} onClick={()=>setForm(f=>({...f,equipo:eq,uid:""}))}
                    style={{flex:1,padding:"11px",borderRadius:9,border:`2px solid ${form.equipo===eq?NARANJA:"#D1D5DB"}`,background:form.equipo===eq?NARANJA_L:"#FFF",color:form.equipo===eq?NARANJA:C.muted,fontWeight:form.equipo===eq?700:400,fontSize:13,cursor:"pointer"}}>
                    {eq}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Perfil comercial (si es agente) */}
          {form.rol==="agente"&&(
            <div style={{marginBottom:12}}>
              <p style={{margin:"0 0 8px",fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Perfil comercial vinculado</p>
              <select value={form.uid} onChange={e=>setForm(f=>({...f,uid:e.target.value}))}
                style={{width:"100%",padding:"13px 16px",borderRadius:10,border:"1px solid #D1D5DB",background:"#FFF",fontSize:14,fontFamily:"inherit"}}>
                <option value="">-- Sin vincular --</option>
                {agentesDisp.map(v=>(
                  <option key={v.id} value={v.id}>{v.nombre} ({v.grupoAgente||v.equipo})</option>
                ))}
              </select>
            </div>
          )}

          {/* Activo */}
          <label style={{display:"flex",gap:10,alignItems:"center",marginBottom:24,cursor:"pointer"}}>
            <input type="checkbox" checked={form.activo} onChange={e=>setForm(f=>({...f,activo:e.target.checked}))}
              style={{width:18,height:18,accentColor:NARANJA}}/>
            <span style={{fontSize:15,color:C.text}}>Usuario activo</span>
          </label>

          {/* Botones */}
          <div style={{display:"flex",gap:10}}>
            <button onClick={guardar} disabled={!valid}
              style={{flex:3,padding:"15px",borderRadius:12,border:"none",background:valid?NARANJA:"#D1D5DB",color:"#FFF",fontWeight:700,fontSize:16,cursor:valid?"pointer":"default"}}>
              Guardar
            </button>
            <button onClick={cancelar}
              style={{flex:1,padding:"15px",borderRadius:12,border:"none",background:"transparent",color:NARANJA,fontWeight:600,fontSize:16,cursor:"pointer"}}>
              Cancelar
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── LISTA ──────────────────────────────────────────────────────
  return(
    <div style={{minHeight:"100vh",background:BG}}>
      {/* Confirm delete modal */}
      {confirm&&(
        <div style={{position:"fixed",inset:0,background:"#00000066",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#FFF",borderRadius:16,padding:"24px",width:"min(340px,90vw)",textAlign:"center"}}>
            <p style={{margin:"0 0 8px",fontSize:16,fontWeight:700}}>¿Eliminar usuario?</p>
            <p style={{margin:"0 0 20px",fontSize:13,color:C.muted}}>Esta acción no se puede deshacer.</p>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>setConfirm(null)} style={{flex:1,padding:"12px",borderRadius:9,border:"1px solid #D1D5DB",background:"#FFF",fontWeight:600,fontSize:14,cursor:"pointer"}}>Cancelar</button>
              <button onClick={()=>eliminar(confirm)} style={{flex:1,padding:"12px",borderRadius:9,border:"none",background:"#DC2626",color:"#FFF",fontWeight:700,fontSize:14,cursor:"pointer"}}>Eliminar</button>
            </div>
          </div>
        </div>
      )}

      {/* Header negro */}
      <div style={{background:C.navy,padding:"14px 18px 0"}}>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:14}}>
          <span style={{fontSize:18}}>⚙️</span>
          <p style={{margin:0,fontSize:16,fontWeight:700,color:"#FFF"}}>Administración CRM</p>
        </div>
        {/* Tabs */}
        <div style={{display:"flex",gap:0}}>
          {[["usuarios","👥 Usuarios"],["admins","🔐 Administradores"]].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)}
              style={{padding:"10px 18px",background:"transparent",border:"none",cursor:"pointer",color:tab===id?"#FFF":"#9CA3AF",fontWeight:tab===id?700:400,fontSize:13,borderBottom:tab===id?`2px solid ${NARANJA}`:"2px solid transparent"}}>
              {label}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:"20px 16px"}}>
        {/* Cabecera lista */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <p style={{margin:0,fontSize:15,fontWeight:700,color:C.text}}>
            {tab==="admins"?"Administradores":"Usuarios con acceso"} <span style={{fontSize:13,fontWeight:400,color:C.muted}}>({lista.length})</span>
          </p>
          <button onClick={()=>openNew(tab==="admins"?"admin":"agente")}
            style={{padding:"9px 18px",borderRadius:10,border:"none",background:NARANJA,color:"#FFF",fontWeight:700,fontSize:14,cursor:"pointer"}}>
            + Nuevo
          </button>
        </div>

        {/* Lista usuarios */}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {lista.length===0&&(
            <div style={{textAlign:"center",padding:"40px 0",color:C.muted,fontSize:14}}>
              Sin usuarios. Pulsa "+ Nuevo" para añadir.
            </div>
          )}
          {lista.map(u=>(
            <div key={u.id} style={{background:"#FFF",borderRadius:14,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                    <p style={{margin:0,fontSize:15,fontWeight:700,color:C.text}}>{u.nombre}</p>
                    <span style={{fontSize:12,color:C.muted}}>@{u.username}</span>
                  </div>
                  <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>
                    {ROL_LABELS[u.rol]||u.rol}{u.equipo?` · ${u.equipo}`:""}
                  </p>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end"}}>
                  {/* Estado activo/inactivo */}
                  <button onClick={()=>toggleActivo(u.id)}
                    style={{padding:"5px 10px",borderRadius:8,border:"none",background:u.activo?"#DCFCE7":"#FEE2E2",color:u.activo?"#166534":"#991B1B",fontWeight:600,fontSize:12,cursor:"pointer"}}>
                    {u.activo?"Activo":"Inactivo"}
                  </button>
                  {/* Editar */}
                  <button onClick={()=>openEdit(u)}
                    style={{padding:"5px 12px",borderRadius:8,border:"none",background:NARANJA,color:"#FFF",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                    Editar
                  </button>
                  {/* Eliminar */}
                  <button onClick={()=>setConfirm(u.id)}
                    style={{width:30,height:30,borderRadius:8,border:"none",background:"#DC2626",color:"#FFF",fontWeight:700,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    ×
                  </button>
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* Acceso rápido: añadir por rol */}
        {tab==="usuarios"&&(
          <div style={{marginTop:24}}>
            <p style={{margin:"0 0 12px",fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Añadir por rol</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {[["agente","Comercial"],["jefe","Responsable"],["director","Director"],["ceo","CEO"],["rrhh","RRHH"]].map(([rol,label])=>(
                <button key={rol} onClick={()=>openNew(rol)}
                  style={{padding:"8px 14px",borderRadius:9,border:`1.5px solid ${NARANJA}`,background:"#FFF",color:NARANJA,fontWeight:600,fontSize:12,cursor:"pointer"}}>
                  + {label}
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══ DELIVERY & HELPER FUNCTIONS ═══
var _DAYS=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
var _MTHS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
function _fmtD(d){return _DAYS[d.getDay()]+' '+d.getDate()+' '+_MTHS[d.getMonth()];}
function _addD(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}

// Festivos nacionales España (MM-DD) y Semana Santa calculada por año
function _isHoliday(d){
  var m=d.getMonth()+1, day=d.getDate(), y=d.getFullYear();
  // Festivos fijos nacionales
  var fixed=['1-1','1-6','5-1','8-15','10-12','11-1','12-6','12-8','12-25'];
  if(fixed.indexOf(m+'-'+day)!==-1) return true;
  // Viernes Santo — algoritmo Meeus/Jones/Butcher (corregido)
  var a=y%19, b=Math.floor(y/100), c=y%100;
  var dd=Math.floor(b/4), e=b%4, f=Math.floor((b+8)/25);
  var g=Math.floor((b-f+1)/3);
  var h=(19*a+b-dd-g+15)%30;
  var ii=Math.floor(c/4), k=c%4;
  var l=(32+2*e+2*ii-h-k)%7;
  var mm2=Math.floor((a+11*h+22*l)/451);
  var eM=Math.floor((h+l-7*mm2+114)/31);
  var eD=(h+l-7*mm2+114)%31+1;
  var easter=new Date(y,eM-1,eD);
  var gf=new Date(easter); gf.setDate(easter.getDate()-2);
  if(d.getMonth()===gf.getMonth()&&d.getDate()===gf.getDate()) return true;
  return false;
}

function _addWorkDays(d,n){
  var r=new Date(d);var added=0;
  while(added<n){
    r.setDate(r.getDate()+1);
    var wd=r.getDay();
    if(wd!==0&&wd!==6&&!_isHoliday(r)) added++;
  }
  return r;
}
function _toWorkDay(d){
  var r=new Date(d);
  while(r.getDay()===6||r.getDay()===0||_isHoliday(r)) r.setDate(r.getDate()+1);
  return r;
}
function _nextThu(today){var day=today.getDay();var diff=(4-day+7)%7||7;return _addD(today,diff);}
function calcDelivery(catKey){
  var today=new Date();today.setHours(0,0,0,0);
  var spotDays={spot_wikuk:18,spot_ceylan:14,spot_taberner:7,spot_campana:21,spot_merkapack:10};
  if(spotDays[catKey]){var thu=_nextThu(today);return '📦 '+_fmtD(_addWorkDays(thu,spotDays[catKey]));}
  return '📦 '+_fmtD(_addWorkDays(today,3));
}
function isSpot(k){return ['spot_wikuk','spot_ceylan','spot_taberner','spot_campana','spot_merkapack'].indexOf(k)!==-1;}
function isPromo(k){return k==='promo_tripas'||k==='promo_especias'||k==='promo_envases';}

      </button>
    </div>
  );
}

    if(fichaCliente) return <FichaCliente

          muestras:[],recuperaciones:[],clientes:[]

              setOportunidades(p=>p.map(o=>o.id===cli.oportunidadId?{...o,historial,estado:'seguimiento'}:o));

          }).catch(()=>{});
        }
        setReportesSem(p=>[syntheticRep,...p]);
        setHistorialDB(p=>[...p,notaDoc]);
      }}/>;

    if(section==="reporting")     return <Reporting usuario={usuario} reportes={reportesSem} onSaveReporte={saveReporte} objetivos={objetivosDB} recuperacionesAsignadas={recuperaciones} muestrasPendientes={muestrasPendientes.filter(m=>m.agente===usuario.id)} updRec={updRec} addRec={addRec} onOpenFicha={setFichaClienteId} clientesDB={clientesDB}/>;

      clientes={clientesDB.filter(c=>{
        if(session.rol==="agente"){const uid=session.uid||session.id;return c.agente===uid;}

        return true;

      muestras={muestrasPendientes} recuperaciones={recuperaciones} reportes={reportesSem}

    if(section==="recuperacion")  return <Recuperacion usuario={usuario} recuperaciones={recuperaciones} onAdd={addRec} onUpdate={updRec}/>;

        ? muestrasPendientes.filter(m=>session.rol==="agente"?m.agente===usuario.id:VENDEDORES.find(v=>v.id===m.agente)?.equipo===usuario.equipo)
        : muestrasPendientes}/>;
    if(section==="nominas")       return <Nominas key={`nom-${session.uid}`} usuario={usuario} nominasData={getNominasUsuario(session.uid)}/>;
    if(section==="datos")         return <DatosAdmin usuario={usuario} clientes={clientesDB} setClientes={setClientesDB} objetivos={objetivosDB} setObjetivos={(obj)=>{setObjetivosDB(obj);if(window.fbGuardar){Object.entries(obj).forEach(([agente,sems])=>sems.forEach(s=>window.fbGuardar('objetivos',`${agente}_S${s.semana}`,{...s,agente})));} }} historial={historialDB} setHistorial={(h)=>{setHistorialDB(h);if(window.fbGuardar&&h.length>0){const last=h[h.length-1];window.fbGuardar('historial',last.id||String(Date.now()),last);}}} onOpenCliente={setFichaClienteId}/>;
    if(section==="admin")         return <div><Admin usuario={usuario}/><div style={{marginTop:24}}><ConfigResponsables respConfig={respConfig} setRespConfig={r=>{setRespConfig(r);RESP_CONFIG_GLOBAL=r;}}/></div></div>;
    return null;
  };

  const sectionLabel=
    session.rol==="rrhh"?"Portal RRHH — Nóminas":
    section==="usuarios"?"Gestión de Usuarios":
    section==="datos"?"Gestión de Datos":
    section==="clientes"?"👥 Mis Clientes":
    section==="muestras-historial"?"📦 Historial de Muestras":
    (navItems.find(n=>n.id===section)?.label||"");
  const rolLabel=ROL_LABELS[session.rol]||session.rol;

  return(
    <div style={{display:"flex",height:"100vh",fontFamily:"'DM Sans','Helvetica Neue',sans-serif",background:C.bg,overflow:"hidden"}}>

      {/* ── Sidebar ── */}
      <aside style={{width:64,background:C.navy,display:"flex",flexDirection:"column",alignItems:"center",padding:"16px 0 12px",flexShrink:0}}>
        <div style={{width:32,height:32,borderRadius:9,background:uColor,marginBottom:20,transition:"background .3s"}}/>
        {navItems.map(n=>{
          const active=section===n.id;
          const badge=n.id==="incidencias"&&pendInc>0;
          const isNom=n.id==="nominas";
          const isEmoji=typeof n.icon==="string"&&n.icon.length<=4&&!/^[A-Z]/.test(n.icon);
          return(
            <button key={n.id} title={n.label} onClick={()=>setSection(n.id)}
              style={{width:44,height:44,borderRadius:11,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:1,
                background:active?C.navy2:"transparent",color:active?isNom?"#A78BFA":"#fff":isNom?"#6D28D9":C.light,marginBottom:4,position:"relative",transition:"all .15s"}}
              onMouseEnter={e=>{if(!active){e.currentTarget.style.background=C.navy2;e.currentTarget.style.color=isNom?"#A78BFA":"#fff";}}}
              onMouseLeave={e=>{if(!active){e.currentTarget.style.background="transparent";e.currentTarget.style.color=isNom?"#6D28D9":C.light;}}}>
              {isEmoji
                ? <span style={{fontSize:18,lineHeight:1}}>{n.icon}</span>
                : <Ico d={n.icon} s={18} c="currentColor"/>}
              {active&&<div style={{position:"absolute",left:0,top:"50%",transform:"translateY(-50%)",width:3,height:20,background:isNom?"#7C3AED":uColor,borderRadius:"0 3px 3px 0"}}/>}
              {badge&&<div style={{position:"absolute",top:6,right:6,width:8,height:8,borderRadius:"50%",background:C.red,border:`2px solid ${C.navy}`}}/>}
            </button>
          );
        })}
        <div style={{flex:1}}/>
        {/* Logout */}
        <button title="Cerrar sesión" onClick={handleLogout}
          style={{width:44,height:44,borderRadius:11,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",background:"transparent",color:C.light,marginBottom:8,transition:"all .15s"}}
          onMouseEnter={e=>{e.currentTarget.style.background="#3B1A1A";e.currentTarget.style.color="#FCA5A5";}}
          onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=C.light;}}>
          <Ico d={IC.logout} s={17} c="currentColor"/>
        </button>
        <Avt nombre={session.nombre} color={uColor} size={32}/>
      </aside>

      {/* ── Main ── */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Topbar */}
        <div style={{background:C.white,borderBottom:`1px solid ${C.border}`,padding:"0 22px",height:54,display:"flex",alignItems:"center",gap:14,flexShrink:0}}>
          <div style={{flex:1}}>
            <p style={{margin:0,fontSize:14,fontWeight:800,color:C.text}}>{sectionLabel}</p>
            <p style={{margin:0,fontSize:11,color:C.muted}}>{session.nombre} · {rolLabel}{session.equipo?` · ${session.equipo}`:""} · Semana {SEMANA_ACTUAL}</p>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <Tag label={rolLabel} color={uColor}/>
            <button onClick={()=>setModo("catalogo")} style={{display:"flex",gap:5,alignItems:"center",padding:"5px 12px",borderRadius:7,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontSize:11,fontWeight:600,cursor:"pointer"}}>
              📦 Catálogo
            </button>
            <button onClick={handleLogout} style={{display:"flex",gap:6,alignItems:"center",padding:"6px 14px",borderRadius:7,border:`1px solid ${C.border}`,background:"transparent",color:C.muted,fontSize:11,fontWeight:600,cursor:"pointer"}}>
              <Ico d={IC.logout} s={13} c={C.muted}/> Salir
            </button>
          </div>
        </div>

        {/* Content */}
        <div style={{flex:1,overflowY:"auto",padding:22}}>
          {renderSection()}
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
