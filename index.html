function SvgBarChart({data=[], height=180, color="#1A5FD4", bars=null}){
  if(!data.length) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#ccc",fontSize:11}}>Sin datos</div>;
  const keys=bars?bars.map(b=>b.key):[Object.keys(data[0]).find(k=>k!=="s"&&typeof data[0][k]==="number")||"v"];
  const colors=bars?bars.map(b=>b.color):[color];
  const allVals=data.flatMap(d=>keys.map(k=>d[k]||0));
  const maxV=Math.max(...allVals,1);
  const pad={t:10,r:8,b:28,l:36};
  const W=300, H=height;
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  const bW=Math.max(4,(cW/data.length/keys.length)-2);
  const grp=cW/data.length;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,overflow:"visible"}}>
      {/* Grid lines */}
      {[0,0.25,0.5,0.75,1].map(f=>{
        const y=pad.t+cH*(1-f);
        return <g key={f}><line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="#E5E7EB" strokeWidth="0.5"/>
          <text x={pad.l-4} y={y+3} textAnchor="end" fontSize="8" fill="#9CA3AF">{Math.round(maxV*f).toLocaleString()}</text></g>;
      })}
      {/* Bars */}
      {data.map((d,i)=>{
        const x0=pad.l+i*grp;
        return(<g key={i}>
          {keys.map((k,ki)=>{
            const v=d[k]||0;
            const bH=Math.max(2,(v/maxV)*cH);
            const bx=x0+ki*(bW+2)+(grp-keys.length*(bW+2))/2;
            return <rect key={k} x={bx} y={pad.t+cH-bH} width={bW} height={bH} fill={colors[ki]||color} rx="2"/>;
          })}
          <text x={x0+grp/2} y={H-pad.b+10} textAnchor="middle" fontSize="8" fill="#6B7280">{d.s||""}</text>
        </g>);
      })}
    </svg>
  );
}

function SvgLineChart({data=[], height=180, color="#059669", lines=null}){
  if(!data.length) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#ccc",fontSize:11}}>Sin datos</div>;
  const keys=lines?lines.map(l=>l.key):[Object.keys(data[0]).find(k=>k!=="s"&&typeof data[0][k]==="number")||"v"];
  const colors=lines?lines.map(l=>l.color):[color];
  const allVals=data.flatMap(d=>keys.map(k=>d[k]||0));
  const maxV=Math.max(...allVals,1), minV=Math.min(...allVals,0);
  const pad={t:10,r:8,b:28,l:36};
  const W=300, H=height;
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  const range=maxV-minV||1;
  const px=(i)=>pad.l+i*(cW/(data.length-1||1));
  const py=(v)=>pad.t+cH*(1-(v-minV)/range);
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,overflow:"visible"}}>
      {[0,0.5,1].map(f=>{
        const v=minV+range*f, y=py(v);
        return <g key={f}><line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="#E5E7EB" strokeWidth="0.5"/>
          <text x={pad.l-4} y={y+3} textAnchor="end" fontSize="8" fill="#9CA3AF">{Math.round(v).toLocaleString()}</text></g>;
      })}
      {keys.map((k,ki)=>{
        const pts=data.map((d,i)=>`${px(i)},${py(d[k]||0)}`).join(" ");
        return <polyline key={k} points={pts} fill="none" stroke={colors[ki]||color} strokeWidth="2" strokeLinejoin="round"/>;
      })}
      {data.map((d,i)=>(
        <text key={i} x={px(i)} y={H-pad.b+10} textAnchor="middle" fontSize="8" fill="#6B7280">{d.s||""}</text>
      ))}
    </svg>
  );
}

function SvgAreaChart({data=[], height=180, color="#1A5FD4"}){
  if(!data.length) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#ccc",fontSize:11}}>Sin datos</div>;
  const key=Object.keys(data[0]).find(k=>k!=="s"&&typeof data[0][k]==="number")||"v";
  const vals=data.map(d=>d[key]||0);
  const maxV=Math.max(...vals,1);
  const pad={t:10,r:8,b:28,l:36};
  const W=300, H=height;
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;
  const px=(i)=>pad.l+i*(cW/(data.length-1||1));
  const py=(v)=>pad.t+cH*(1-v/maxV);
  const linePts=data.map((d,i)=>`${px(i)},${py(d[key]||0)}`).join(" ");
  const areaPts=`${px(0)},${pad.t+cH} `+linePts+` ${px(data.length-1)},${pad.t+cH}`;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,overflow:"visible"}}>
      <defs><linearGradient id={`ag${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
        <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
      </linearGradient></defs>
      {[0,0.5,1].map(f=>{const y=pad.t+cH*(1-f);return(
        <g key={f}><line x1={pad.l} y1={y} x2={W-pad.r} y2={y} stroke="#E5E7EB" strokeWidth="0.5"/>
          <text x={pad.l-4} y={y+3} textAnchor="end" fontSize="8" fill="#9CA3AF">{Math.round(maxV*f).toLocaleString()}</text></g>
      );})}
      <polygon points={areaPts} fill={`url(#ag${color.replace("#","")})`}/>
      <polyline points={linePts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"/>
      {data.map((d,i)=>(
        <text key={i} x={px(i)} y={H-pad.b+10} textAnchor="middle" fontSize="8" fill="#6B7280">{d.s||""}</text>
      ))}
    </svg>
  );
}

function SvgPieChart({data=[], height=130}){
  if(!data.length) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#ccc",fontSize:11}}>Sin datos</div>;
  const key=Object.keys(data[0]).find(k=>k!=="name"&&k!=="s"&&typeof data[0][k]==="number")||"value";
  const COLORS=["#1A5FD4","#059669","#D97706","#DC2626","#7C3AED","#0891B2"];
  const total=data.reduce((s,d)=>s+(d[key]||0),0)||1;
  const cx=50,cy=50,r=40;
  let angle=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const v=(d[key]||0)/total;
    const a1=angle, a2=angle+v*2*Math.PI;
    angle=a2;
    const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    const large=v>0.5?1:0;
    return{path:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`,color:d.color||COLORS[i%COLORS.length],name:d.name||d.s||""};
  });
  return(
    <svg viewBox="0 0 100 100" style={{width:"100%",height,overflow:"visible"}}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke="#fff" strokeWidth="0.5"/>)}
    </svg>
  );
}

// ── BUSCADOR DE CLIENTES INLINE ──────────────────────────────────
function ClienteBuscadorInline({uid, value, onChange, onSelect, placeholder="Cliente…"}){
  const [open,setOpen]   = useState(false);
  const [q,setQ]         = useState("");

  const resultados = useMemo(()=>{
    if(!q||q.length<2) return [];
    const ql=q.toLowerCase();
    return CLIENTES.filter(c=>
      c.agente===uid &&
      (c.nombre.toLowerCase().includes(ql)||c.id.toLowerCase().includes(ql))
    ).slice(0,20);
  },[q,uid]);

  const seleccionar = (c) => {
    onChange(c.nombre);
    setQ("");
    setOpen(false);
  };

  return(
    <div style={{position:"relative"}}>
      {/* Campo + lupa */}
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1,padding:"11px 14px",border:`1px solid ${C.border}`,borderRadius:10,background:"#FFF",fontSize:14,color:value?C.text:C.muted,minHeight:44,display:"flex",alignItems:"center"}}>
          {value||<span style={{color:C.light}}>{placeholder}</span>}
        </div>
        <button onClick={()=>setOpen(s=>!s)}
          style={{width:44,height:44,borderRadius:10,border:`1.5px solid ${open?C.blue:C.border}`,background:open?C.blueL:"#FFF",color:open?C.blue:C.muted,fontSize:20,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          🔍
        </button>
        {value&&<button onClick={()=>onChange("")}
          style={{width:44,height:44,borderRadius:10,border:`1px solid ${C.border}`,background:"#FFF",color:C.red,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          ×
        </button>}
      </div>

      {/* Panel búsqueda */}
      {open&&(
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:500,background:"#FFF",borderRadius:10,border:`1.5px solid ${C.blue}`,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",marginTop:4}}>
          <div style={{padding:"10px 12px",borderBottom:`1px solid ${C.border}`}}>
            <input value={q} onChange={e=>setQ(e.target.value)} autoFocus
              placeholder="Buscar por nombre o código…"
              style={{...iSt,borderRadius:8,fontSize:13,padding:"9px 12px"}}/>
          </div>
          <div style={{maxHeight:200,overflowY:"auto"}}>
            {q.length<2?(
              <p style={{padding:"12px",fontSize:12,color:C.muted,margin:0}}>Escribe para buscar…</p>
            ):resultados.length===0?(
              <p style={{padding:"12px",fontSize:12,color:C.muted,margin:0}}>Sin resultados para "{q}"</p>
            ):resultados.map(c=>(
              <button key={c.id} onClick={()=>seleccionar(c)}
                style={{width:"100%",padding:"10px 14px",border:"none",borderBottom:`1px solid ${C.border}`,background:"transparent",cursor:"pointer",textAlign:"left",display:"flex",gap:10,alignItems:"center"}}
                onMouseEnter={e=>e.currentTarget.style.background=C.bg}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nombre}</p>
                  <p style={{margin:0,fontSize:10,color:C.muted}}>{c.id}{c.ruta>0?` · Ruta ${c.ruta}`:""}</p>
                </div>
              </button>
            ))}
          </div>
          <div style={{padding:"8px 12px",borderTop:`1px solid ${C.border}`}}>
            <button onClick={()=>setOpen(false)} style={{width:"100%",padding:"8px",borderRadius:8,border:"none",background:C.bg,color:C.muted,fontSize:12,cursor:"pointer"}}>Cerrar</button>
          </div>
        </div>
      )}
    </div>
  );
}

  return(
    <div style={{position:"fixed",inset:0,background:"#00000077",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:"8px"}}>
      <div style={{background:C.white,borderRadius:16,width:"min(680px,100%)",maxHeight:"88vh",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 24px 64px #0004"}}>

        {/* Header buscador */}
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:18}}>🔍</span>
          <input value={q} onChange={e=>setQ(e.target.value)} autoFocus
            placeholder="Código o nombre del producto…"
            style={{flex:1,border:"none",outline:"none",fontSize:15,color:C.text,background:"transparent"}}/>
          <span style={{fontSize:11,color:C.muted}}>{filtered.length<80?filtered.length:"80+"} resultados</span>
          <button onClick={onClose} style={{background:C.bg,border:"none",borderRadius:6,padding:"4px 11px",cursor:"pointer",color:C.muted,fontSize:15,fontWeight:700}}>✕</button>
        </div>

        {/* Filtros categoría — scroll horizontal */}
        <div style={{padding:"8px 12px",borderBottom:`1px solid ${C.border}`,display:"flex",gap:5,overflowX:"auto",flexShrink:0}}>
          <button onClick={()=>setCat("Todos")}
            style={{padding:"5px 12px",borderRadius:99,border:`1.5px solid ${cat==="Todos"?C.navy:C.border}`,background:cat==="Todos"?C.navy:"transparent",color:cat==="Todos"?"#fff":C.muted,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
            Todos
          </button>
          {CAT_GROUPS.map(g=>(
            <div key={g.label} style={{display:"flex",gap:4,alignItems:"center"}}>
              <span style={{fontSize:10,color:C.light,padding:"0 2px"}}>|</span>
              {g.cats.map(c=>{
                const active=cat===c;
                const col=catColor(c);
                return(
                  <button key={c} onClick={()=>setCat(active?"Todos":c)}
                    style={{padding:"5px 10px",borderRadius:99,border:`1.5px solid ${active?col:C.border}`,background:active?col+"15":"transparent",color:active?col:C.muted,fontSize:10,fontWeight:active?700:400,cursor:"pointer",whiteSpace:"nowrap"}}>
                    {c.replace('Spot ','').replace('Promo ','')}
                  </button>
                );
              })}
            </div>
          ))}
        </div>

        {/* Lista productos */}
        <div style={{overflowY:"auto",flex:1}}>
          {q.trim()===''&&cat==="Todos"?(
            <div style={{padding:"32px",textAlign:"center",color:C.muted}}>
              <span style={{fontSize:36,display:"block",marginBottom:12}}>🔍</span>
              <p style={{margin:"0 0 6px",fontSize:15,fontWeight:700,color:C.text}}>Busca un producto</p>
              <p style={{margin:0,fontSize:13}}>Escribe el código o nombre, o filtra por categoría arriba</p>
              <p style={{margin:"12px 0 0",fontSize:11,color:C.light}}>{PRODUCTOS_LOCAL.length} productos disponibles</p>
            </div>
          ):filtered.length===0?(
            <div style={{padding:"32px",textAlign:"center",color:C.muted}}>
              <span style={{fontSize:32,display:"block",marginBottom:8}}>😕</span>
              <p style={{margin:0,fontSize:14}}>Sin resultados para "<b>{q}</b>"</p>
            </div>
          ):(
            filtered.map((p,i)=>{
              const col=catColor(p.cat);
              return(
                <button key={p.codigo+i} onClick={()=>onSelect({codigo:p.codigo,nombre:p.nombre,tipo:p.tipo||"Otros",formato:p.formato,precio:p.precio||""})}
                  style={{width:"100%",display:"flex",gap:12,alignItems:"center",padding:"11px 16px",border:"none",borderBottom:`1px solid ${C.border}`,background:"transparent",cursor:"pointer",textAlign:"left",transition:"background .1s"}}
                  onMouseEnter={e=>e.currentTarget.style.background=C.bg}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div style={{width:36,height:36,borderRadius:9,background:col+"15",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{fontSize:16}}>{p.cat.includes('Preparados')?'🍔':p.cat.includes('Especias')?'🌶️':p.cat.includes('Tripa')?'🧵':p.cat.includes('Envases')?'📦':p.cat.includes('Aditivos')?'🧪':p.cat.includes('Spot')?'⭐':p.cat.includes('Promo')?'🏷️':'📋'}</span>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",gap:8,alignItems:"baseline"}}>
                      <p style={{margin:0,fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.nombre}</p>
                    </div>
                    <div style={{display:"flex",gap:8,marginTop:2,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,fontFamily:"monospace",color:col,fontWeight:700}}>{p.codigo}</span>
                      {p.formato&&<span style={{fontSize:10,color:C.muted}}>{p.formato}</span>}
                    </div>
                  </div>
                  <span style={{fontSize:10,color:col,fontWeight:700,flexShrink:0,background:col+"15",padding:"3px 8px",borderRadius:99}}>{p.cat.replace('Wikuk ','').replace('Ceylan ','').replace('Taberner ','')}</span>
                </button>
              );
            })
          )}
        </div>
      </div>
    </div>
  );
}


// ══════════════════════════════════════════════════════════════════
// MODULE 1 · DASHBOARD
// ══════════════════════════════════════════════════════════════════
function Dashboard({usuario, recuperaciones=[], muestrasPendientes=[], incidencias=[], onNavigate}){
  const {rol,equipo,color}=usuario;
  const isW=equipo==="WIKUK",isI=equipo==="INTERKEY";
  const d=isW?DW:isI?DI:null;
  const vend=VENDEDORES.filter(v=>v.rol==="agente");

  // Vendedor view
  if(rol==="agente"){
    const uid=usuario.id;
    const v=VENDEDORES.find(vv=>vv.id===uid)||vend[0];
    const totalV=sum(v.ventas),pct=Math.round((totalV/(v.ppto*12))*100),mbA=avg(v.mb).toFixed(1);
    const wData=SEMANAS.map((s,i)=>({s:`S${s}`,v:(v.ventas||[])[i]||0,p:v.ppto,mb:(v.mb||[])[i]||0}));
    const misMuestras=(muestrasPendientes||[]).filter(m=>m.agente===uid);
    const pendFeed=misMuestras.filter(m=>m.estado==="pendiente").length;
    const misRec=(recuperaciones||[]).filter(r=>r.agente===uid||r.solicitadoPor===uid);
    const enCurso=misRec.filter(r=>r.estado==="en_curso"||r.estado==="pend_aprobacion").length;
    const misInc=(incidencias||[]).filter(i=>i.agenteId===uid&&i.estado!=="resuelta").length;
    return(
      <div>
        <div style={{marginBottom:18}}>
          <p style={{margin:0,fontSize:20,fontWeight:900,color:C.text}}>Hola, {usuario.nombre?.split(" ")[0]} 👋</p>
          <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>Semana {SEMANA_ACTUAL} · {equipo}</p>
        </div>
        {/* Alertas agente */}
        {(pendFeed>0||enCurso>0||misInc>0)&&(
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:18}}>
            {pendFeed>0&&<button onClick={()=>onNavigate?.("reporting")} style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",background:C.amberL,borderRadius:12,border:`1.5px solid ${C.amber}44`,cursor:"pointer",textAlign:"left",width:"100%"}}>
              <span style={{fontSize:24}}>📦</span>
              <div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:800,color:C.amber}}>{pendFeed} muestras sin feedback</p><p style={{margin:"2px 0 0",fontSize:12,color:C.muted}}>Toca para ir a Reporting → Muestras</p></div>
              <span style={{color:C.amber,fontSize:20}}>›</span>
            </button>}
            {enCurso>0&&<button onClick={()=>onNavigate?.("reporting")} style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",background:C.purpleL,borderRadius:12,border:`1.5px solid ${C.purple}44`,cursor:"pointer",textAlign:"left",width:"100%"}}>
              <span style={{fontSize:24}}>🎯</span>
              <div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:800,color:C.purple}}>{enCurso} estrategia{enCurso!==1?"s":""} activa{enCurso!==1?"s":""}</p><p style={{margin:"2px 0 0",fontSize:12,color:C.muted}}>Ver estado en Reporting → Estrategias</p></div>
              <span style={{color:C.purple,fontSize:20}}>›</span>
            </button>}
            {misInc>0&&<button onClick={()=>onNavigate?.("incidencias")} style={{display:"flex",gap:12,alignItems:"center",padding:"13px 16px",background:C.redL,borderRadius:12,border:`1.5px solid ${C.red}44`,cursor:"pointer",textAlign:"left",width:"100%"}}>
              <span style={{fontSize:24}}>⚠️</span>
              <div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:800,color:C.red}}>{misInc} incidencia{misInc!==1?"s":""} abiertas</p><p style={{margin:"2px 0 0",fontSize:12,color:C.muted}}>Ver en Incidencias</p></div>
              <span style={{color:C.red,fontSize:20}}>›</span>
            </button>}
          </div>
        )}
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>
          <KPI label="Ventas acumuladas" value={`${fmt(totalV)}€`} sub={`Obj. ${fmt(v.ppto*12)}€`} color={color} trend={pct-100}/>
          <KPI label="Cumplimiento" value={`${pct}%`} color={pct>=100?C.green:C.amber}/>
          <KPI label="MB medio" value={`${mbA}%`} color={C.blue}/>
        </div>
        <Card style={{marginBottom:16}}>
          <SHead>Ventas semanales vs objetivo</SHead>
          <SvgBarChart data={wData} height={180} color="#1A5FD4"/>
        </Card>
      </div>
    );
  }

  // ── JEFE view — Dashboard gráfico con alertas ──────────────────
  if(rol==="jefe"){
    const vends=vend.filter(v=>v.equipo===equipo);
    const safeD=d||{ventas:[],mb:[],muestras:[],ppto:75000};
    const wData=SEMANAS.map((s,i)=>({s:`S${s}`,v:(safeD.ventas||[])[i]||0,p:safeD.ppto,mb:(safeD.mb||[])[i]||0}));
    const sorted=[...vends].sort((a,b)=>sum(b.ventas)-sum(a.ventas));
    const medals=["🥇","🥈","🥉"];

    // Alertas del equipo
    const muestrasPend=(muestrasPendientes||[]).filter(m=>vends.find(v=>v.id===m.agente)&&m.estado==="pendiente").length;
    const estrategiasPend=(recuperaciones||[]).filter(r=>vends.find(v=>v.id===r.agente)&&r.estado==="pend_aprobacion").length;
    const incidPend=(incidencias||[]).filter(i=>vends.find(v=>v.id===i.agenteId)&&i.estado==="pendiente").length;
    const alertasTotal=muestrasPend+estrategiasPend+incidPend;

    return(
      <div>
        {/* Encabezado equipo */}
        <div style={{marginBottom:18}}>
          <p style={{margin:0,fontSize:20,fontWeight:900,color:C.text}}>Dashboard {equipo} 📊</p>
          <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>Semana {SEMANA_ACTUAL} · {vends.length} comerciales</p>
        </div>

        {/* ── ALERTAS — BOTONES GRANDES ── */}
        {alertasTotal>0&&(
          <div style={{marginBottom:20}}>
            <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:"0.08em"}}>
              🔔 Pendiente de tu revisión
            </p>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {muestrasPend>0&&(
                <button onClick={()=>onNavigate?.("muestras_equipo")}
                  style={{display:"flex",gap:14,alignItems:"center",padding:"18px 20px",background:"#FFF",borderRadius:16,border:`3px solid ${C.amber}`,boxShadow:`0 4px 12px ${C.amber}22`,cursor:"pointer",textAlign:"left",width:"100%"}}>
                  <div style={{width:56,height:56,borderRadius:14,background:C.amberL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>📦</div>
                  <div style={{flex:1}}>
                    <p style={{margin:0,fontSize:22,fontWeight:900,color:C.amber}}>{muestrasPend}</p>
                    <p style={{margin:0,fontSize:14,fontWeight:700,color:C.text}}>Muestras sin feedback</p>
                    <p style={{margin:"2px 0 0",fontSize:12,color:C.muted}}>Clientes que recibieron muestra y aún no hay respuesta</p>
                  </div>
                  <span style={{color:C.amber,fontSize:24,fontWeight:900}}>›</span>
                </button>
              )}
              {estrategiasPend>0&&(
                <button onClick={()=>onNavigate?.("recuperacion")}
                  style={{display:"flex",gap:14,alignItems:"center",padding:"18px 20px",background:"#FFF",borderRadius:16,border:`3px solid ${C.purple}`,boxShadow:`0 4px 12px ${C.purple}22`,cursor:"pointer",textAlign:"left",width:"100%"}}>
                  <div style={{width:56,height:56,borderRadius:14,background:C.purpleL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>🎯</div>
                  <div style={{flex:1}}>
                    <p style={{margin:0,fontSize:22,fontWeight:900,color:C.purple}}>{estrategiasPend}</p>
                    <p style={{margin:0,fontSize:14,fontWeight:700,color:C.text}}>Estrategias pendientes de aprobar</p>
                    <p style={{margin:"2px 0 0",fontSize:12,color:C.muted}}>Tus comerciales esperan tu aprobación para actuar</p>
                  </div>
                  <span style={{color:C.purple,fontSize:24,fontWeight:900}}>›</span>
                </button>
              )}
              {incidPend>0&&(
                <button onClick={()=>onNavigate?.("incidencias")}
                  style={{display:"flex",gap:14,alignItems:"center",padding:"18px 20px",background:"#FFF",borderRadius:16,border:`3px solid ${C.red}`,boxShadow:`0 4px 12px ${C.red}22`,cursor:"pointer",textAlign:"left",width:"100%"}}>
                  <div style={{width:56,height:56,borderRadius:14,background:C.redL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>⚠️</div>
                  <div style={{flex:1}}>
                    <p style={{margin:0,fontSize:22,fontWeight:900,color:C.red}}>{incidPend}</p>
                    <p style={{margin:0,fontSize:14,fontWeight:700,color:C.text}}>Incidencias por gestionar</p>
                    <p style={{margin:"2px 0 0",fontSize:12,color:C.muted}}>Situaciones reportadas por el equipo sin resolver</p>
                  </div>
                  <span style={{color:C.red,fontSize:24,fontWeight:900}}>›</span>
                </button>
              )}
              {alertasTotal===0&&(
                <div style={{padding:"16px 20px",background:C.greenL,borderRadius:14,border:`1.5px solid ${C.green}44`,display:"flex",gap:12,alignItems:"center"}}>
                  <span style={{fontSize:28}}>✅</span>
                  <p style={{margin:0,fontSize:14,fontWeight:700,color:C.green}}>Todo al día — sin pendientes</p>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── KPIs equipo ── */}
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:18}}>
          <KPI label="Ventas equipo" value={`${fmt(sum(safeD.ventas||[]))}€`} color={color} trend={Math.round((sum(d?.ventas||[])/((safeD.ppto||1)*12)-1)*100)}/>
          <KPI label="Cumplimiento" value={`${Math.round((sum(d?.ventas||[])/((d?.ppto||1)*12))*100)}%`} color={C.green}/>
          <KPI label="MB medio" value={`${avg(safeD.mb||[]).toFixed(1)}%`} color={C.blue}/>
          <KPI label="Muestras" value={sum(safeD.muestras||[])} color={color}/>
        </div>

        {/* ── Gráfico ventas ── */}
        <Card style={{marginBottom:16}}>
          <SHead>Ventas semanales del equipo</SHead>
          <SvgAreaChart data={wData} height={180} color="#1A5FD4"/>
        </Card>

        {/* ── Ranking comerciales ── */}
        <Card style={{marginBottom:16}}>
          <SHead>Ranking del equipo</SHead>
          {sorted.map((v,i)=>{
            const vt=sum(v.ventas||[]),mx=sum((sorted[0].ventas||[]));
            const pct2=mx>0?Math.round((vt/mx)*100):0;
            return(
              <div key={v.id} style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{fontSize:16}}>{medals[i]||`${i+1}.`}</span>
                    <div style={{width:28,height:28,borderRadius:"50%",background:v.color+"22",border:`1.5px solid ${v.color}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:v.color}}>
                      {v.nombre.split(" ").map(n=>n[0]).join("").slice(0,2)}
                    </div>
                    <span style={{fontSize:13,fontWeight:600,color:C.text}}>{v.nombre}</span>
                  </div>
                  <span style={{fontSize:13,fontWeight:800,color:v.color}}>{fmt(vt)}€</span>
                </div>
                <div style={{height:6,background:C.border,borderRadius:99,overflow:"hidden"}}>
                  <div style={{width:`${pct2}%`,height:"100%",background:v.color,borderRadius:99,transition:"width .6s"}}/>
                </div>
              </div>
            );
          })}
        </Card>

        {/* ── Accesos rápidos ── */}
        <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Acceso rápido</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
          {[
            {icon:"📊",label:"Estadísticas",section:"estadisticas",color:C.blue},
            {icon:"🔄",label:"Estrategias",section:"recuperacion",color:C.purple},
            {icon:"📦",label:"Muestras equipo",section:"muestras_equipo",color:C.amber},
            {icon:"⚠️",label:"Incidencias",section:"incidencias",color:C.red},
          ].map(a=>(
            <button key={a.section} onClick={()=>onNavigate?.(a.section)}
              style={{padding:"16px 12px",borderRadius:12,border:`1.5px solid ${a.color}33`,background:a.color+"0D",cursor:"pointer",textAlign:"center",display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
              <span style={{fontSize:26}}>{a.icon}</span>
              <span style={{fontSize:12,fontWeight:700,color:a.color}}>{a.label}</span>
            </button>
          ))}
        </div>
      </div>
    );
  }

  // Director view
  if(rol==="director"){
    const wData=SEMANAS.map((s,i)=>({s:`S${s}`,WIKUK:DW.ventas[i],INTERKEY:DI.ventas[i]}));
    const tw=sum(DW.ventas),ti=sum(DI.ventas),tot=tw+ti;
    return(
      <div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>
          <KPI label="Ventas consolidadas" value={`${fmt(tot)}€`} color={C.blue}/>
          <KPI label="WIKUK" value={`${fmt(tw)}€`} sub={`${Math.round((sum(DW.ventas)/(DW.ppto*12))*100)}% obj.`} color={C.green} trend={Math.round((sum(DW.ventas)/(DW.ppto*12)-1)*100)}/>
          <KPI label="INTERKEY" value={`${fmt(ti)}€`} sub={`${Math.round((sum(DI.ventas)/(DI.ppto*12))*100)}% obj.`} color={C.amber} trend={Math.round((sum(DI.ventas)/(DI.ppto*12)-1)*100)}/>
          <KPI label="MB WIKUK" value={`${avg(DW.mb).toFixed(1)}%`} color={C.green}/>
          <KPI label="MB INTERKEY" value={`${avg(DI.mb).toFixed(1)}%`} color={C.amber}/>
        </div>
        <Card style={{marginBottom:16}}>
          <SHead>Ventas por equipo — evolución semanal</SHead>
          <SvgBarChart data={wData} height={200} bars={[{key:"WIKUK",color:"#1A5FD4"},{key:"INTERKEY",color:"#1A5FD4"}]}/>
        </Card>
        <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
          {[{label:"WIKUK",v:tw,t:tot,c:C.green,pct:Math.round((tw/tot)*100)},
            {label:"INTERKEY",v:ti,t:tot,c:C.amber,pct:Math.round((ti/tot)*100)}].map(e=>(
            <Card key={e.label} style={{flex:1,display:"flex",alignItems:"center",gap:20}}>
              <Ring pct={Math.round((e.v/(e.label==="WIKUK"?DW.ppto:DI.ppto)/12)*100)} color={e.c} size={80} stroke={9} label={e.label}/>
              <div>
                <p style={{margin:0,fontSize:22,fontWeight:800,color:e.c}}>{fmt(e.v)}€</p>
                <p style={{margin:0,fontSize:11,color:C.muted}}>{e.pct}% del total</p>
              </div>
            </Card>
          ))}
        </div>
      </div>
    );
  }

  // CEO view
  const tot=sum(DW.ventas)+sum(DI.ventas),pptot=(DW.ppto+DI.ppto)*12,pctG=Math.round((tot/pptot)*100);
  const wData=SEMANAS.map((s,i)=>({s:`S${s}`,t:DW.ventas[i]+DI.ventas[i]}));
  const ranking=[...vend].sort((a,b)=>sum(b.ventas)-sum(a.ventas));
  return(
    <div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:18}}>
        <KPI label="Ventas totales" value={`${fmt(tot)}€`} sub={`Obj. ${fmt(pptot)}€`} color={C.purple} trend={pctG-100}/>
        <KPI label="Cumplimiento global" value={`${pctG}%`} color={pctG>=100?C.green:C.amber}/>
        <KPI label="MB consolidado" value={`${((avg(DW.mb)*sum(DW.ventas)+avg(DI.mb)*sum(DI.ventas))/tot).toFixed(1)}%`} color={C.blue}/>
      </div>
      <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:16}}>
        <Card style={{flex:2,minWidth:280}}>
          <SHead>Ventas consolidadas semanales</SHead>
          <SvgAreaChart data={wData} height={180} color="#1A5FD4"/>
        </Card>
        <Card style={{flex:1,minWidth:180}}>
          <SHead>Ranking global</SHead>
          {ranking.slice(0,6).map((v,i)=>{
            const vt=sum(v.ventas),mx=sum(ranking[0].ventas);
            return(
              <div key={v.id} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:11,fontWeight:600}}>{["🥇","🥈","🥉"][i]||`${i+1}.`} {v.nombre.split(" ")[0]}</span>
                  <span style={{fontSize:11,fontWeight:800,color:v.color}}>{fmt(vt)}€</span>
                </div>
                <div style={{height:4,background:C.border,borderRadius:99}}><div style={{width:`${(vt/mx)*100}%`,height:"100%",background:v.color,borderRadius:99}}/></div>
              </div>
            );
          })}
        </Card>
      </div>
    </div>
  );
}

// ─ Paso 2: Visitas ────────────────────────────────────────────────
function PasoVisitas({clientes, visitas, onVisita, nuevosClientes=[], onGuardarNuevo, onEditarNuevo, onSubPantalla, onOpenFicha}){
  const [rutaFijada,setRutaFijada] = useState(null);
  const [sel,setSel]               = useState(null);
  const [formV,setFormV]           = useState({resultado:"pedido",notas:""});
  const [showBuscador,setShowBuscador] = useState(false);
  const [busqQ,setBusqQ]           = useState("");
  const [showNuevo,setShowNuevo]   = useState(false);
  const [scanLoading,setScanLoading] = useState(false);
  const [fotoTarjeta,setFotoTarjeta] = useState(null);
  const [editNuevo,setEditNuevo]   = useState(null);
  const [formNuevo,setFormNuevo]   = useState({nombre:"",contacto:"",telefono:"",poblacion:"",empresa:"",email:"",ruta:0});

  const rutasDisp  = [...new Set(clientes.filter(c=>c.ruta>0).map(c=>c.ruta))].sort((a,b)=>a-b);
  const clientesRuta = rutaFijada ? clientes.filter(c=>c.ruta===rutaFijada) : [];
  const clientesBusq = busqQ.length>=2 ? clientes.filter(c=>c.ruta!==rutaFijada&&(c.nombre.toLowerCase().includes(busqQ.toLowerCase())||c.id.toLowerCase().includes(busqQ.toLowerCase()))).slice(0,20) : [];
  const nuevosDeRuta = (nuevosClientes||[]).filter(c=>c.ruta===rutaFijada);

  const escanearTarjeta = async (e) => {
    const file = e.target.files?.[0]; if(!file) return;
    setScanLoading(true);
    try {
      // Guardar la foto siempre, independientemente del OCR
      const dataUrl = await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});
      setFotoTarjeta(dataUrl);
      const base64 = dataUrl.split(",")[1];
      // Intentar OCR con Claude
      const resp = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:base64}},{type:"text",text:'Extrae los datos de esta tarjeta de visita. Responde SOLO con JSON: {"nombre":"","empresa":"","contacto":"","telefono":"","email":"","poblacion":""}. Si no encuentras un dato deja el campo vacío. Solo JSON.'}]}]})});
      const data = await resp.json();
      const parsed = JSON.parse((data.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
      // Rellenar formulario con los datos extraídos
      setFormNuevo(f=>({
        ...f,
        nombre:    parsed.nombre    || parsed.empresa || f.nombre,
        contacto:  parsed.contacto  || f.contacto,
        telefono:  parsed.telefono  || f.telefono,
        poblacion: parsed.poblacion || f.poblacion,
        empresa:   parsed.empresa   || f.empresa,
        email:     parsed.email     || f.email,
      }));
    } catch(err) {
      console.log("OCR error:", err);
      // La foto ya está guardada aunque falle el OCR
    }
    finally { setScanLoading(false); }
  };

  const guardarNuevo = () => {
    if(!formNuevo.nombre.trim()) return;
    const nuevoC = {
      id:`NUEVO-${Date.now()}`,
      nombre:   formNuevo.nombre.trim(),
      contacto: formNuevo.contacto.trim(),
      telefono: formNuevo.telefono.trim(),
      poblacion:formNuevo.poblacion.trim(),
      empresa:  formNuevo.empresa.trim(),
      email:    formNuevo.email.trim(),
      foto:     fotoTarjeta||null,
      ruta:     formNuevo.ruta||rutaFijada||0,
      esNuevo:  true
    };
    setSel(nuevoC);
    if(onSubPantalla) onSubPantalla(true);
    setShowNuevo(false);
    setFotoTarjeta(null);
    setFormNuevo({nombre:"",contacto:"",telefono:"",poblacion:"",empresa:"",email:"",ruta:rutaFijada||0});
  };

  const guardarVisita = () => {
    if(!sel) return;
    if(sel.esNuevo && onGuardarNuevo) onGuardarNuevo(sel);
    onVisita({clienteId:sel.id,clienteNombre:sel.nombre,ruta:sel.ruta||rutaFijada||0,esNuevo:sel.esNuevo||false,...formV});
    setSel(null); if(onSubPantalla) onSubPantalla(false); setFormV({resultado:"pedido",notas:""});
  };

  const abrirEditNuevo = (c) => { setEditNuevo(c); setFormNuevo({nombre:c.nombre||"",contacto:c.contacto||"",telefono:c.telefono||"",poblacion:c.poblacion||"",empresa:c.empresa||"",email:c.email||"",ruta:c.ruta||rutaFijada||0}); setFotoTarjeta(c.foto||null); };
  const guardarEditNuevo = () => {
    if(!formNuevo.nombre?.trim()) return;
    if(onGuardarNuevo) onGuardarNuevo({...editNuevo,...formNuevo,foto:fotoTarjeta||editNuevo?.foto});
    setEditNuevo(null); setFotoTarjeta(null);
  };

  // ── Pantalla resultado visita ───────────────────────────────────
  if(sel){
    return(
      <div>
        <div style={{background:C.bg,borderRadius:12,padding:"12px 16px",marginBottom:20,display:"flex",gap:10,alignItems:"center"}}>
          <div style={{flex:1}}>
            <p style={{margin:0,fontSize:15,fontWeight:800}}>{sel.nombre}</p>
            <p style={{margin:"2px 0 0",fontSize:11,color:C.muted}}>
              {sel.esNuevo?`🌱 Nuevo · Ruta ${sel.ruta||rutaFijada}`:sel.ruta&&sel.ruta!==rutaFijada?`Ruta ${sel.ruta} — acción comercial`:`${sel.id} · Ruta ${sel.ruta}`}
            </p>
            {sel.esNuevo&&(sel.telefono||sel.email||sel.empresa)&&(
              <div style={{marginTop:5,fontSize:11,color:C.muted,display:"flex",flexDirection:"column",gap:1}}>
                {sel.empresa&&<span>🏢 {sel.empresa}</span>}
                {sel.telefono&&<span>📞 {sel.telefono}</span>}
                {sel.email&&<span>✉️ {sel.email}</span>}
              </div>
            )}
          </div>
          <button onClick={()=>setSel(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:C.muted}}>✕</button>
        </div>
        <p style={{margin:"0 0 10px",fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Resultado de la visita</p>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
          {RESULT_VISITA.filter(r=>sel.esNuevo||!["presentacion","informacion"].includes(r.k)).map(r=>(
            <button key={r.k} onClick={()=>setFormV(f=>({...f,resultado:r.k}))}
              style={{padding:"13px 16px",borderRadius:12,border:`2px solid ${formV.resultado===r.k?r.color:C.border}`,background:formV.resultado===r.k?r.color+"12":"#FFF",display:"flex",gap:12,alignItems:"center",cursor:"pointer"}}>
              <span style={{fontSize:22}}>{r.icon}</span>
              <p style={{margin:0,fontSize:14,fontWeight:formV.resultado===r.k?700:400,color:formV.resultado===r.k?r.color:C.text}}>{r.label}</p>
              {formV.resultado===r.k&&<span style={{marginLeft:"auto",color:r.color,fontSize:18}}>✓</span>}
            </button>
          ))}
        </div>
        <textarea value={formV.notas} onChange={e=>setFormV(f=>({...f,notas:e.target.value}))} rows={2}
          placeholder="Notas opcionales…" style={{...iSt,resize:"none",borderRadius:10,marginBottom:14,fontSize:13}}/>
        <button onClick={guardarVisita}
          style={{width:"100%",padding:15,borderRadius:12,border:"none",background:C.navy,color:"#fff",fontWeight:800,fontSize:16,cursor:"pointer"}}>
          Guardar visita
        </button>
      </div>
    );
  }

  // ── Modal editar cliente nuevo ──────────────────────────────────
  // ── Formulario nuevo cliente / edición (pantalla completa) ────────
  if(showNuevo||editNuevo){
    const titulo = editNuevo ? "Editar cliente" : "Nuevo cliente";
    const accion = editNuevo ? ()=>{ if(onGuardarNuevo) onGuardarNuevo({...editNuevo,...formNuevo,foto:fotoTarjeta||editNuevo.foto}); setEditNuevo(null); setFotoTarjeta(null); } : guardarNuevo;
    const cancelar = ()=>{ setShowNuevo(false); setEditNuevo(null); setFotoTarjeta(null); setFormNuevo({nombre:"",contacto:"",telefono:"",poblacion:"",empresa:"",email:"",ruta:rutaFijada||0}); if(onSubPantalla) onSubPantalla(false); };

    return(
      <div>
        {/* Header */}
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:20}}>
          <button onClick={cancelar} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:C.muted}}>←</button>
          <p style={{margin:0,fontSize:17,fontWeight:800,color:C.text}}>{titulo} · Ruta {formNuevo.ruta||rutaFijada}</p>
        </div>

        {/* Foto tarjeta */}
        <div style={{marginBottom:18}}>
          {fotoTarjeta?(
            <div style={{borderRadius:12,overflow:"hidden",border:`2px solid ${C.green}`,marginBottom:10,position:"relative"}}>
              <img src={fotoTarjeta} alt="Tarjeta" style={{width:"100%",maxHeight:200,objectFit:"cover",display:"block"}}/>
              <div style={{position:"absolute",bottom:8,right:8,display:"flex",gap:6}}>
                <label style={{display:"flex",gap:5,alignItems:"center",padding:"6px 10px",borderRadius:8,background:"rgba(0,0,0,0.6)",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                  {scanLoading?"⏳":"🔄"} {scanLoading?"Leyendo…":"Cambiar"}
                  <input type="file" accept="image/*" capture="environment" onChange={escanearTarjeta} style={{display:"none"}}/>
                </label>
                <button onClick={()=>setFotoTarjeta(null)} style={{padding:"6px 10px",borderRadius:8,background:"rgba(220,38,38,0.8)",color:"#fff",fontWeight:700,fontSize:12,border:"none",cursor:"pointer"}}>✕</button>
              </div>
            </div>
          ):(
            <label style={{display:"flex",gap:12,alignItems:"center",padding:"16px",borderRadius:12,border:`2px dashed ${C.green}`,background:C.greenL,cursor:"pointer",width:"100%",boxSizing:"border-box"}}>
              <span style={{fontSize:28}}>📷</span>
              <div>
                <p style={{margin:0,fontSize:14,fontWeight:700,color:C.green}}>{scanLoading?"Leyendo tarjeta…":"Escanear tarjeta de visita"}</p>
                <p style={{margin:"2px 0 0",fontSize:12,color:C.green+"99"}}>Foto la cámara · rellena los datos automáticamente</p>
              </div>
              <input type="file" accept="image/*" capture="environment" onChange={escanearTarjeta} style={{display:"none"}} disabled={scanLoading}/>
            </label>
          )}
        </div>

        {/* Campos obligatorios */}
        <p style={{margin:"0 0 12px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Datos del cliente</p>
        {[
          {k:"nombre",    label:"Nombre / Empresa",     req:true,  type:"text",  placeholder:"Nombre del cliente o empresa"},
          {k:"contacto",  label:"Persona de contacto",  req:false, type:"text",  placeholder:"¿Con quién has hablado?"},
          {k:"telefono",  label:"Teléfono",             req:false, type:"tel",   placeholder:"600 000 000"},
          {k:"poblacion", label:"Población",            req:false, type:"text",  placeholder:"Ciudad o municipio"},
          {k:"email",     label:"Email",                req:false, type:"email", placeholder:"contacto@empresa.com"},
        ].map(({k,label,req,type,placeholder})=>(
          <div key={k} style={{marginBottom:12}}>
            <p style={{margin:"0 0 6px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>
              {label}{req&&<span style={{color:C.red}}> *</span>}
            </p>
            <input
              type={type}
              value={formNuevo[k]||""}
              onChange={e=>setFormNuevo(f=>({...f,[k]:e.target.value}))}
              placeholder={placeholder}
              style={{...iSt,borderRadius:10,fontSize:15,padding:"13px 16px"}}
            />
          </div>
        ))}

        {/* Ruta */}
        <div style={{marginBottom:20}}>
          <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Ruta asignada</p>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[...rutasDisp,...(rutasDisp.includes(0)?[]:[])].map(r=>(
              <button key={r} onClick={()=>setFormNuevo(f=>({...f,ruta:r}))}
                style={{padding:"10px 20px",borderRadius:10,border:`2px solid ${formNuevo.ruta===r?C.blue:C.border}`,background:formNuevo.ruta===r?C.blueL:"#FFF",color:formNuevo.ruta===r?C.blue:C.muted,fontWeight:formNuevo.ruta===r?700:400,fontSize:14,cursor:"pointer"}}>
                Ruta {r}
              </button>
            ))}
          </div>
        </div>

        {/* Botones */}
        <div style={{display:"flex",gap:10}}>
          <button onClick={cancelar}
            style={{flex:1,padding:"14px",borderRadius:12,border:`1px solid ${C.border}`,background:"#FFF",color:C.muted,fontWeight:600,fontSize:15,cursor:"pointer"}}>
            Cancelar
          </button>
          <button onClick={accion} disabled={!formNuevo.nombre.trim()}
            style={{flex:2,padding:"14px",borderRadius:12,border:"none",background:formNuevo.nombre.trim()?C.navy:C.light,color:"#fff",fontWeight:800,fontSize:15,cursor:formNuevo.nombre.trim()?"pointer":"default"}}>
            {editNuevo?"✓ Guardar cambios":"Siguiente → resultado"}
          </button>
        </div>
      </div>
    );
  }

  // ── Pantalla 1: Selector de ruta ───────────────────────────────
  if(!rutaFijada){
    return(
      <div>
        <div style={{background:C.blueL,border:`1px solid ${C.blue}33`,borderRadius:12,padding:"14px 16px",marginBottom:24,display:"flex",gap:10}}>
          <span style={{fontSize:20}}>🗺️</span>
          <div>
            <p style={{margin:0,fontSize:14,fontWeight:700,color:C.blue}}>¿Qué ruta haces hoy?</p>
            <p style={{margin:"3px 0 0",fontSize:12,color:C.blue+"99"}}>Selecciona la ruta. Una vez elegida no se puede cambiar.</p>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {rutasDisp.length===0?(
            <div style={{textAlign:"center",padding:"32px",background:"#FFF",borderRadius:13,border:`1px solid ${C.border}`,color:C.muted}}>
              <span style={{fontSize:32,display:"block",marginBottom:8}}>📭</span>
              <p style={{margin:0,fontSize:14,fontWeight:600}}>Sin rutas asignadas</p>
              <p style={{margin:"6px 0 0",fontSize:12}}>Tus clientes no tienen ruta asignada</p>
            </div>
          ):rutasDisp.map(r=>{
            const n=clientes.filter(c=>c.ruta===r).length;
            return(
              <button key={r} onClick={()=>setRutaFijada(r)}
                style={{display:"flex",gap:16,alignItems:"center",padding:"18px 20px",background:"#FFF",borderRadius:14,border:`2px solid ${C.border}`,cursor:"pointer",textAlign:"left",width:"100%",transition:"all .15s"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=C.blue;e.currentTarget.style.background=C.blueL;}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background="#FFF";}}>
                <div style={{width:52,height:52,borderRadius:14,background:C.blueL,border:`2px solid ${C.blue}33`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:22,fontWeight:900,color:C.blue}}>{r}</span>
                </div>
                <div style={{flex:1}}>
                  <p style={{margin:0,fontSize:17,fontWeight:800,color:C.text}}>Ruta {r}</p>
                  <p style={{margin:"3px 0 0",fontSize:12,color:C.muted}}>{n} cliente{n!==1?"s":""} programados</p>
                </div>
                <span style={{color:C.light,fontSize:22}}>›</span>
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Pantalla 2: Clientes de la ruta ────────────────────────────
  const visitadosRuta = visitas.filter(v=>clientesRuta.find(c=>c.id===v.clienteId)).length;
  const extrasVisit   = visitas.filter(v=>!clientesRuta.find(c=>c.id===v.clienteId));
  const pctProgreso   = clientesRuta.length ? Math.round(visitadosRuta/clientesRuta.length*100) : 0;
  const nuevosDeRutaList = (nuevosClientes||[]).filter(c=>c.ruta===rutaFijada);

  return(
    <div>
      {/* Header ruta fijada */}
      <div style={{background:C.navy,borderRadius:13,padding:"14px 18px",marginBottom:20,display:"flex",gap:12,alignItems:"center"}}>
        <div style={{width:44,height:44,borderRadius:12,background:C.blue,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <span style={{fontSize:20,fontWeight:900,color:"#fff"}}>{rutaFijada}</span>
        </div>
        <div style={{flex:1}}>
          <p style={{margin:0,fontSize:15,fontWeight:800,color:"#fff"}}>Ruta {rutaFijada}</p>
          <p style={{margin:"2px 0 0",fontSize:11,color:"#9CA3AF"}}>
            {visitadosRuta}/{clientesRuta.length} visitados · {extrasVisit.length} fuera de ruta
          </p>
        </div>
        <div style={{width:48,height:48,position:"relative",flexShrink:0}}>
          <svg width="48" height="48" viewBox="0 0 48 48">

        <button onClick={()=>{onFeedback(feedbackSel.firestoreId||feedbackSel.id,feedbackForm.resultado,feedbackForm.nota);setFeedbackSel(null);if(onSubPantalla)onSubPantalla(false);setFeedbackForm({resultado:"positivo",nota:""}); }}

      {/* Form añadir muestra */}
      {show?(

          <div style={{display:"flex",gap:8,marginBottom:12}}>

            <button onClick={()=>{setShow(false);if(onSubPantalla)onSubPantalla(false);}} style={{flex:1,padding:"12px",borderRadius:10,border:`1px solid ${C.border}`,background:"transparent",cursor:"pointer",color:C.muted}}>Cancelar</button>

      ):(
        <button onClick={()=>{setShow(true);if(onSubPantalla)onSubPantalla(true);}}

      )}
    </div>
  );
}

const RESULTADO_ACCION=[
  {k:"interesado", label:"Interesado",       icon:"👀", color:"#7C3AED"},
  {k:"pedido",     label:"Ha pedido",         icon:"🛒", color:C.green},
  {k:"pendiente",  label:"Pendiente resp.",   icon:"⏳", color:C.amber},
  {k:"rechazado",  label:"No interesado",     icon:"❌", color:C.red},
  {k:"cita",       label:"Cita concertada",   icon:"📅", color:C.blue},
];

function PasoRecuperacion({items, onAdd, onDel, onEdit, recuperacionesAsignadas, addRec, uid, usuario}){
  const [tipo,setTipo]               = useState(null);
  const [editId,setEditId]           = useState(null);
  const [clienteNombre,setClienteNombre] = useState("");
  const [resultado,setResultado]     = useState("");
  const [notaResultado,setNotaResultado] = useState("");
  const [ofertas,setOfertas]         = useState([]);
  const [muestrasAcc,setMuestrasAcc] = useState([]);
  const [showProdOF,setShowProdOF]   = useState(false);
  const [showProdMS,setShowProdMS]   = useState(false);
  const [formOf,setFormOf]           = useState({codigo:"",nombre:"",precioBase:"",dto:"",nota:""});
  const [formMs,setFormMs]           = useState({codigo:"",nombre:"",cantidad:"",nota:""});

  const precioFinal = useMemo(()=>{
    if(!formOf.precioBase) return "";
    const base = parseFloat(formOf.precioBase.replace(",","."));
    if(isNaN(base)) return "";
    if(formOf.dto){
      const dto = parseFloat(formOf.dto);
      return isNaN(dto) ? base.toFixed(2) : (base*(1-dto/100)).toFixed(2);
    }
    return base.toFixed(2);
  },[formOf.precioBase,formOf.dto]);

  const resetForm = ()=>{
    setTipo(null); setEditId(null); setClienteNombre(""); setResultado(""); setNotaResultado("");
    setOfertas([]); setMuestrasAcc([]);
    setFormOf({codigo:"",nombre:"",precioBase:"",dto:"",nota:""});
    setFormMs({codigo:"",nombre:"",cantidad:"",nota:""});
  };

  const openEdit = (r)=>{
    setTipo(r.tipo); setEditId(r.id); setClienteNombre(r.clienteNombre||"");
    setResultado(r.resultado||""); setNotaResultado(r.notaResultado||"");
    setOfertas(r.ofertas||[]); setMuestrasAcc(r.muestras||[]);
  };

  const addOferta = ()=>{
    if(!formOf.nombre.trim()) return;
    const id=`of${Date.now()}`;
    setOfertas(p=>[...p,{...formOf,precioFinal,id}]);
    setFormOf({codigo:"",nombre:"",precioBase:"",dto:"",nota:""});
  };
  const addMuestra = ()=>{
    if(!formMs.nombre.trim()) return;
    setMuestrasAcc(p=>[...p,{...formMs,id:`ms${Date.now()}`}]);
    setFormMs({codigo:"",nombre:"",cantidad:"",nota:""});
  };
  const guardar = ()=>{
    if(!clienteNombre.trim()) return;
    const accion={
      id: editId||`acc${Date.now()}`,
      tipo, clienteNombre:clienteNombre.trim(),
      estrategia: tipo==="nuevo"?"Cliente nuevo":"Recuperación",
      equipo:"WIKUK", estado:"pend_aprobacion",
      solicitadoPor: "agente",
      seguimientos:[],
      semana:SEMANA_ACTUAL,
      resultado, notaResultado,
      ofertas:[...ofertas], muestras:[...muestrasAcc],
    };
    if(editId && onEdit) onEdit(accion);
    else {
      onAdd(accion);
      // Also push to global pool immediately so it shows in Mis Estrategias
      if(addRec) addRec({...accion, agente:uid, equipo:usuario?.equipo||"WIKUK"});
    }
    resetForm();
  };

  // ── Pantalla 1: lista + selector tipo ───────────────────────────
  if(!tipo){
    return(
      <div>
        {recuperacionesAsignadas.length>0&&(

            {items.map(r=>{
              const res=RESULTADO_ACCION.find(x=>x.k===r.resultado);
              return(
                <div key={r.id} style={{background:"#FFF",border:`2px solid ${r.tipo==="nuevo"?C.green+"44":C.blue+"44"}`,borderLeft:`4px solid ${r.tipo==="nuevo"?C.green:C.blue}`,borderRadius:13,padding:"13px 16px",marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                        <span style={{fontSize:15}}>{r.tipo==="nuevo"?"🌱":"🔄"}</span>

                        <Tag label={r.tipo==="nuevo"?"Nuevo":"Recuperación"} color={r.tipo==="nuevo"?C.green:C.blue}/>
                        {res&&<Tag label={`${res.icon} ${res.label}`} color={res.color}/>}
                      </div>
                      {r.ofertas?.length>0&&<p style={{margin:"2px 0",fontSize:11,color:C.muted}}>🏷️ {r.ofertas.length} oferta{r.ofertas.length>1?"s":""}</p>}
                      {r.muestras?.length>0&&<p style={{margin:"2px 0",fontSize:11,color:C.muted}}>📦 {r.muestras.length} muestra{r.muestras.length>1?"s":""}</p>}

                    </div>
                    <div style={{display:"flex",gap:6,flexShrink:0}}>
                      <button onClick={()=>openEdit(r)}
                        style={{padding:"5px 10px",borderRadius:7,border:`1px solid ${C.border}`,background:"#FFF",color:C.blue,fontWeight:600,fontSize:12,cursor:"pointer"}}>
                        ✏️ Editar
                      </button>
                      <button onClick={()=>onDel(r.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.red,fontSize:18}}>🗑</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        <p style={{margin:"0 0 12px",fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Nueva acción</p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {[
            {t:"recuperacion",icon:"🔄",label:"Recuperar cliente",sub:"Cliente que ha dejado de comprar",color:C.blue},
            {t:"nuevo",       icon:"🌱",label:"Cliente nuevo",     sub:"Primera visita o prospecto",      color:C.green},

            <button key={opt.t} onClick={()=>setTipo(opt.t)}

              <span style={{marginLeft:"auto",color:opt.color,fontSize:20}}>›</span>
            </button>
          ))}
        </div>
      </div>

  }

  // ── Pantalla 2: formulario acción ───────────────────────────────
  const accionColor = tipo==="nuevo"?C.green:C.blue;
  const accionIcon  = tipo==="nuevo"?"🌱":"🔄";

      <button onClick={guardar} disabled={!clienteNombre.trim()}

// ─ Paso 5: Resumen ────────────────────────────────────────────────
function PasoResumen({rep, objetivo, color, onEnviar, enviado}){
  const ventasOk=rep.ventas.ventas_real&&rep.ventas.mb_real;
  const visitasPct=rep.clientes?.length?Math.round(rep.visitas.length/rep.clientes.length*100):0;
  const totalMuestrasUds=rep.muestras.reduce((s,m)=>s+(parseInt(m.cantidad)||0),0);
  const fbPositivo=(rep.feedbackMuestras||[]).filter(f=>f.resultado==="positivo"||f.resultado==="pedido").length;
  const fbKo=(rep.feedbackMuestras||[]).filter(f=>f.resultado==="ko").length;
  const fbPendiente=(rep.muestrasPendientes||[]).filter(m=>m.estado==="pendiente").length;

  const resumen=[
    {ic:"💰",label:"Ventas",      v:rep.ventas.ventas_real?`${fmt(parseFloat(rep.ventas.ventas_real))}€`:"-", sub:objetivo?`Obj. ${fmt(objetivo.ventas)}€`:"", ok:rep.ventas.ventas_real&&(!objetivo||parseFloat(rep.ventas.ventas_real)>=objetivo.ventas)},
    {ic:"📊",label:"MB%",         v:rep.ventas.mb_real?`${rep.ventas.mb_real}%`:"-",                          sub:objetivo?`Obj. ${objetivo.mb}%`:"",            ok:rep.ventas.mb_real&&(!objetivo||parseFloat(rep.ventas.mb_real)>=objetivo.mb)},
    {ic:"🏷️",label:"Promo",      v:rep.ventas.promo_real?`${fmt(parseFloat(rep.ventas.promo_real))}€`:"-",  sub:"",                                             ok:!!rep.ventas.promo_real},
    {ic:"💧",label:"Liquidación", v:rep.ventas.liq_real?`${fmt(parseFloat(rep.ventas.liq_real))}€`:"-",      sub:"",                                             ok:!!rep.ventas.liq_real},
    {ic:"👥",label:"Visitas",     v:`${rep.visitas.length}/${rep.clientes?.length||0}`,                       sub:`${visitasPct}% completadas`,                   ok:visitasPct===100},
    {ic:"📦",label:"Muestras",    v:`${totalMuestrasUds} uds`,                                                sub:`${rep.muestras.length} producto${rep.muestras.length!==1?"s":""}`, ok:rep.muestras.length>0},
    {ic:"✅",label:"Feedback +",  v:`${fbPositivo}`,                                                          sub:"Positivo o pedido",                            ok:fbPositivo>0},
    {ic:"❌",label:"Feedback KO", v:`${fbKo}`,                                                                sub:fbPendiente>0?`${fbPendiente} pendiente${fbPendiente>1?"s":""}`:"-", ok:fbKo===0&&fbPositivo>0},
    {ic:"🔄",label:"Recuperación",v:`${rep.recuperaciones.length}`,                                           sub:"acciones",                                     ok:true},
  ];

  return(
    <div>
      {/* KPIs grid */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
        {resumen.map(r=>(
          <div key={r.label} style={{background:"#FFF",borderRadius:12,padding:"13px 15px",border:`1.5px solid ${r.ok?color+"44":C.border}`,borderTop:`3px solid ${r.ok?color:C.border}`}}>
            <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:4}}>
              <span style={{fontSize:18}}>{r.ic}</span>
              <span style={{fontSize:10,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>{r.label}</span>
            </div>
            <p style={{margin:"0 0 2px",fontSize:20,fontWeight:800,color:r.ok?color:C.text}}>{r.v}</p>
            {r.sub&&<p style={{margin:0,fontSize:10,color:C.muted}}>{r.sub}</p>}
          </div>
        ))}
      </div>

      {/* Alerta muestras pendientes */}
      {fbPendiente>0&&(
        <div style={{background:C.amberL,border:`1px solid ${C.amber}55`,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:C.amber,fontWeight:600,display:"flex",gap:8}}>
          <span>⚠</span> Tienes {fbPendiente} muestra{fbPendiente>1?"s":""} pendiente{fbPendiente>1?"s":""} de dar feedback. Ve al Paso 3 para registrarlas.
        </div>
      )}

      {!ventasOk&&(
        <div style={{background:C.redL,border:`1px solid ${C.red}33`,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:C.red,fontWeight:600}}>
          ⚠ Completa ventas y MB para poder enviar el reporte
        </div>
      )}
      <button onClick={onEnviar} disabled={!ventasOk||enviado}
        style={{width:"100%",padding:"16px",borderRadius:13,border:"none",background:enviado?"#E8F5E9":ventasOk?color:C.light,color:enviado?C.green:"#fff",fontWeight:800,fontSize:16,cursor:ventasOk&&!enviado?"pointer":"default",transition:"all .2s"}}>
        {enviado?"✅ Reporte enviado":"📤 Enviar reporte"}
      </button>
    </div>
  );
}

const RESULT_ESTRAT={
  contactado: {label:"Contactado",       color:C.blue,   bg:C.blueL,   icon:"📞"},
  muestra:    {label:"Muestra dejada",   color:C.purple, bg:"#F5F3FF",  icon:"📦"},
  negociando: {label:"Negociando",       color:C.amber,  bg:C.amberL,  icon:"🤝"},
  pedido:     {label:"¡Ha pedido!",      color:C.green,  bg:C.greenL,  icon:"🛒"},
  sin_exito:  {label:"Sin éxito",        color:C.red,    bg:C.redL,    icon:"❌"},
  en_curso:   {label:"En curso",         color:C.muted,  bg:C.bg,      icon:"⏳"},
};

function VistaEstrategias({recuperaciones, onUpdate}){
  const [sel,setSel]=useState(null);
  const [formUpd,setFormUpd]=useState({resultado:"contactado",nota:""});
  const [filtro,setFiltro]=useState("en_curso");

  const pendientes=recuperaciones.filter(r=>r.estado==="pend_aprobacion").length;
  const enCurso=recuperaciones.filter(r=>r.estado==="en_curso"||r.estado==="pausado").length;
  const recuperados=recuperaciones.filter(r=>r.estado==="recuperado").length;
  const sinExito=recuperaciones.filter(r=>r.estado==="sin_exito").length;

  const filtradas=filtro==="todas"
    ?recuperaciones
    :filtro==="pendiente"
      ?recuperaciones.filter(r=>r.estado==="pend_aprobacion")
      :filtro==="en_curso"
        ?recuperaciones.filter(r=>r.estado==="en_curso"||r.estado==="pausado")
        :recuperaciones.filter(r=>r.estado===filtro);

  const addSeguimiento=()=>{
    if(!sel||!formUpd.nota.trim())return;
    const nuevoSeg={semana:SEMANA_ACTUAL,resultado:formUpd.resultado,nota:formUpd.nota.trim(),ts:new Date().toLocaleDateString("es-ES")};
    // Si el resultado es pedido → marcar como recuperado
    const nuevoEstado=formUpd.resultado==="pedido"?"recuperado":formUpd.resultado==="sin_exito"?"sin_exito":"en_curso";
    onUpdate({...sel,estado:nuevoEstado,seguimientos:[...(sel.seguimientos||[]),nuevoSeg]});
    setSel(null); setFormUpd({resultado:"contactado",nota:""});
  };

  if(sel){
    return(
      <div>
        {/* Header */}
        <div style={{background:C.bg,border:`2px solid ${C.border}`,borderRadius:13,padding:"14px 16px",marginBottom:20}}>
          <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}>
            <div style={{flex:1}}>
              <p style={{margin:0,fontSize:16,fontWeight:800,color:C.text}}>{sel.clienteNombre}</p>
              <p style={{margin:"3px 0 0",fontSize:11,color:C.muted}}>Inicio S{sel.semanaInicio||sel.semana} · {sel.equipo}</p>
            </div>
            <button onClick={()=>setSel(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:C.muted,flexShrink:0}}>✕</button>
          </div>
          {/* Estrategia */}
          <div style={{background:C.blueL,borderRadius:9,padding:"8px 12px",display:"inline-flex",gap:7,alignItems:"center"}}>
            <span style={{fontSize:16}}>🎯</span>
            <div>
              <p style={{margin:0,fontSize:10,fontWeight:700,color:C.blue,textTransform:"uppercase"}}>Estrategia</p>
              <p style={{margin:0,fontSize:13,fontWeight:700,color:C.text}}>{sel.estrategia}</p>
            </div>
          </div>
          {sel.objetivo&&<p style={{margin:"8px 0 0",fontSize:12,color:C.muted}}>{sel.objetivo}</p>}
        </div>

        {/* Timeline seguimientos anteriores */}
        {(sel.seguimientos||[]).length>0&&(
          <div style={{marginBottom:20}}>
            <p style={{margin:"0 0 10px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Historial de seguimiento</p>
            {[...(sel.seguimientos||[])].reverse().map((s,i)=>{
              const r=RESULT_ESTRAT[s.resultado]||RESULT_ESTRAT.en_curso;
              return(
                <div key={i} style={{display:"flex",gap:10,marginBottom:12,paddingLeft:4}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:r.bg,border:`2px solid ${r.color}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{r.icon}</div>
                  <div style={{flex:1,background:"#FFF",borderRadius:10,padding:"9px 13px",border:`1px solid ${C.border}`}}>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:3}}>
                      <Tag label={r.label} color={r.color}/>
                      <span style={{fontSize:11,color:C.muted}}>S{s.semana}{s.ts?` · ${s.ts}`:""}</span>
                    </div>
                    <p style={{margin:0,fontSize:13,color:C.text}}>{s.nota}</p>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* Añadir seguimiento */}
        {(sel.estado==="en_curso"||sel.estado==="pend_aprobacion")&&(
          <div style={{background:"#F8FAFC",borderRadius:13,padding:"16px",border:`2px solid ${C.blue}`}}>
            <p style={{margin:"0 0 12px",fontSize:13,fontWeight:800,color:C.text}}>Registrar avance — S{SEMANA_ACTUAL}</p>
            <p style={{margin:"0 0 8px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>¿Qué ha pasado?</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:14}}>
              {Object.entries(RESULT_ESTRAT).filter(([k])=>k!=="en_curso").map(([k,v])=>(
                <button key={k} onClick={()=>setFormUpd(f=>({...f,resultado:k}))}
                  style={{padding:"9px 13px",borderRadius:9,border:`2px solid ${formUpd.resultado===k?v.color:C.border}`,background:formUpd.resultado===k?v.bg:"#FFF",color:formUpd.resultado===k?v.color:C.muted,fontWeight:formUpd.resultado===k?700:400,fontSize:12,cursor:"pointer",display:"flex",gap:5,alignItems:"center"}}>
                  <span>{v.icon}</span>{v.label}
                </button>
              ))}
            </div>
            <div style={{marginBottom:14}}>
              <p style={{margin:"0 0 7px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Nota <span style={{color:C.red}}>*</span></p>
              <textarea value={formUpd.nota} onChange={e=>setFormUpd(f=>({...f,nota:e.target.value}))} rows={3}
                placeholder="¿Qué pasó? ¿Cómo reaccionó el cliente…"
                style={{...iSt,resize:"none",borderRadius:10,fontSize:13}}/>
            </div>
            <button onClick={addSeguimiento} disabled={!formUpd.nota.trim()}
              style={{width:"100%",padding:"14px",borderRadius:11,border:"none",background:formUpd.nota.trim()?C.navy:C.light,color:"#fff",fontWeight:800,fontSize:15,cursor:formUpd.nota.trim()?"pointer":"default"}}>
              Guardar seguimiento
            </button>
          </div>
        )}
        {sel.estado!=="en_curso"&&(
          <div style={{background:ESTADOS_REC[sel.estado]?.bg||C.bg,borderRadius:10,padding:"12px 14px",fontSize:13,color:ESTADOS_REC[sel.estado]?.color||C.muted,fontWeight:700,textAlign:"center"}}>
            {ESTADOS_REC[sel.estado]?.dot} Cerrado como "{ESTADOS_REC[sel.estado]?.label}"
          </div>
        )}
      </div>
    );
  }

  return(
    <div>
      {/* KPIs */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[{l:"⏳ Pendiente",v:pendientes,c:C.amber,f:"pendiente"},{l:"🔵 En curso",v:enCurso,c:C.blue,f:"en_curso"},{l:"✅ Recuperado",v:recuperados,c:C.green,f:"recuperado"}].map(k=>(
          <div key={k.l} onClick={()=>setFiltro(f=>f===k.f?"todas":k.f)}
            style={{flex:1,background:filtro===k.f?k.c+"15":"#FFF",border:`2px solid ${filtro===k.f?k.c:C.border}`,borderRadius:12,padding:"11px 8px",textAlign:"center",cursor:"pointer"}}>
            <p style={{margin:0,fontSize:20,fontWeight:800,color:k.c}}>{k.v}</p>
            <p style={{margin:"2px 0 0",fontSize:9,fontWeight:700,color:C.muted}}>{k.l}</p>
          </div>
        ))}
      </div>

      {/* Filtros */}
      <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>
        {[["pendiente","⏳ Pendiente"],["en_curso","🔵 En curso"],["recuperado","✅ Recuperado"],["sin_exito","❌ Sin éxito"],["todas","Todas"]].map(([k,l])=>(
          <button key={k} onClick={()=>setFiltro(k)}
            style={{padding:"6px 12px",borderRadius:8,border:`1.5px solid ${filtro===k?C.blue:C.border}`,background:filtro===k?C.blueL:"#FFF",color:filtro===k?C.blue:C.muted,fontSize:11,fontWeight:filtro===k?700:400,cursor:"pointer"}}>
            {l}
          </button>
        ))}
      </div>

      {filtradas.length===0?(
        <div style={{textAlign:"center",padding:"28px",background:"#FFF",borderRadius:13,border:`1px solid ${C.border}`,color:C.muted}}>
          <span style={{fontSize:32,display:"block",marginBottom:8}}>🔄</span>
          <p style={{margin:0,fontSize:14,fontWeight:600}}>Sin estrategias en este estado</p>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtradas.map(r=>{
            const est=ESTADOS_REC[r.estado]||ESTADOS_REC.en_curso;
            const asignadaJefe=r.asignadoPor!=="agente";
            const ultimoSeg=(r.seguimientos||[]).slice(-1)[0];
            const ultimoRes=ultimoSeg?RESULT_ESTRAT[ultimoSeg.resultado]:null;
            return(
              <div key={r.id} onClick={()=>setSel(r)}
                style={{background:"#FFF",borderRadius:13,border:`2px solid ${est.color}44`,borderLeft:`4px solid ${est.color}`,padding:"14px 16px",cursor:"pointer",transition:"transform .1s"}}
                onMouseEnter={e=>e.currentTarget.style.transform="translateX(3px)"}
                onMouseLeave={e=>e.currentTarget.style.transform="none"}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center",marginBottom:5}}>
                      <span style={{fontSize:15}}>{est.dot}</span>
                      <p style={{margin:0,fontSize:15,fontWeight:800,color:C.text}}>{r.clienteNombre}</p>
                      {asignadaJefe&&<Tag label="Del jefe" color={C.amber}/>}
                    </div>
                    {/* Estrategia */}
                    <div style={{display:"inline-flex",gap:5,alignItems:"center",background:C.blueL,borderRadius:7,padding:"4px 10px",marginBottom:6}}>
                      <span style={{fontSize:13}}>🎯</span>
                      <span style={{fontSize:12,fontWeight:700,color:C.blue}}>{r.estrategia}</span>
                    </div>
                    {/* Último seguimiento */}
                    {ultimoSeg?(
                      <p style={{margin:0,fontSize:12,color:ultimoRes?.color||C.muted}}>
                        {ultimoRes?.icon} {ultimoSeg.nota.slice(0,55)}{ultimoSeg.nota.length>55?"…":""}
                        <span style={{color:C.light}}> · S{ultimoSeg.semana}</span>
                      </p>
                    ):(
                      <p style={{margin:0,fontSize:12,color:C.muted,fontStyle:"italic"}}>Sin seguimientos — toca para añadir</p>
                    )}
                  </div>
                  <div style={{flexShrink:0,textAlign:"right"}}>
                    <span style={{fontSize:20,color:C.light}}>›</span>
                    <p style={{margin:"4px 0 0",fontSize:10,color:C.muted}}>{(r.seguimientos||[]).length} entrada{(r.seguimientos||[]).length!==1?"s":""}</p>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
      {enCurso>0&&filtro==="en_curso"&&(
        <div style={{marginTop:16,background:C.blueL,borderRadius:10,padding:"10px 14px",fontSize:12,color:C.blue,fontWeight:600}}>
          💡 Toca cualquier estrategia para registrar el avance de esta semana.
        </div>
      )}
    </div>
  );
}

// ─ Vista Historial de Muestras ───────────────────────────────────
function VistaHistorialMuestras({muestras, onFeedback, feedbackLocal}){
  const [sel,setSel]=useState(null);
  const [formFb,setFormFb]=useState({resultado:"positivo",nota:""});
  const [filtro,setFiltro]=useState("pendiente");

  const todasConFb=muestras.map(m=>{
    const fb=feedbackLocal?.find(f=>f.id===m.id);
    return fb?{...m,estado:fb.resultado,nota:fb.nota}:m;
  });
  const filtradas=filtro==="todas"?todasConFb:todasConFb.filter(m=>m.estado===filtro);
  const pendCount=todasConFb.filter(m=>m.estado==="pendiente").length;
  const posCount=todasConFb.filter(m=>m.estado==="positivo"||m.estado==="pedido").length;
  const koCount=todasConFb.filter(m=>m.estado==="ko").length;

  if(sel){
    return(
      <div>
        <div style={{background:C.bg,borderRadius:12,padding:"12px 16px",marginBottom:20,display:"flex",gap:12,alignItems:"center"}}>
          <div style={{width:40,height:40,borderRadius:10,background:C.amberL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>📦</div>
          <div style={{flex:1}}>
            <p style={{margin:0,fontSize:14,fontWeight:800}}>{sel.prodNombre}</p>
            <p style={{margin:0,fontSize:11,color:C.muted}}>{sel.clienteNombre} · {sel.tipo} · {sel.cantidad} uds · S{sel.semana}</p>
          </div>
          <button onClick={()=>setSel(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:C.muted}}>✕</button>
        </div>
        <p style={{margin:"0 0 10px",fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>¿Cuál es el feedback del cliente?</p>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {Object.entries(FEEDBACK_MUESTRA).filter(([k])=>k!=="pendiente").map(([k,v])=>(
            <button key={k} onClick={()=>setFormFb(f=>({...f,resultado:k}))}
              style={{padding:"14px 16px",borderRadius:12,border:`2px solid ${formFb.resultado===k?v.color:C.border}`,background:formFb.resultado===k?v.bg:"#FFF",display:"flex",gap:12,alignItems:"center",cursor:"pointer"}}>
              <span style={{fontSize:24}}>{v.icon}</span>
              <p style={{margin:0,fontSize:15,fontWeight:formFb.resultado===k?700:400,color:formFb.resultado===k?v.color:C.text}}>{v.label}</p>
              {formFb.resultado===k&&<span style={{marginLeft:"auto",color:v.color}}>✓</span>}
            </button>
          ))}
        </div>
        <div style={{marginBottom:20}}>
          <p style={{margin:"0 0 7px",fontSize:11,fontWeight:700,color:C.muted,textTransform:"uppercase"}}>Nota <span style={{fontWeight:400}}>(opcional)</span></p>
          <textarea value={formFb.nota} onChange={e=>setFormFb(f=>({...f,nota:e.target.value}))} rows={3}
            placeholder="¿Qué dijo? ¿Calibre, sabor, textura…"
            style={{...iSt,borderRadius:12,padding:"12px 14px",resize:"none",fontSize:14}}/>
        </div>
        <button onClick={()=>{onFeedback(sel.id,formFb.resultado,formFb.nota);setSel(null);setFormFb({resultado:"positivo",nota:""}); }}
          style={{width:"100%",padding:"16px",borderRadius:12,border:"none",background:C.navy,color:"#fff",fontWeight:800,fontSize:16,cursor:"pointer"}}>
          Guardar feedback
        </button>
      </div>
    );
  }

  return(
    <div>
      {/* KPIs */}
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        {[{l:"⏳ Pendiente",v:pendCount,c:C.amber,f:"pendiente"},{l:"✅ Positivo",v:posCount,c:C.green,f:"positivo"},{l:"❌ KO",v:koCount,c:C.red,f:"ko"}].map(k=>(
          <div key={k.l} onClick={()=>setFiltro(f=>f===k.f?"todas":k.f)}
            style={{flex:1,background:filtro===k.f?k.c+"15":"#FFF",border:`2px solid ${filtro===k.f?k.c:C.border}`,borderRadius:12,padding:"12px 10px",cursor:"pointer",textAlign:"center"}}>
            <p style={{margin:0,fontSize:22,fontWeight:800,color:k.c}}>{k.v}</p>
            <p style={{margin:"2px 0 0",fontSize:10,fontWeight:700,color:C.muted}}>{k.l}</p>
          </div>
        ))}
      </div>
      {/* Filtros */}
      <div style={{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>
        {[["todas","Todas"],["pendiente","Pendiente"],["positivo","Positivo"],["pedido","Ha pedido"],["ko","KO"]].map(([k,l])=>(
          <button key={k} onClick={()=>setFiltro(k)}
            style={{padding:"6px 12px",borderRadius:8,border:`1.5px solid ${filtro===k?C.blue:C.border}`,background:filtro===k?C.blueL:"#FFF",color:filtro===k?C.blue:C.muted,fontSize:11,fontWeight:filtro===k?700:400,cursor:"pointer"}}>
            {l}
          </button>
        ))}
      </div>
      {filtradas.length===0?(
        <div style={{textAlign:"center",padding:"28px",background:"#FFF",borderRadius:13,border:`1px solid ${C.border}`,color:C.muted}}>
          <span style={{fontSize:32,display:"block",marginBottom:8}}>📦</span>
          <p style={{margin:0,fontSize:14,fontWeight:600}}>Sin muestras en este estado</p>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {filtradas.map(m=>{
            const fb=FEEDBACK_MUESTRA[m.estado]||FEEDBACK_MUESTRA.pendiente;
            const isPend=m.estado==="pendiente";
            return(
              <div key={m.id} onClick={()=>isPend?setSel(m):null}
                style={{display:"flex",gap:12,alignItems:"center",padding:"14px 16px",borderRadius:13,border:`2px solid ${fb.color}44`,background:fb.bg,cursor:isPend?"pointer":"default",transition:"transform .1s"}}
                onMouseEnter={e=>{if(isPend)e.currentTarget.style.transform="translateX(3px)";}}
                onMouseLeave={e=>e.currentTarget.style.transform="none"}>
                <div style={{width:44,height:44,borderRadius:12,background:fb.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{fb.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  {m.prodCodigo&&<p style={{margin:0,fontSize:10,fontFamily:"monospace",color:C.blue,fontWeight:700}}>{m.prodCodigo}</p>}
                  <p style={{margin:0,fontSize:14,fontWeight:700}}>{m.prodNombre}</p>
                  <p style={{margin:"2px 0 0",fontSize:11,color:C.muted}}>{m.clienteNombre} · {m.tipo} · {m.cantidad} uds · S{m.semana}</p>
                  {!isPend&&m.nota&&<p style={{margin:"4px 0 0",fontSize:12,color:fb.color,fontStyle:"italic"}}>"{m.nota.slice(0,50)}"</p>}
                </div>
                {isPend?<span style={{fontSize:11,color:C.amber,fontWeight:700,flexShrink:0}}>Registrar →</span>
                :<Tag label={fb.label.split("—")[0].trim()} color={fb.color}/>}
              </div>
            );
          })}
        </div>
      )}
      {pendCount>0&&(
        <div style={{marginTop:16,background:C.amberL,border:`1px solid ${C.amber}55`,borderRadius:10,padding:"10px 14px",fontSize:12,color:C.amber,fontWeight:600}}>
          ⚠ {pendCount} muestra{pendCount>1?"s":""} sin feedback — toca para registrar el resultado.
        </div>
      )}
    </div>
  );
}
